name: Tarefa para implementacao por IA
description: Issue estruturada para humanos e agentes de IA implementarem com seguranca
title: "[AI TASK] "
labels: ["ai-ready"]
body:
  - type: markdown
    attributes:
      value: |
        Use este template para tarefas que serao implementadas por humanos com apoio de IA ou por agentes. Inclua contexto suficiente, limites claros e validacao objetiva.

  - type: textarea
    id: contexto
    attributes:
      label: Contexto
      description: Explique o problema, regra de negocio, usuario impactado e documentos relacionados.
      placeholder: "Ex.: Esta tarefa faz parte do epic #1 e deve seguir docs/PRODUCT.md, docs/ARCHITECTURE.md e ADRs relacionados."
    validations:
      required: true

  - type: textarea
    id: objetivo
    attributes:
      label: Objetivo
      description: O que deve ser entregue ao final da issue?
    validations:
      required: true

  - type: textarea
    id: escopo
    attributes:
      label: Escopo
      description: Liste exatamente o que entra na entrega.
      value: |
        -
        -
    validations:
      required: true

  - type: textarea
    id: fora_escopo
    attributes:
      label: Fora de escopo
      description: Liste o que nao deve ser alterado ou implementado nesta issue.
      value: |
        -
        -
    validations:
      required: true

  - type: textarea
    id: criterios_aceite
    attributes:
      label: Criterios de aceite
      description: Checklist objetivo e testavel.
      value: |
        - [ ]
        - [ ]
        - [ ]
    validations:
      required: true

  - type: textarea
    id: validacao
    attributes:
      label: Validacao obrigatoria
      description: Informe quais validacoes devem ser executadas ou justificadas.
      value: |
        - [ ] Testes adicionados/atualizados quando aplicavel
        - [ ] Lint/typecheck/build executados quando disponiveis
        - [ ] Documentacao atualizada quando necessario
        - [ ] ADR criada/atualizada quando houver decisao arquitetural
        - [ ] Sem dados sensiveis em logs, fixtures, seeds, prints ou documentacao
    validations:
      required: true

  - type: textarea
    id: riscos
    attributes:
      label: Riscos e perguntas abertas
      description: Liste riscos, ambiguidades, decisoes pendentes ou dependencias.
      value: |
        -

  - type: textarea
    id: referencias
    attributes:
      label: Referencias
      description: Links de issues, PRs, documentos, ADRs ou arquivos relacionados.
      value: |
        -
