name: Apply issue 418 card modal hotfix

on:
  push:
    branches:
      - fix/418-recurring-edit-scope-modal
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write
  pull-requests: read

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/418-recurring-edit-scope-modal
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - run: node scripts/apply-fix-418-card-modal.mjs
      - run: npm ci --no-audit --no-fund
      - run: npx prettier --write apps/web/src/dev-server/cards-page.ts apps/web/src/dev-server/recurrences-section.ts apps/web/src/dev-server/cards-page.test.ts apps/web/src/dev-server/cards-page-recurring-render.test.ts apps/web/src/dev-server/recurrence-card-instrument-script.test.ts
      - name: Capture web test output
        run: |
          set +e
          npm run test --workspace @solverfin/web > web-test.log 2>&1
          echo $? > web-test.exit
          exit 0
      - name: Upload web test diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: issue-418-card-modal-web-test
          retention-days: 1
          path: |
            web-test.log
            web-test.exit
      - name: Verify web tests
        run: test "$(cat web-test.exit)" = "0"
      - name: Commit product fix and remove temporary automation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(cards): always open scope modal for recurring purchases"
          git push origin HEAD:fix/418-recurring-edit-scope-modal
