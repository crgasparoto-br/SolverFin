name: Apply import review account labels

on:
  push:
    branches:
      - fix/import-review-account-labels
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-label-update:
    name: Update labels and validate web
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/import-review-account-labels
          fetch-depth: 0

      - name: Update interface labels and contract test
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          page_path = Path("apps/web/src/dev-server/inbox-page.ts")
          page = page_path.read_text(encoding="utf-8")
          replacements = {
              '<label>Conta de referência<select name="accountId" required></select></label>': '<label>Conta Destino<select name="accountId" required></select></label>',
              '<label id="csv-line-other-account-field" hidden>Outra conta<select name="otherAccountId"></select></label>': '<label id="csv-line-other-account-field" hidden>Conta Origem<select name="otherAccountId"></select></label>',
          }
          for old, new in replacements.items():
              if page.count(old) != 1:
                  raise SystemExit(f"Expected exactly one occurrence of: {old}")
              page = page.replace(old, new)
          page_path.write_text(page, encoding="utf-8")

          test_path = Path("apps/web/src/dev-server/inbox-csv-import.test.ts")
          test = test_path.read_text(encoding="utf-8")
          old_assertion = '    assert.match(source, /Conta de referência/);'
          new_assertions = '    assert.match(source, /Conta Destino/);\n    assert.match(source, /Conta Origem/);'
          if test.count(old_assertion) != 1:
              raise SystemExit("Expected exactly one legacy account-label assertion")
          test = test.replace(old_assertion, new_assertions)
          test_path.write_text(test, encoding="utf-8")
          PY

          git diff --check

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build shared packages
        run: npm run build:packages

      - name: Run web tests
        run: npm run test --workspace @solverfin/web

      - name: Run web lint
        run: npm run lint --workspace @solverfin/web

      - name: Run web typecheck
        run: npm run typecheck --workspace @solverfin/web

      - name: Commit final change
        shell: bash
        run: |
          git rm .github/workflows/apply-import-review-labels.yml
          git add apps/web/src/dev-server/inbox-page.ts apps/web/src/dev-server/inbox-csv-import.test.ts
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "fix(web): rename import review account labels"
          git push origin HEAD:fix/import-review-account-labels
