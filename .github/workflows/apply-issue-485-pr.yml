name: Apply issue 485 implementation from PR

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: issue-485-pr-implementation
  cancel-in-progress: false

jobs:
  implement:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://solverfin:solverfin_ci_password@localhost:5432/solverfin_ci?schema=public
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: solverfin_ci
          POSTGRES_USER: solverfin
          POSTGRES_PASSWORD: solverfin_ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U solverfin -d solverfin_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply implementation
        shell: bash
        run: |
          sed -n '/^[[:space:]]*H4sI/{s/^[[:space:]]*//;p;q;}' .github/workflows/apply-issue-485.yml > /tmp/issue-485.py.gz.b64
          test -s /tmp/issue-485.py.gz.b64
          base64 --decode /tmp/issue-485.py.gz.b64 | gzip --decompress > /tmp/issue-485-transform.py
          python3 /tmp/issue-485-transform.py

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Format implementation
        run: npm run format

      - name: Validate monorepo
        run: npm run validate

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Apply migrations
        run: npm run db:deploy

      - name: Seed demo data
        run: npm run db:seed

      - name: Run API integration tests
        run: npm run test:integration --workspace @solverfin/api

      - name: Commit implementation
        shell: bash
        run: |
          rm -f .github/workflows/apply-issue-485.yml .github/workflows/apply-issue-485-pr.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: add structured CDI operation diagnostics"
          git push origin HEAD:${{ github.head_ref }}
