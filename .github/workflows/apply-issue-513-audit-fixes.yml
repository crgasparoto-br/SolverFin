name: Apply issue 513 audit fixes

on:
  push:
    branches:
      - feat/513-csv-value-inference
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: issue-513-audit-fixes
  cancel-in-progress: true

jobs:
  apply-and-validate:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/513-csv-value-inference
          fetch-depth: 0
      - name: Diagnose declarative patch
        run: |
          set +e
          git apply --check --verbose .issue513-audit-fixes.patch > .issue513-patch-diagnostic.txt 2>&1
          status=$?
          set -e
          cat .issue513-patch-diagnostic.txt
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .issue513-patch-diagnostic.txt
          git commit -m "chore: capture issue 513 patch diagnostic"
          git push origin HEAD:feat/513-csv-value-inference
          exit $status
