name: Apply issue 513 audit fixes

on:
  push:
    branches:
      - feat/513-csv-value-inference
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: issue-513-audit-fixes
  cancel-in-progress: true

jobs:
  apply-and-validate:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/513-csv-value-inference
          fetch-depth: 0
      - name: Diagnose declarative patch
        run: git apply --check --verbose .issue513-audit-fixes.patch
