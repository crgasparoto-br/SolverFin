name: Apply issue 513 audit fixes

on:
  push:
    branches:
      - feat/513-csv-value-inference
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: issue-513-audit-fixes
  cancel-in-progress: true

jobs:
  apply-and-validate:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/513-csv-value-inference
          fetch-depth: 0
      - name: Repair and diagnose patch
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('.issue513-audit-fixes.patch')
          content = path.read_text(encoding='utf-8')
          replacements = {
              '@@ -206,6 +211,11 @@': '@@ -206,4 +211,9 @@',
              '@@ -1011,6 +1026,7 @@': '@@ -1011,5 +1026,6 @@',
              '@@ -421,11 +419,11 @@': '@@ -421,10 +419,10 @@',
              '@@ -739,7 +739,8 @@': '@@ -739,5 +739,6 @@',
              '@@ -769,13 +770,14 @@': '@@ -769,12 +770,13 @@',
              '@@ -788,7 +790,7 @@': '@@ -788,5 +790,5 @@',
              '@@ -519,8 +521,11 @@': '@@ -519,4 +521,7 @@',
              '@@ -539,6 +544,10 @@': '@@ -539,3 +544,7 @@',
              '@@ -573,6 +582,16 @@': '@@ -573,3 +582,13 @@',
              '@@ -28,6 +28,7 @@': '@@ -28,3 +28,4 @@',
              '@@ -165,6 +166,49 @@': '@@ -165,4 +166,42 @@',
              '@@ -172,8 +216,8 @@': '@@ -172,4 +216,4 @@',
              '@@ -11,7 +11,15 @@': '@@ -11,4 +11,10 @@',
          }
          for old, new in replacements.items():
              if old in content:
                  content = content.replace(old, new, 1)
          path.write_text(content, encoding='utf-8')
          PY
          set +e
          git apply --check --verbose .issue513-audit-fixes.patch > .issue513-patch-diagnostic.txt 2>&1
          status=$?
          set -e
          cat .issue513-patch-diagnostic.txt
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .issue513-audit-fixes.patch .issue513-patch-diagnostic.txt
          git commit -m "chore: persist repaired issue 513 patch diagnostic"
          git push origin HEAD:feat/513-csv-value-inference
          exit $status
