name: Apply issue 513 audit fixes

on:
  push:
    branches:
      - feat/513-csv-value-inference
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: issue-513-audit-fixes
  cancel-in-progress: true

jobs:
  apply-and-validate:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://solverfin:solverfin_ci_password@localhost:5432/solverfin_ci?schema=public
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: solverfin_ci
          POSTGRES_USER: solverfin
          POSTGRES_PASSWORD: solverfin_ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U solverfin -d solverfin_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/513-csv-value-inference
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Apply declarative patch
        run: |
          git apply --check .issue513-audit-fixes.patch
          git apply .issue513-audit-fixes.patch
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      - name: Validate implementation
        run: |
          npm run validate
          npm run test:integration
          npm run diagnose:import-statement-consistency -- --expect-zero
      - name: Commit validated fixes
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add packages/domain/src/imports.ts packages/domain/src/imports.test.ts apps/api/src/import-batches-router.ts apps/api/src/csv-import-review.integration.test.ts apps/web/src/dev-server/inbox-page.ts apps/web/src/dev-server/inbox-page-ui.test.ts
          git commit -m "fix: address issue 513 audit findings"
          git push origin HEAD:feat/513-csv-value-inference
