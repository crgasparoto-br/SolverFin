name: Apply issue 513 visual race fix

on:
  push:
    branches:
      - feat/513-csv-value-inference

permissions:
  contents: write

jobs:
  apply-fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/513-csv-value-inference
          fetch-depth: 0

      - name: Apply visual synchronization fix
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("scripts/statement-visual/inbox-csv-review.mjs")
          text = path.read_text()
          old = (
              "  await waitFor(\n"
              "    cdp,\n"
              "    `document.getElementById('csv-import-form')?.elements.mappingStrategy?.value === '' && document.getElementById('csv-mapping-fields')?.hidden === false`,\n"
              "  );\n"
          )
          new = (
              "  await waitFor(\n"
              "    cdp,\n"
              "    `(() => {\n"
              "      const form = document.getElementById('csv-import-form');\n"
              "      return form?.elements.mappingStrategy?.value === '' &&\n"
              "        form?.elements.mappingAmount?.value === 'Valor' &&\n"
              "        form?.elements.mappingIncomeAmount?.value === 'Entrada' &&\n"
              "        form?.elements.mappingExpenseAmount?.value === 'Saída' &&\n"
              "        document.getElementById('create-csv-import')?.disabled === true &&\n"
              "        document.getElementById('csv-import-status')?.textContent.includes('Ajuste');\n"
              "    })()`,\n"
              "  );\n"
          )
          if old not in text:
              raise SystemExit("Ambiguous preview wait block not found")
          text = text.replace(old, new, 1)
          text = text.replace(
              '  console.log("Issue #494 Inbox CSV review keyboard and mobile validation passed.");',
              '  console.log("Inbox CSV review and mapping validation passed.");',
              1,
          )
          path.write_text(text)
          PY

      - name: Format file
        run: npx --yes prettier@3.6.2 --write scripts/statement-visual/inbox-csv-review.mjs

      - name: Commit correction
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/statement-visual/inbox-csv-review.mjs
          git commit -m "test: wait for csv mapping preview completion"
          git push origin HEAD:feat/513-csv-value-inference
