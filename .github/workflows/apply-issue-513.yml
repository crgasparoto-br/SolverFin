name: Diagnose issue 513 tests

on:
  push:
    branches:
      - feat/513-csv-value-inference
    paths:
      - .github/workflows/apply-issue-513.yml

permissions:
  contents: write

concurrency:
  group: apply-issue-513
  cancel-in-progress: true

jobs:
  diagnose-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://solverfin:solverfin_issue_513@localhost:5432/solverfin_issue_513?schema=public

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: solverfin_issue_513
          POSTGRES_USER: solverfin
          POSTGRES_PASSWORD: solverfin_issue_513
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U solverfin -d solverfin_issue_513"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/513-csv-value-inference
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci --no-audit --no-fund

      - name: Apply implementation
        shell: bash
        env:
          ISSUE_513_DOMAIN_SOURCE: /tmp/issue-513-imports.ts
        run: |
          cat .issue513/imports.* > /tmp/issue-513-imports.ts
          cat .issue513/apply.000 .issue513/apply.001 .issue513/apply.002 > /tmp/issue-513-apply.mjs
          node /tmp/issue-513-apply.mjs
          node .issue513/fix-types.mjs
          npx prettier --write packages/domain/src/index.ts packages/domain/src/imports.ts packages/domain/src/imports.test.ts apps/api/src/import-batches-router.ts apps/api/src/repositories/imports.ts apps/api/src/csv-import-review.integration.test.ts apps/web/src/dev-server/inbox-page.ts apps/web/src/dev-server/inbox-page-ui.test.ts docs/IMPORTS.md docs/adr/0006-csv-import-structured-human-review.md

      - name: Capture test diagnostics
        shell: bash
        run: |
          set +e
          npm run test > .issue513/test.log 2>&1
          status=$?
          cat .issue513/test.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f .issue513/test.log
          git commit -m "chore: capture issue 513 test diagnostics"
          git push origin HEAD:feat/513-csv-value-inference
          exit "$status"
