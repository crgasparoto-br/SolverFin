name: Diagnose issue 513 typecheck

on:
  push:
    branches:
      - feat/513-csv-value-inference
    paths:
      - .github/workflows/apply-issue-513.yml
      - .issue513/**

permissions:
  contents: write

concurrency:
  group: apply-issue-513
  cancel-in-progress: true

jobs:
  diagnose-typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: feat/513-csv-value-inference
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Assemble and apply payload
        shell: bash
        env:
          ISSUE_513_DOMAIN_SOURCE: /tmp/issue-513-imports.ts
        run: |
          cat .issue513/imports.* > /tmp/issue-513-imports.ts
          cat .issue513/apply.* > /tmp/issue-513-apply.mjs
          echo "928f6da7f680c75b469cc17a7ae343250f15ea788072a662e2288555c83908c7  /tmp/issue-513-imports.ts" | sha256sum --check
          echo "01f8b685fd4accdce56e3dc1fb5c94d0b49de5da6e06fc49e341aed008ebeadf  /tmp/issue-513-apply.mjs" | sha256sum --check
          node /tmp/issue-513-apply.mjs

      - name: Capture typecheck diagnostics
        shell: bash
        run: |
          set +e
          npm run typecheck > .issue513/typecheck.log 2>&1
          status=$?
          cat .issue513/typecheck.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f .issue513/typecheck.log
          git commit -m "chore: capture issue 513 typecheck diagnostics"
          git push origin HEAD:feat/513-csv-value-inference
          exit "$status"
