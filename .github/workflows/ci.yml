name: CI diagnostic for issue 485

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: issue-485-diagnostic-${{ github.ref }}
  cancel-in-progress: true

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://solverfin:solverfin_ci_password@localhost:5432/solverfin_ci?schema=public
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: solverfin_ci
          POSTGRES_USER: solverfin
          POSTGRES_PASSWORD: solverfin_ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U solverfin -d solverfin_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Run integration and capture compact output
        shell: bash
        run: |
          npm run prisma:generate
          npm run build:packages
          npm run db:deploy
          npm run db:seed
          set +e
          npm run test:integration --workspace @solverfin/api > /tmp/issue-485-integration.txt 2>&1
          status=$?
          set -e
          {
            echo "Issue 485 integration diagnostic (exit $status)"
            echo
            tail -n 260 /tmp/issue-485-integration.txt
          } > .ci-issue-485.txt

      - name: Restore workflow and commit diagnostic
        shell: bash
        run: |
          git checkout origin/main -- .github/workflows/ci.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f .ci-issue-485.txt
          git add .github/workflows/ci.yml
          git commit -m "chore: capture issue 485 integration diagnostic"
          git push origin HEAD:${{ github.head_ref }}
