name: CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  issue-479-accessibility-fix:
    name: Apply audited accessibility fix
    if: github.actor != 'github-actions[bot]' && github.head_ref == 'feat/479-account-cdi-modal'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/479-account-cdi-modal
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci --no-audit --no-fund

      - name: Apply and format direct accessible title
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const enhancementPath = 'apps/web/src/dev-server/accounts-cards-enhancement.ts';
          let enhancement = fs.readFileSync(enhancementPath, 'utf8');
          const oldHeading = `'<div class="dialog-heading"><p class="eyebrow">Remuneração pelo CDI</p><h2 id="' + escapeHtml(titleId) + '">' + escapeHtml(model.name) + '</h2></div>' +`;
          const newHeading = `'<div class="dialog-heading"><p class="eyebrow" aria-hidden="true">Remuneração pelo CDI</p><h2 id="' + escapeHtml(titleId) + '">Remuneração pelo CDI — ' + escapeHtml(model.name) + '</h2></div>' +`;
          if (!enhancement.includes(oldHeading)) throw new Error('Heading source not found');
          fs.writeFileSync(enhancementPath, enhancement.replace(oldHeading, newHeading));

          const dialogOnlyPath = 'apps/web/src/dev-server/accounts-cards-page-dialog-only.ts';
          let dialogOnly = fs.readFileSync(dialogOnlyPath, 'utf8');
          const observerPattern = /\n\s+const labelAccountRemunerationDialog = \(dialog\) => \{[\s\S]*?accountRemunerationDialogObserver\.observe\(document\.body, \{ childList: true, subtree: true \}\);\n/;
          if (!observerPattern.test(dialogOnly)) throw new Error('Observer source not found');
          fs.writeFileSync(dialogOnlyPath, dialogOnly.replace(observerPattern, '\n'));

          const testPath = 'apps/web/src/dev-server/account-remuneration-dialog-runtime.test.ts';
          let test = fs.readFileSync(testPath, 'utf8');
          const oldAssertions = `  assert.match(html, /Remuneração pelo CDI —/);\n  assert.match(html, /MutationObserver/);`;
          const newAssertions = `  assert.match(dialog.innerHTML, /Remuneração pelo CDI — Conta principal/);`;
          if (!test.includes(oldAssertions)) throw new Error('Runtime assertions not found');
          fs.writeFileSync(testPath, test.replace(oldAssertions, newAssertions));
          NODE
          npx prettier --write \
            apps/web/src/dev-server/accounts-cards-enhancement.ts \
            apps/web/src/dev-server/accounts-cards-page-dialog-only.ts \
            apps/web/src/dev-server/account-remuneration-dialog-runtime.test.ts

      - name: Typecheck web
        id: typecheck
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run typecheck --workspace @solverfin/web 2>&1 | tee /tmp/issue-479-typecheck.log

      - name: Upload typecheck log
        if: steps.typecheck.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: issue-479-typecheck-log
          path: /tmp/issue-479-typecheck.log
          retention-days: 1

      - name: Test web
        if: steps.typecheck.outcome == 'success'
        run: npm run test --workspace @solverfin/web

      - name: Restore workflows and commit fix
        if: steps.typecheck.outcome == 'success' && success()
        run: |
          git checkout origin/main -- .github/workflows/ci.yml
          rm -f .github/workflows/issue-479-accessibility-final.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: tornar título do modal CDI diretamente acessível"
          git push origin HEAD:feat/479-account-cdi-modal

      - name: Fail when typecheck failed
        if: steps.typecheck.outcome == 'failure'
        run: exit 1
