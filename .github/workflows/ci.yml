name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format-diagnostics:
    name: Format diagnostics
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Format repository
        run: npx prettier . --write

      - name: Upload formatted files
        uses: actions/upload-artifact@v4
        with:
          name: formatted-files
          path: |
            SUGESTOES_UI_UX.md
            apps/web/src/dev-server-accounts-cards-actions.test.ts
            apps/web/src/dev-server.ts
            apps/web/src/dev-server/accounts-cards-hover-contrast.test.ts
            apps/web/src/dev-server/accounts-cards-page-dialog-only.ts
            apps/web/src/dev-server/card-instrument-subtotals-enhancement.test.ts
            apps/web/src/dev-server/card-instrument-subtotals-enhancement.ts
            apps/web/src/dev-server/cards-page-month-navigation.test.ts
            apps/web/src/dev-server/cards-page-month-navigation.ts
            apps/web/src/dev-server/categories-icons-enhancement.test.ts
            apps/web/src/dev-server/icons.ts
            apps/web/src/dev-server/list-sorting-enhancement.test.ts
            apps/web/src/dev-server/list-sorting-enhancement.ts
            apps/web/src/dev-server/popup-action-icons.test.ts
            apps/web/src/dev-server/recurring-card-scope-controller.test.ts
            apps/web/src/dev-server/shell.test.ts
            apps/web/src/dev-server/statement-action-icons.test.ts
