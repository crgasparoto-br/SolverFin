name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  issue-467-web:
    name: Issue 467 web checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      - name: Check changed file formatting
        run: npx prettier --check apps/web/src/dev-server/transactions-page.ts apps/web/src/dev-server/transactions-page-presentation.test.ts apps/web/src/dev-server/transactions-statement.ts apps/web/src/dev-server/transactions-statement.test.ts apps/web/src/dev-server/statement-status.ts apps/web/src/dev-server/statement-action-icons.ts apps/web/src/dev-server/statement-action-icons.test.ts apps/web/src/dev-server/shared-styles.ts apps/web/src/dev-server/shared-styles.test.ts
      - name: Typecheck web workspace
        run: npm run typecheck --workspace @solverfin/web
      - name: Test web workspace
        run: npm run test --workspace @solverfin/web

  validate:
    name: Validate monorepo
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: postgresql://solverfin:solverfin_dev_password@localhost:5432/solverfin?schema=public
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: solverfin
          POSTGRES_USER: solverfin
          POSTGRES_PASSWORD: solverfin_dev_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U solverfin -d solverfin"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Show tool versions
        run: |
          node --version
          npm --version
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      - name: Check environment example
        run: npm run env:check
      - name: Validate Prisma schema
        run: npm run prisma:validate
      - name: Check demo seed script
        run: npm run db:seed:check
      - name: Check formatting
        run: npm run format:check
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Generate Prisma client
        run: npm run prisma:generate
      - name: Apply migrations
        run: npm run db:deploy
      - name: Seed demo data
        run: npm run db:seed
      - name: Test
        run: npm run test
      - name: Build
        run: npm run build

  integration-api-postgres:
    name: Integration API + PostgreSQL
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://solverfin:solverfin_ci_password@localhost:5432/solverfin_ci?schema=public
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: solverfin_ci
          POSTGRES_USER: solverfin
          POSTGRES_PASSWORD: solverfin_ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U solverfin -d solverfin_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Show tool versions
        run: |
          node --version
          npm --version
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      - name: Generate Prisma client
        run: npm run prisma:generate
      - name: Build packages
        run: npm run build:packages
      - name: Apply migrations
        run: npm run db:deploy
      - name: Seed demo data
        run: npm run db:seed
      - name: Run API integration tests
        run: npm run test:integration --workspace @solverfin/api
