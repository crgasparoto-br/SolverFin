name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apply-issue-515-parser-fix:
    name: Apply issue 515 parser fix
    if: github.event_name == 'pull_request' && github.head_ref == 'fix/515-import-transactions-statement'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout working branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Detect pending parser fix
        id: state
        shell: bash
        run: |
          if grep -q 'findLast((line)' apps/api/src/csv-import-consistency-diagnostic.integration.test.ts; then
            echo "pending=true" >> "$GITHUB_OUTPUT"
          else
            echo "pending=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Apply compatible parser
        if: steps.state.outputs.pending == 'true'
        run: |
          python3 <<'PY'
          from pathlib import Path

          path = Path("apps/api/src/csv-import-consistency-diagnostic.integration.test.ts")
          text = path.read_text()
          text = text.replace(
              '.findLast((line) => line.startsWith("{"));',
              '.reverse()\n    .find((line) => line.startsWith("{"));',
              1,
          )
          text = text.replace(
              '  assert.equal(typeof body.approvedImportSuggestionsWithoutTransaction, "number");\n  return body.approvedImportSuggestionsWithoutTransaction;',
              '  const count = body.approvedImportSuggestionsWithoutTransaction;\n  assert.ok(typeof count === "number");\n  return count;',
              1,
          )
          if 'findLast((line)' in text:
              raise SystemExit("findLast replacement failed")
          if 'return body.approvedImportSuggestionsWithoutTransaction;' in text:
              raise SystemExit("return narrowing replacement failed")
          path.write_text(text)
          PY

      - name: Setup Node.js
        if: steps.state.outputs.pending == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        if: steps.state.outputs.pending == 'true'
        run: npm ci --no-audit --no-fund

      - name: Format corrected test
        if: steps.state.outputs.pending == 'true'
        run: npx prettier --write apps/api/src/csv-import-consistency-diagnostic.integration.test.ts

      - name: Commit corrected test
        if: steps.state.outputs.pending == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/api/src/csv-import-consistency-diagnostic.integration.test.ts
          git commit -m "test: manter parser do diagnostico compativel"
          git push origin HEAD:fix/515-import-transactions-statement

  validate:
    name: Validate monorepo
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: postgresql://solverfin:solverfin_dev_password@localhost:5432/solverfin?schema=public

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: solverfin
          POSTGRES_USER: solverfin
          POSTGRES_PASSWORD: solverfin_dev_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U solverfin -d solverfin"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Show tool versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Check environment example
        run: npm run env:check

      - name: Validate Prisma schema
        run: npm run prisma:validate

      - name: Check demo seed script
        run: npm run db:seed:check

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Apply migrations
        run: npm run db:deploy

      - name: Seed demo data
        run: npm run db:seed

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  integration-api-postgres:
    name: Integration API + PostgreSQL
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://solverfin:solverfin_ci_password@localhost:5432/solverfin_ci?schema=public

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: solverfin_ci
          POSTGRES_USER: solverfin
          POSTGRES_PASSWORD: solverfin_ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U solverfin -d solverfin_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Show tool versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Build packages
        run: npm run build:packages

      - name: Apply migrations
        run: npm run db:deploy

      - name: Seed demo data
        run: npm run db:seed

      - name: Run API integration tests
        run: npm run test:integration --workspace @solverfin/api

      - name: Verify import statement consistency
        run: npm run diagnose:import-statement-consistency -- --expect-zero
