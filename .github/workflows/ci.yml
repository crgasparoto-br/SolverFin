name: CI diagnostic for issue 485

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: issue-485-diagnostic-${{ github.ref }}
  cancel-in-progress: true

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://solverfin:solverfin_ci_password@localhost:5432/solverfin_ci?schema=public
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: solverfin_ci
          POSTGRES_USER: solverfin
          POSTGRES_PASSWORD: solverfin_ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U solverfin -d solverfin_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Format and validate integration
        shell: bash
        run: |
          npm run format
          npm run prisma:generate
          npm run build:packages
          npm run db:deploy
          npm run db:seed
          set +e
          npm run test:integration --workspace @solverfin/api > /tmp/issue-485-integration.log 2>&1
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            {
              echo "Issue 485 integration diagnostic (exit $status)"
              echo
              tail -n 240 /tmp/issue-485-integration.log
            } > .ci-issue-485.log
          else
            rm -f .ci-issue-485.log
          fi

      - name: Commit formatting and compact diagnostic
        shell: bash
        run: |
          git checkout origin/main -- .github/workflows/ci.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "chore: format and diagnose issue 485"
          git push origin HEAD:${{ github.head_ref }}
