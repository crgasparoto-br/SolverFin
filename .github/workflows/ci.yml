name: CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  issue-467-web:
    name: Issue 467 web checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      - name: Check changed file formatting
        run: npx prettier --check apps/web/src/dev-server/transactions-page.ts apps/web/src/dev-server/transactions-page-presentation.test.ts apps/web/src/dev-server/transactions-statement.ts apps/web/src/dev-server/transactions-statement.test.ts apps/web/src/dev-server/statement-status.ts apps/web/src/dev-server/statement-action-icons.ts apps/web/src/dev-server/statement-action-icons.test.ts apps/web/src/dev-server/shared-styles.ts apps/web/src/dev-server/shared-styles.test.ts
      - name: Build internal packages
        run: npm run build:packages
      - name: Typecheck web workspace
        run: npm run typecheck --workspace @solverfin/web
      - name: Compile web tests
        run: rm -rf .tmp-tests/web && npx tsc -p apps/web/tsconfig.test.json
      - name: Test issue 467 behavior
        run: node scripts/run-compiled-tests.mjs .tmp-tests/web --include transactions-page-presentation.test.js --include transactions-page.test.js --include transactions-statement.test.js --include shared-styles.test.js --include statement-action-icons.test.js
