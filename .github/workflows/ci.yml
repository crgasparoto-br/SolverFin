name: Apply issue 494 final fixes

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: issue-494-final-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apply:
    if: github.head_ref == 'feat/494-csv-import-review' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/494-csv-import-review
          fetch-depth: 0

      - name: Reconstruct exact remaining patch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          fetch_blob() {
            curl -fsSL \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/git/blobs/$1" \
              | python3 -c 'import base64,json,sys; sys.stdout.buffer.write(base64.b64decode(json.load(sys.stdin)["content"]))'
          }
          cat .github/issue-494.patch.00 .github/issue-494.patch.01 > /tmp/head.patch
          fetch_blob be546720398e33e8bb5bd7a0fcd1ac574ab7e65e >> /tmp/head.patch
          fetch_blob 06a92c61498fc650be7e200127179520a2f2900a >> /tmp/head.patch
          fetch_blob d1642063e5fdb558ab5baeaf8ac66ed5c4e88e08 > /tmp/old-tail.patch
          cat .github/issue-494.patch.04 .github/issue-494.patch.05 .github/issue-494.patch.06 >> /tmp/old-tail.patch
          tail -c +1174 /tmp/old-tail.patch > /tmp/tail.patch
          cat /tmp/head.patch /tmp/tail.patch > /tmp/complete.patch
          python3 - <<'PY'
          from pathlib import Path
          import re
          source = Path('/tmp/complete.patch').read_text()
          targets = {
              'packages/domain/src/imports.ts',
              'packages/domain/src/imports.test.ts',
              'apps/api/src/repositories/imports.ts',
              'apps/api/src/csv-import-review.integration.test.ts',
              'apps/web/src/dev-server/inbox-page.ts',
              'prisma/schema.prisma',
          }
          selected = []
          found = set()
          for section in re.split(r'(?=^--- )', source, flags=re.MULTILINE):
              match = re.search(r'^\+\+\+ b/(.+)$', section, flags=re.MULTILINE)
              if match and match.group(1) in targets:
                  selected.append(section)
                  found.add(match.group(1))
          if found != targets:
              raise SystemExit(f'Patch incompleto: {sorted(targets - found)}')
          Path('/tmp/selected.patch').write_text(''.join(selected))
          PY

      - name: Apply and verify
        run: |
          set -u
          patch --forward --batch -p1 < /tmp/selected.patch || true
          set -e
          python3 - <<'PY'
          from pathlib import Path
          schema = Path('prisma/schema.prisma')
          text = schema.read_text()
          if '  PRIVACY_CONSENT\n' not in text:
              text = text.replace('  IMPORT_BATCH\n  PAYABLE_RECEIVABLE', '  IMPORT_BATCH\n  PRIVACY_CONSENT\n  PAYABLE_RECEIVABLE')
              schema.write_text(text)
          migration = Path('prisma/migrations/20260718130000_csv_import_review_hardening/migration.sql')
          text = migration.read_text()
          statement = 'ALTER TYPE "AuditEntityKind" ADD VALUE IF NOT EXISTS \'PRIVACY_CONSENT\';\n\n'
          if not text.startswith(statement):
              migration.write_text(statement + text)
          PY
          find . -type f \( -name '*.rej' -o -name '*.orig' \) -delete
          cat > /tmp/expected.sha256 <<'EOF'
          1b19c6291ec49b38bfe2278ea2ac707282158c79206ea829a6396ae0ca998594  packages/domain/src/imports.ts
          c93ba47ea3ce25c8c851541c9a14465fac24880eae76f95c1018a8342cf28e5e  packages/domain/src/imports.test.ts
          58a358151db118db38aeeb26ff596c554b658b66093df325ac1852ced0081b1a  apps/api/src/repositories/imports.ts
          d78e7890bf2beb233fd6b872940fc9533628bca44686ac6d2af40d3d26c4edba  apps/api/src/csv-import-review.integration.test.ts
          1c869af4447808b13c1b9cb7642ca167a2eaf01c7770168fb2488e66d0afeac1  apps/web/src/dev-server/inbox-page.ts
          6aeda23b17a9c821b1d1d6162cfc593d7e0938f692f601c3f23c087252ab3feb  prisma/schema.prisma
          bfdf76a110b78a3f56eefa66dc1ffe358503a0716dbc9354308857614c944e54  prisma/migrations/20260718130000_csv_import_review_hardening/migration.sql
          EOF
          sed -i 's/^          //' /tmp/expected.sha256
          sha256sum -c /tmp/expected.sha256

      - name: Commit final implementation
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git show 76e9af47a2e5d03c2d84dd160690f78a35ba7136:.github/workflows/ci.yml > .github/workflows/ci.yml
          git rm -f .github/issue-494.patch.* .github/workflows/issue-494-apply.yml
          git add .github/workflows/ci.yml packages/domain/src/imports.ts packages/domain/src/imports.test.ts apps/api/src/repositories/imports.ts apps/api/src/csv-import-review.integration.test.ts apps/web/src/dev-server/inbox-page.ts prisma/schema.prisma prisma/migrations/20260718130000_csv_import_review_hardening/migration.sql
          git diff --cached --check
          git commit -m "fix: concluir ajustes da auditoria da issue 494"
          git push origin HEAD:feat/494-csv-import-review
