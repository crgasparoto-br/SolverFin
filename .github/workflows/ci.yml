name: Fix lint issue 467

on:
  push:
    branches:
      - review/main-issue-467-extrato

permissions:
  contents: write

concurrency:
  group: fix-lint-467-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fix-lint:
    name: Fix lint errors
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout work branch
        uses: actions/checkout@v4
        with:
          ref: review/main-issue-467-extrato
          fetch-depth: 0

      - name: Apply lint corrections
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          sorting_test = Path("apps/web/src/dev-server/list-sorting-enhancement.test.ts")
          sorting_source = sorting_test.read_text()
          old_escape = 'replace(/\\"/g, "&quot;")'
          new_escape = 'replace(/"/g, "&quot;")'
          if old_escape not in sorting_source:
              raise SystemExit("expected escaped quote regex was not found")
          sorting_test.write_text(sorting_source.replace(old_escape, new_escape, 1))

          pages = Path("apps/web/src/dev-server/pages.ts")
          pages_source = pages.read_text()
          pages_source, removed = re.subn(
              r'\nfunction renderEditIcon\(\): string \{\n  return `[^`]+`;\n\}\n',
              "\n",
              pages_source,
              count=1,
          )
          if removed != 1:
              raise SystemExit("unused renderEditIcon function was not found")
          pages.write_text(pages_source)

          transactions = Path("apps/web/src/dev-server/transactions-page.ts")
          transactions_source = transactions.read_text()
          unused_import = 'import { icon } from "./icons.js";\n'
          if unused_import not in transactions_source:
              raise SystemExit("unused icon import was not found")
          transactions.write_text(transactions_source.replace(unused_import, "", 1))
          PY

      - name: Stop when already fixed
        run: git diff --quiet && exit 0 || true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Validate web lint
        run: npm run lint --workspace @solverfin/web

      - name: Commit corrections
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            apps/web/src/dev-server/list-sorting-enhancement.test.ts \
            apps/web/src/dev-server/pages.ts \
            apps/web/src/dev-server/transactions-page.ts
          git commit -m "fix(web): corrigir erros de lint da issue 467"
          git push origin HEAD:review/main-issue-467-extrato
