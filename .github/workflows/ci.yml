name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format-diagnostics:
    name: Format diagnostics
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Generate Prettier patch
        run: |
          npx prettier . --write
          git diff --binary > prettier.patch

      - name: Upload Prettier patch
        uses: actions/upload-artifact@v4
        with:
          name: prettier-patch
          path: prettier.patch
