name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  issue-479-accessibility-fix:
    name: Apply audited accessibility fix
    if: github.actor != 'github-actions[bot]' && github.head_ref == 'feat/479-account-cdi-modal'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/479-account-cdi-modal
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci --no-audit --no-fund

      - name: Apply direct accessible title
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          const enhancementPath = 'apps/web/src/dev-server/accounts-cards-enhancement.ts';
          let enhancement = fs.readFileSync(enhancementPath, 'utf8');
          const oldHeading = `'<div class="dialog-heading"><p class="eyebrow">Remuneração pelo CDI</p><h2 id="' + escapeHtml(titleId) + '">' + escapeHtml(model.name) + '</h2></div>' +`;
          const newHeading = `'<div class="dialog-heading"><p class="eyebrow" aria-hidden="true">Remuneração pelo CDI</p><h2 id="' + escapeHtml(titleId) + '">Remuneração pelo CDI — ' + escapeHtml(model.name) + '</h2></div>' +`;
          if (!enhancement.includes(oldHeading)) throw new Error('Heading source not found');
          fs.writeFileSync(enhancementPath, enhancement.replace(oldHeading, newHeading));

          const dialogOnlyPath = 'apps/web/src/dev-server/accounts-cards-page-dialog-only.ts';
          let dialogOnly = fs.readFileSync(dialogOnlyPath, 'utf8');
          const observerPattern = /\n\s+const labelAccountRemunerationDialog = \(dialog\) => \{[\s\S]*?accountRemunerationDialogObserver\.observe\(document\.body, \{ childList: true, subtree: true \}\);\n/;
          if (!observerPattern.test(dialogOnly)) throw new Error('Observer source not found');
          fs.writeFileSync(dialogOnlyPath, dialogOnly.replace(observerPattern, '\n'));

          const testPath = 'apps/web/src/dev-server/account-remuneration-dialog-runtime.test.ts';
          let test = fs.readFileSync(testPath, 'utf8');
          const oldAssertions = `  assert.match(html, /Remuneração pelo CDI —/);\n  assert.match(html, /MutationObserver/);`;
          const newAssertions = `  assert.match(dialog.innerHTML, /Remuneração pelo CDI — Conta principal/);`;
          if (!test.includes(oldAssertions)) throw new Error('Runtime assertions not found');
          fs.writeFileSync(testPath, test.replace(oldAssertions, newAssertions));
          NODE

      - name: Format and validate web
        run: |
          npx prettier --write \
            apps/web/src/dev-server/accounts-cards-enhancement.ts \
            apps/web/src/dev-server/accounts-cards-page-dialog-only.ts \
            apps/web/src/dev-server/account-remuneration-dialog-runtime.test.ts
          npm run typecheck --workspace @solverfin/web
          npm run test --workspace @solverfin/web

      - name: Restore workflows and commit fix
        run: |
          git checkout origin/main -- .github/workflows/ci.yml
          rm -f .github/workflows/issue-479-accessibility-final.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: tornar título do modal CDI diretamente acessível"
          git push origin HEAD:feat/479-account-cdi-modal

  validate:
    name: Validate monorepo
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: postgresql://solverfin:solverfin_dev_password@localhost:5432/solverfin?schema=public

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: solverfin
          POSTGRES_USER: solverfin
          POSTGRES_PASSWORD: solverfin_dev_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U solverfin -d solverfin"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Show tool versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Check environment example
        run: npm run env:check

      - name: Validate Prisma schema
        run: npm run prisma:validate

      - name: Check demo seed script
        run: npm run db:seed:check

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Apply migrations
        run: npm run db:deploy

      - name: Seed demo data
        run: npm run db:seed

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  integration-api-postgres:
    name: Integration API + PostgreSQL
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://solverfin:solverfin_ci_password@localhost:5432/solverfin_ci?schema=public

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: solverfin_ci
          POSTGRES_USER: solverfin
          POSTGRES_PASSWORD: solverfin_ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U solverfin -d solverfin_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Show tool versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Build packages
        run: npm run build:packages

      - name: Apply migrations
        run: npm run db:deploy

      - name: Seed demo data
        run: npm run db:seed

      - name: Run API integration tests
        run: npm run test:integration --workspace @solverfin/api
