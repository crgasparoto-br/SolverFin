name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate monorepo
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: postgresql://solverfin:solverfin_dev_password@localhost:5432/solverfin?schema=public

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: solverfin
          POSTGRES_USER: solverfin
          POSTGRES_PASSWORD: solverfin_dev_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U solverfin -d solverfin"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Show tool versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Generate date filter remediation
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const file = 'apps/web/src/dev-server/inbox-list-layout-enhancement.ts';
          const before = '          return normalizeInboxDate(entry?.querySelector("dd")?.textContent || "");';
          const after = `          const value = entry?.querySelector("dd");
          return normalizeInboxDate(
            value?.dataset.fullValue ||
              value?.querySelector(".row-summary-value-preview")?.textContent ||
              value?.getAttribute("title") ||
              value?.textContent ||
              "",
          );`;
          const source = fs.readFileSync(file, 'utf8');
          if (!source.includes(before)) throw new Error('Date reader snippet not found');
          fs.writeFileSync(file, source.replace(before, after));
          NODE
          npx prettier --write \
            apps/web/src/dev-server/inbox-date-filter-enhancement.ts \
            apps/web/src/dev-server/inbox-date-filter-enhancement.test.ts \
            apps/web/src/dev-server/inbox-list-layout-enhancement.ts \
            apps/web/src/dev-server/http.ts \
            scripts/run-statement-visual-validation.mjs \
            scripts/statement-visual/inbox-date-filter.mjs
          mkdir -p artifacts/date-filter-remediation
          cp --parents \
            apps/web/src/dev-server/inbox-date-filter-enhancement.ts \
            apps/web/src/dev-server/inbox-date-filter-enhancement.test.ts \
            apps/web/src/dev-server/inbox-list-layout-enhancement.ts \
            apps/web/src/dev-server/http.ts \
            scripts/run-statement-visual-validation.mjs \
            scripts/statement-visual/inbox-date-filter.mjs \
            artifacts/date-filter-remediation/

      - name: Upload date filter remediation
        uses: actions/upload-artifact@v4
        with:
          name: date-filter-remediation-${{ github.sha }}
          path: artifacts/date-filter-remediation
          if-no-files-found: error
          retention-days: 7

      - name: Check environment example
        run: npm run env:check

      - name: Validate Prisma schema
        run: npm run prisma:validate

      - name: Check demo seed script
        run: npm run db:seed:check

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Apply migrations
        run: npm run db:deploy

      - name: Seed demo data
        run: npm run db:seed

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  integration-api-postgres:
    name: Integration API + PostgreSQL
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://solverfin:solverfin_ci_password@localhost:5432/solverfin_ci?schema=public

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: solverfin_ci
          POSTGRES_USER: solverfin
          POSTGRES_PASSWORD: solverfin_ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U solverfin -d solverfin_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Show tool versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Build packages
        run: npm run build:packages

      - name: Apply migrations
        run: npm run db:deploy

      - name: Seed demo data
        run: npm run db:seed

      - name: Run API integration tests
        run: npm run test:integration --workspace @solverfin/api

      - name: Verify import statement consistency
        run: npm run diagnose:import-statement-consistency -- --expect-zero
