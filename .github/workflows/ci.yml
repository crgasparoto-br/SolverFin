name: CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  issue-467-web-diagnostics:
    name: Issue 467 web diagnostics
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      - name: Check changed file formatting
        run: npx prettier --check apps/web/src/dev-server/transactions-page.ts apps/web/src/dev-server/transactions-page-presentation.test.ts apps/web/src/dev-server/transactions-statement.ts apps/web/src/dev-server/transactions-statement.test.ts apps/web/src/dev-server/statement-status.ts apps/web/src/dev-server/statement-action-icons.ts apps/web/src/dev-server/statement-action-icons.test.ts apps/web/src/dev-server/shared-styles.ts apps/web/src/dev-server/shared-styles.test.ts
      - name: Build internal packages
        run: npm run build:packages
      - name: Typecheck web workspace
        run: npm run typecheck --workspace @solverfin/web
      - name: Collect web test diagnostics
        run: npm run test --workspace @solverfin/web > web-tests.log 2>&1 || true
      - name: Upload web test diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: issue-467-web-tests
          path: web-tests.log
