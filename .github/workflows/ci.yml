name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate monorepo
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: postgresql://solverfin:solverfin_dev_password@localhost:5432/solverfin?schema=public

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: solverfin
          POSTGRES_USER: solverfin
          POSTGRES_PASSWORD: solverfin_dev_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U solverfin -d solverfin"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Show tool versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Check environment example
        run: npm run env:check

      - name: Validate Prisma schema
        run: npm run prisma:validate

      - name: Check demo seed script
        run: npm run db:seed:check

      - name: Generate exact issue 488 formatting
        run: |
          npx prettier --write \
            apps/api/src/account-remuneration-future-contamination.integration.test.ts \
            apps/api/src/repositories/account-remuneration-diagnostics-persistence.ts \
            apps/api/src/repositories/account-remuneration-diagnostics-service.ts \
            scripts/assert-integration-database.mjs \
            scripts/validate-integration-database-guard.mjs
          tar -czf issue-488-formatted.tgz \
            apps/api/src/account-remuneration-future-contamination.integration.test.ts \
            apps/api/src/repositories/account-remuneration-diagnostics-persistence.ts \
            apps/api/src/repositories/account-remuneration-diagnostics-service.ts \
            scripts/assert-integration-database.mjs \
            scripts/validate-integration-database-guard.mjs

      - name: Upload exact issue 488 formatting
        uses: actions/upload-artifact@v4
        with:
          name: issue-488-formatted
          path: issue-488-formatted.tgz
          if-no-files-found: error

      - name: Check formatting
        id: format-check
        run: |
          set -o pipefail
          npm run format:check 2>&1 | tee format-check.log

      - name: Upload formatting diagnostic
        if: failure() && steps.format-check.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: formatting-diagnostic
          path: format-check.log
          if-no-files-found: error

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Apply migrations
        run: npm run db:deploy

      - name: Seed demo data
        run: npm run db:seed

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  integration-api-postgres:
    name: Integration API + PostgreSQL
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://solverfin:solverfin_ci_password@localhost:5432/solverfin_ci?schema=public

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: solverfin_ci
          POSTGRES_USER: solverfin
          POSTGRES_PASSWORD: solverfin_ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U solverfin -d solverfin_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Show tool versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Build packages
        run: npm run build:packages

      - name: Apply migrations
        run: npm run db:deploy

      - name: Seed demo data
        run: npm run db:seed

      - name: Run API integration tests
        id: integration-tests
        run: |
          set -o pipefail
          npm run test:integration --workspace @solverfin/api 2>&1 | tee integration-tests.log

      - name: Upload integration diagnostic
        if: failure() && steps.integration-tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: integration-diagnostic
          path: integration-tests.log
          if-no-files-found: error
