name: Clean issue 513 temporary branch

on:
  push:
    branches:
      - feat/513-csv-value-inference

permissions:
  contents: write

jobs:
  cleanup:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Delete temporary diagnostic branch
        run: git push "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" --delete feat/513-csv-value-inference-audit-temp
