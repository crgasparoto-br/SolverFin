name: Fix issue 467 admin navigation test

on:
  push:
    branches:
      - review/main-issue-467-extrato

permissions:
  contents: write

concurrency:
  group: fix-issue-467-admin-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  patch-test:
    name: Patch stale admin navigation assertion
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: review/main-issue-467-extrato

      - name: Patch assertion
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("apps/web/src/dev-server.test.ts")
          text = path.read_text()
          old = "  assert.doesNotMatch(commonShell, /Admin - Instituições/);"
          new = "  assert.doesNotMatch(commonShell, /<a[^>]+href=\"\\/admin\\/instituicoes\"/);"

          if old in text:
              path.write_text(text.replace(old, new, 1))
          elif new not in text:
              raise SystemExit("Expected admin navigation assertion not found")
          PY

      - name: Format test
        run: npx prettier --write apps/web/src/dev-server.test.ts

      - name: Commit change
        shell: bash
        run: |
          if git diff --quiet -- apps/web/src/dev-server.test.ts; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/web/src/dev-server.test.ts
          git commit -m "test(web): validar ausencia do link admin estatico"
          git push origin HEAD:review/main-issue-467-extrato
