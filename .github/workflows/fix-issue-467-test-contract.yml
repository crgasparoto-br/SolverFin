name: Fix issue 467 test contract

on:
  push:
    branches:
      - review/main-issue-467-extrato

permissions:
  contents: write

concurrency:
  group: fix-issue-467-test-contract-${{ github.ref }}
  cancel-in-progress: true

jobs:
  patch-test:
    name: Patch stale instrument button assertions
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: review/main-issue-467-extrato

      - name: Patch assertions
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("apps/web/src/dev-server.test.ts")
          text = path.read_text()
          replacements = {
              'assert.match(html, /<button type="submit">Criar instrumento<\\/button>/);': 'assert.match(\n      html,\n      /<button type="submit" title="Criar novo instrumento">[\\s\\S]*?Criar instrumento<\\/button>/,\n    );',
              'assert.match(html, /<button type="submit">Salvar instrumento<\\/button>/);': 'assert.match(\n      html,\n      /<button type="submit" title="Salvar alterações do instrumento">[\\s\\S]*?Salvar instrumento<\\/button>/,\n    );',
          }

          changed = False
          for old, new in replacements.items():
              if old in text:
                  text = text.replace(old, new, 1)
                  changed = True
              elif new not in text:
                  raise SystemExit(f"Expected assertion not found: {old}")

          if changed:
              path.write_text(text)
          PY

      - name: Format test
        run: npx prettier --write apps/web/src/dev-server.test.ts

      - name: Commit change
        shell: bash
        run: |
          if git diff --quiet -- apps/web/src/dev-server.test.ts; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/web/src/dev-server.test.ts
          git commit -m "test(web): alinhar botoes de instrumento com icones"
          git push origin HEAD:review/main-issue-467-extrato
