name: Format issue 479

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Format changed files
        run: |
          npx prettier --write \
            apps/api/src/account-remuneration-router.integration.test.ts \
            apps/api/src/repositories/accounts.ts \
            apps/web/src/app-shell/routes.ts \
            apps/web/src/dev-server/account-remuneration-form-loading.test.ts \
            apps/web/src/dev-server/account-remuneration-hardening.test.ts \
            apps/web/src/dev-server/accounts-cards-enhancement.ts \
            apps/web/src/dev-server/routes.test.ts \
            apps/web/src/dev-server/routes.ts \
            apps/web/src/dev-server/shell.test.ts \
            apps/web/src/dev-server/shell.ts \
            docs/API_ACCOUNTS.md \
            docs/API_ACCOUNT_REMUNERATION.md \
            packages/domain/src/accounts.test.ts \
            packages/domain/src/accounts.ts

      - name: Commit formatted files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            apps/api/src/account-remuneration-router.integration.test.ts \
            apps/api/src/repositories/accounts.ts \
            apps/web/src/app-shell/routes.ts \
            apps/web/src/dev-server/account-remuneration-form-loading.test.ts \
            apps/web/src/dev-server/account-remuneration-hardening.test.ts \
            apps/web/src/dev-server/accounts-cards-enhancement.ts \
            apps/web/src/dev-server/routes.test.ts \
            apps/web/src/dev-server/routes.ts \
            apps/web/src/dev-server/shell.test.ts \
            apps/web/src/dev-server/shell.ts \
            docs/API_ACCOUNTS.md \
            docs/API_ACCOUNT_REMUNERATION.md \
            packages/domain/src/accounts.test.ts \
            packages/domain/src/accounts.ts
          if git diff --cached --quiet; then
            echo "No formatting changes required."
          else
            git commit -m "style: formatar alterações da issue 479"
            git push origin HEAD:${{ github.event.pull_request.head.ref }}
          fi
