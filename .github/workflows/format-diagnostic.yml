name: Format diagnostic

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  format-diff:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.11.1
          cache: npm

      - name: Install dependencies
        run: npm ci --silent

      - name: Generate formatting patch
        run: |
          npx prettier . --write
          git diff --binary -- . > format-diff.patch
          if [ ! -s format-diff.patch ]; then
            printf 'No formatting differences found.\n' > format-diff.patch
          fi

      - name: Upload formatting patch
        uses: actions/upload-artifact@v4
        with:
          name: format-diff
          path: format-diff.patch
          if-no-files-found: error
