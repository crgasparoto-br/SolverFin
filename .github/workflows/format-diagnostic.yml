name: Format diagnostic

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  format-diff:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.11.1
          cache: npm

      - name: Install dependencies
        run: npm ci --silent

      - name: Generate formatting patch
        run: |
          npx prettier . --write
          git diff --binary -- . > format-diff.patch
          if [ ! -s format-diff.patch ]; then
            printf 'No formatting differences found.\n' > format-diff.patch
          fi

      - name: Commit formatting changes
        run: |
          if git diff --quiet -- .; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -u
          git commit -m "style: aplicar formatacao do projeto"
          git push origin HEAD:${{ github.head_ref }}

      - name: Upload formatting patch
        uses: actions/upload-artifact@v4
        with:
          name: format-diff
          path: format-diff.patch
          if-no-files-found: error
