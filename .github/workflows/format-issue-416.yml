name: Format issue 416 artifact

on:
  push:
    branches:
      - feat/416-password-recovery-login

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Format changed files
        run: >-
          npx prettier --write
          .env.example
          apps/web/src/dev-server.ts
          apps/web/src/dev-server/login-page.ts
          apps/web/src/dev-server/password-reset.ts
          apps/web/src/dev-server/password-reset.test.ts
          docs/AUTH.md
          docs/ENVIRONMENT.md
          scripts/validate-env-example.mjs

      - name: Upload formatted files
        uses: actions/upload-artifact@v4
        with:
          name: issue-416-formatted-files
          retention-days: 1
          path: |
            .env.example
            apps/web/src/dev-server.ts
            apps/web/src/dev-server/login-page.ts
            apps/web/src/dev-server/password-reset.ts
            apps/web/src/dev-server/password-reset.test.ts
            docs/AUTH.md
            docs/ENVIRONMENT.md
            scripts/validate-env-example.mjs
