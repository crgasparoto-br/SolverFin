name: Format issue 467 fixes

on:
  push:
    branches:
      - review/main-issue-467-extrato

permissions:
  contents: write

concurrency:
  group: format-issue-467-fixes-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    name: Format corrected web tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: review/main-issue-467-extrato

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Format corrected files
        run: >-
          npx prettier --write
          apps/web/src/dev-server-accounts-cards-actions.test.ts
          apps/web/src/dev-server.test.ts
          apps/web/src/dev-server/accounts-cards-page-dialog-only.ts
          apps/web/src/dev-server/dashboard-page.test.ts
          apps/web/src/dev-server/maintenance-actions.test.ts
          apps/web/src/dev-server/pages.test.ts
          apps/web/src/dev-server/shell.test.ts

      - name: Commit formatting
        shell: bash
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            apps/web/src/dev-server-accounts-cards-actions.test.ts \
            apps/web/src/dev-server.test.ts \
            apps/web/src/dev-server/accounts-cards-page-dialog-only.ts \
            apps/web/src/dev-server/dashboard-page.test.ts \
            apps/web/src/dev-server/maintenance-actions.test.ts \
            apps/web/src/dev-server/pages.test.ts \
            apps/web/src/dev-server/shell.test.ts
          git commit -m "style(web): formatar correções da issue 467"
          git push origin HEAD:review/main-issue-467-extrato
