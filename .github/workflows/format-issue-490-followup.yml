name: Format issue 490 follow-up

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  format:
    name: Generate canonical formatting
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Format follow-up files
        run: |
          npx prettier apps/web/src/dev-server/account-remuneration-disclosure-enhancement.ts --write
          npx prettier apps/web/src/dev-server/account-remuneration-disclosure-enhancement.test.ts --write

      - name: Upload canonical files
        uses: actions/upload-artifact@v4
        with:
          name: issue-490-canonical-format-${{ github.sha }}
          path: |
            apps/web/src/dev-server/account-remuneration-disclosure-enhancement.ts
            apps/web/src/dev-server/account-remuneration-disclosure-enhancement.test.ts
          if-no-files-found: error
          retention-days: 1
