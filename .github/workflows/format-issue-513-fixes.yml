name: Format issue 513 fixes

on:
  push:
    branches:
      - feat/513-csv-value-inference

permissions:
  contents: write

jobs:
  format:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/513-csv-value-inference
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci --no-audit --no-fund
      - name: Format changed files
        run: |
          npx prettier --write packages/domain/src/imports.ts packages/domain/src/imports.test.ts apps/api/src/import-batches-router.ts apps/api/src/csv-import-review.integration.test.ts apps/web/src/dev-server/inbox-page.ts apps/web/src/dev-server/inbox-page-ui.test.ts
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add packages/domain/src/imports.ts packages/domain/src/imports.test.ts apps/api/src/import-batches-router.ts apps/api/src/csv-import-review.integration.test.ts apps/web/src/dev-server/inbox-page.ts apps/web/src/dev-server/inbox-page-ui.test.ts
          git diff --cached --quiet && exit 0
          git commit -m "style: format issue 513 audit fixes"
          git push origin HEAD:feat/513-csv-value-inference
