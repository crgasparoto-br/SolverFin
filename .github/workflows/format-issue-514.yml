name: Format issue 514

on:
  push:
    branches:
      - feat/514-inbox-category-hierarchy

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Format changed files
        run: >-
          npx prettier --write
          apps/web/src/dev-server.ts
          apps/web/src/dev-server/inbox-category-hierarchy-enhancement.ts
          apps/web/src/dev-server/inbox-category-hierarchy-enhancement.test.ts
          apps/web/src/dev-server/inbox-category-hierarchy-page.ts
      - name: Upload formatted files
        uses: actions/upload-artifact@v4
        with:
          name: formatted-issue-514
          path: |
            apps/web/src/dev-server.ts
            apps/web/src/dev-server/inbox-category-hierarchy-enhancement.ts
            apps/web/src/dev-server/inbox-category-hierarchy-enhancement.test.ts
            apps/web/src/dev-server/inbox-category-hierarchy-page.ts
