name: Format issue 514

on:
  push:
    branches:
      - feat/514-inbox-category-hierarchy

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Format changed files
        run: >-
          npx prettier --write
          apps/web/src/dev-server.ts
          apps/web/src/dev-server/inbox-category-hierarchy-enhancement.ts
          apps/web/src/dev-server/inbox-category-hierarchy-enhancement.test.ts
          apps/web/src/dev-server/inbox-category-hierarchy-page.ts
          docs/IMPORTS.md
      - name: Commit formatted files
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/web/src/dev-server.ts \
            apps/web/src/dev-server/inbox-category-hierarchy-enhancement.ts \
            apps/web/src/dev-server/inbox-category-hierarchy-enhancement.test.ts \
            apps/web/src/dev-server/inbox-category-hierarchy-page.ts \
            docs/IMPORTS.md
          git commit -m "style: format issue 514 changes"
          git push
