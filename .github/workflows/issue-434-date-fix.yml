name: Issue 434 date alignment

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  fix:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Align posting date with processing date
        shell: bash
        run: |
          node <<'NODE'
          const fs = require("fs");

          const repositoryPath = "apps/api/src/repositories/account-remuneration.ts";
          let repository = fs.readFileSync(repositoryPath, "utf8");
          repository = repository.replace(
            '  const competenceOn = toDateOnly(candidate.referenceOn);\n  const postingOn = addDays(competenceOn, 1);\n  const description =',
            '  const competenceOn = toDateOnly(candidate.referenceOn);\n  const description =',
          );
          repository = repository.replace(
            "      candidate.currency,\n      postingOn,\n      description,",
            "      candidate.currency,\n      processedOn,\n      description,",
          );
          repository = repository.replace(
            /\nfunction addDays\(value: string, days: number\): string \{[\s\S]*?\n\}\n\nfunction normalizeDate/,
            "\nfunction normalizeDate",
          );
          fs.writeFileSync(repositoryPath, repository);

          const testPath = "apps/api/src/account-remuneration-contract.test.ts";
          let test = fs.readFileSync(testPath, "utf8");
          test = test.replace(
            'assert.match(repositorySource, /const postingOn = addDays\\(competenceOn, 1\\)/);\n',
            "",
          );
          fs.writeFileSync(testPath, test);
          NODE

      - name: Commit alignment
        shell: bash
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            apps/api/src/repositories/account-remuneration.ts \
            apps/api/src/account-remuneration-contract.test.ts
          git commit -m "fix(api): use processing date for remuneration postings"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
