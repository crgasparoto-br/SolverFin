name: Issue 434 final fix

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  fix:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Remove obsolete helper
        shell: bash
        run: |
          node <<'NODE'
          const fs = require("fs");
          const path = "apps/api/src/repositories/account-remuneration.ts";
          let source = fs.readFileSync(path, "utf8");
          source = source.replace(
            /\nasync function findOperation\(id: string\): Promise<OperationRecord \| undefined> \{[\s\S]*?\n\}\n\nasync function findLatestOperation/,
            "\nasync function findLatestOperation",
          );
          fs.writeFileSync(path, source);
          NODE

      - name: Commit cleanup
        shell: bash
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/api/src/repositories/account-remuneration.ts
          git commit -m "refactor(api): remove obsolete remuneration lookup"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
