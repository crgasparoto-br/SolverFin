name: Apply issue 467

on:
  push:
    branches:
      - review/main-issue-467-extrato

permissions:
  contents: write

jobs:
  apply-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Apply implementation
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file_path = Path(path)
              content = file_path.read_text(encoding="utf-8")
              count = content.count(old)
              if count != 1:
                  raise RuntimeError(f"Expected one match in {path}, found {count}: {old[:120]!r}")
              file_path.write_text(content.replace(old, new, 1), encoding="utf-8")

          statement = "apps/web/src/dev-server/transactions-statement.ts"
          replace_once(statement, "  balanceAfterMinor?: number;", "  balanceAfterMinor: number;")
          replace_once(
              statement,
              '''      const amountMinor = signedAmount(transaction, selectedAccount?.id);
      const effective = transaction.effectiveOn !== undefined;
      if (effective) balance += amountMinor;

      return {
        transaction,
        amountMinor,
        ...(effective ? { balanceAfterMinor: balance } : {}),
      };''',
              '''      const amountMinor = signedAmount(transaction, selectedAccount?.id);
      balance += amountMinor;

      return {
        transaction,
        amountMinor,
        balanceAfterMinor: balance,
      };''',
          )

          statement_test = "apps/web/src/dev-server/transactions-statement.test.ts"
          replace_once(
              statement_test,
              '''statementCalculationsIgnoreVoidedAndPendingOpeningEntries();
transferSignedAmountDependsOnSelectedAccount();''',
              '''statementCalculationsIgnoreVoidedAndPendingOpeningEntries();
projectedBalancesIncludePlannedEntriesAndTransfers();
transferSignedAmountDependsOnSelectedAccount();''',
          )
          replace_once(
              statement_test,
              '''    rows.map((row) => row.balanceAfterMinor),
    [125000, undefined, 165000],''',
              '''    rows.map((row) => row.balanceAfterMinor),
    [125000, 135000, 175000],''',
          )
          replace_once(
              statement_test,
              '''function transferSignedAmountDependsOnSelectedAccount(): void {''',
              '''function projectedBalancesIncludePlannedEntriesAndTransfers(): void {
  const plannedExpense = pendingTransaction("planned-expense", "expense", 15000, "2026-06-01");
  const plannedIncome = pendingTransaction("planned-income", "income", 5000, "2026-06-02");
  const outboundTransfer = pendingTransaction(
    "planned-transfer-out",
    "transfer",
    25000,
    "2026-06-03",
    { destinationAccountId: "account-2" },
  );
  const inboundTransfer = pendingTransaction(
    "planned-transfer-in",
    "transfer",
    30000,
    "2026-06-04",
    { accountId: "account-2", destinationAccountId: "account-1" },
  );

  const originRows = buildRows(
    [plannedExpense, plannedIncome, outboundTransfer, inboundTransfer],
    { ...account, openingBalanceMinor: 10000 },
    10000,
  );

  assert.deepEqual(
    originRows.map((row) => row.balanceAfterMinor),
    [-5000, 0, -25000, 5000],
  );

  const destinationRows = buildRows([outboundTransfer], destinationAccount, 0);
  assert.deepEqual(
    destinationRows.map((row) => row.balanceAfterMinor),
    [25000],
  );
}

function transferSignedAmountDependsOnSelectedAccount(): void {''',
          )
          replace_once(
              statement_test,
              '''function pendingTransaction(
  id: string,
  kind: string,
  amountMinor: number,
  date: string,
): TransactionRecord {''',
              '''function pendingTransaction(
  id: string,
  kind: string,
  amountMinor: number,
  date: string,
  overrides: Partial<TransactionRecord> = {},
): TransactionRecord {''',
          )
          replace_once(
              statement_test,
              '''    plannedOn: date,
    accountId: "account-1",
  };
}''',
              '''    plannedOn: date,
    accountId: "account-1",
    ...overrides,
  };
}''',
          )

          page = "apps/web/src/dev-server/transactions-page.ts"
          replace_once(
              page,
              '''      <span>Situação</span><span>Valor</span><span>Saldo</span><span>Ações</span>''',
              '''      <span>Situação</span><span>Valor</span><span class="col-balance">Saldo</span><span>Ações</span>''',
          )
          replace_once(
              page,
              '''  const statusTone =
    transaction.status === "reconciled"
      ? "ok"
      : transaction.effectiveOn !== undefined
        ? "posted"
        : "pending";
''',
              "",
          )
          replace_once(
              page,
              '''      <span class="chip chip-${statusTone} col-status">${escapeHtml(formatStatus(transaction))}</span>
      <strong class="col-amount ${row.amountMinor < 0 ? "debit" : "credit"}">${formatMoney(row.amountMinor)}</strong>
      <strong class="col-balance">${row.balanceAfterMinor === undefined ? "Previsto" : formatMoney(row.balanceAfterMinor)}</strong>''',
              '''      ${renderStatementStatus(transaction)}
      <strong class="col-amount ${row.amountMinor < 0 ? "debit" : "credit"}">${formatMoney(row.amountMinor)}</strong>
      <strong class="col-balance${row.balanceAfterMinor < 0 ? " debit" : ""}">${formatMoney(row.balanceAfterMinor)}</strong>''',
          )
          replace_once(
              page,
              '''function formatStatus(transaction: TransactionRecord): string {
  if (transaction.status === "reconciled") return "Conciliado";
  if (transaction.effectiveOn !== undefined) return "Efetivado";
  if (transaction.status === "suggested") return "Pendente";
  return "Previsto";
}''',
              '''function renderStatementStatus(transaction: TransactionRecord): string {
  const presentation = resolveStatementStatus(transaction);

  return `<span class="statement-status statement-status-${presentation.tone} col-status" role="img" tabindex="0" aria-label="${escapeHtml(presentation.label)}" title="${escapeHtml(presentation.label)}" data-tooltip="${escapeHtml(presentation.label)}"><svg viewBox="0 0 20 20" width="16" height="16" aria-hidden="true">${presentation.iconPaths}</svg></span>`;
}

function resolveStatementStatus(transaction: TransactionRecord): {
  label: string;
  tone: "ok" | "posted" | "pending" | "planned";
  iconPaths: string;
} {
  if (transaction.status === "reconciled") {
    return {
      label: "Conciliado",
      tone: "ok",
      iconPaths:
        '<path d="M4 10l4 4 8-8" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>',
    };
  }

  if (transaction.effectiveOn !== undefined) {
    return {
      label: "Efetivado não conciliado",
      tone: "posted",
      iconPaths:
        '<circle cx="10" cy="10" r="7" fill="none" stroke="currentColor" stroke-width="2"/>',
    };
  }

  if (transaction.status === "suggested") {
    return {
      label: "Pendente",
      tone: "pending",
      iconPaths:
        '<circle cx="10" cy="10" r="7" fill="none" stroke="currentColor" stroke-width="2"/><path d="M10 6v5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="10" cy="14" r="1" fill="currentColor"/>',
    };
  }

  return {
    label: "Previsto",
    tone: "planned",
    iconPaths:
      '<circle cx="10" cy="10" r="7" fill="none" stroke="currentColor" stroke-width="2"/><path d="M10 6v4l3 2" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>',
  };
}''',
          )
          replace_once(
              page,
              '''    main { display: grid; gap: 14px; margin: 0 auto; max-width: 1440px; padding: 18px 20px; width: 100%; }''',
              '''    main { display: grid; gap: 14px; margin: 0 auto; max-width: 1800px; padding: 18px 20px; width: 100%; }''',
          )
          replace_once(
              page,
              '''    .statement-layout { align-items: start; display: grid; gap: 12px; grid-template-columns: 220px minmax(0,1fr); }''',
              '''    .statement-layout { align-items: start; display: grid; gap: 12px; grid-template-columns: minmax(260px, 300px) minmax(0,1fr); }''',
          )
          replace_once(
              page,
              '''    .summary-balance strong { font-size: 1.25rem; overflow-wrap: anywhere; }''',
              '''    .summary-balance strong { font-size: 1.125rem; font-variant-numeric: tabular-nums; white-space: nowrap; }''',
          )
          replace_once(
              page,
              '''    .summary-total strong { font-size: 0.875rem; overflow-wrap: anywhere; }''',
              '''    .summary-total strong { font-size: 0.875rem; font-variant-numeric: tabular-nums; white-space: nowrap; }''',
          )
          replace_once(
              page,
              '''    .status-line strong { font-size: 0.8125rem; }''',
              '''    .status-line strong { font-size: 0.8125rem; font-variant-numeric: tabular-nums; white-space: nowrap; }''',
          )
          replace_once(
              page,
              '''    .chip-posted { background: #e0f2fe; border-color: #bae6fd; color: #0369a1; }
    .statement-table { display: grid; overflow-x: auto; }''',
              '''    .chip-posted { background: #e0f2fe; border-color: #bae6fd; color: #0369a1; }
    .statement-status { align-items: center; border: 1px solid currentColor; border-radius: 999px; display: inline-flex; height: 26px; justify-content: center; justify-self: start; position: relative; width: 26px; }
    .statement-status::after { background: var(--text); border-radius: 4px; color: var(--surface); content: attr(data-tooltip); font-size: 0.75rem; font-weight: 600; left: 50%; opacity: 0; padding: 5px 7px; pointer-events: none; position: absolute; top: calc(100% + 6px); transform: translate(-50%, -2px); transition: opacity .15s ease, transform .15s ease; visibility: hidden; white-space: nowrap; z-index: 60; }
    .statement-status:hover::after, .statement-status:focus::after { opacity: 1; transform: translate(-50%, 0); visibility: visible; }
    .statement-status:focus-visible { outline: 2px solid var(--cyan); outline-offset: 2px; }
    .statement-status-ok { background: var(--success-bg); color: var(--success); }
    .statement-status-posted { background: #e0f2fe; color: #0369a1; }
    .statement-status-pending { background: var(--warning-bg); color: var(--warning); }
    .statement-status-planned { background: var(--primary-soft); color: var(--primary); }
    .statement-table { display: grid; overflow-x: auto; }''',
          )
          replace_once(
              page,
              '''    .statement-head { background: #f1f7fa; color: var(--muted); font-size: 0.6875rem; font-weight: 700; text-transform: uppercase; }
    .description { display: grid; gap: 2px; }''',
              '''    .statement-head { background: #f1f7fa; color: var(--muted); font-size: 0.6875rem; font-weight: 700; text-transform: uppercase; }
    .col-amount, .col-balance { font-variant-numeric: tabular-nums; white-space: nowrap; }
    .col-balance { text-align: right; }
    .description { display: grid; gap: 2px; }''',
          )
          replace_once(
              page,
              '''    @media (max-width: 1550px) { .statement-layout { grid-template-columns: 1fr; } .account-summary { position: static; } }''',
              '''    @media (max-width: 1180px) { .statement-layout { grid-template-columns: 1fr; } .account-summary { position: static; } }''',
          )

          page_test = "apps/web/src/dev-server/transactions-page.test.ts"
          replace_once(
              page_test,
              '''            openingBalanceMinor: 100000,
          },
        ],
      });
    }

    if (url.pathname === "/api/categories") {
      return jsonResponse({
        categories: [
          { id: "category-income", name: "Clientes", kind: "income", status: "active" },''',
              '''            openingBalanceMinor: 10000,
          },
        ],
      });
    }

    if (url.pathname === "/api/categories") {
      return jsonResponse({
        categories: [
          { id: "category-income", name: "Clientes", kind: "income", status: "active" },''',
          )
          replace_once(
              page_test,
              '''          {
            id: "posted-expense",
            description: "Mercado efetivado",''',
              '''          {
            id: "suggested-expense",
            description: "Despesa sugerida",
            kind: "expense",
            status: "suggested",
            amountMinor: 5000,
            occurredOn: "2026-08-12",
            plannedOn: "2026-08-12",
            accountId: "account-1",
            categoryId: "category-expense",
          },
          {
            id: "posted-expense",
            description: "Mercado efetivado",''',
          )
          replace_once(
              page_test,
              '''  assert.match(html, /Pendentes/);
  assert.match(html, /Marcar como conciliado/);
  assert.doesNotMatch(html, /\/pagar-receber/);''',
              '''  assert.match(html, /Pendentes/);
  assert.match(html, /Marcar como conciliado/);
  assert.doesNotMatch(html, /<strong class="col-balance[^\"]*">Previsto<\/strong>/);
  assert.match(html, /class="col-balance debit"/);
  assert.match(html, /class="statement-status statement-status-planned col-status" role="img" tabindex="0" aria-label="Previsto"/);
  assert.match(html, /aria-label="Efetivado não conciliado"/);
  assert.match(html, /aria-label="Conciliado"/);
  assert.match(html, /aria-label="Pendente"/);
  assert.match(html, /data-tooltip="Previsto"/);
  assert.doesNotMatch(html, /class="chip[^\"]* col-status"/);
  assert.match(html, /main \{[^}]*max-width: 1800px/);
  assert.match(html, /\.summary-balance strong \{[^}]*white-space: nowrap/);
  assert.match(html, /@media \(max-width: 1180px\)/);
  assert.doesNotMatch(html, /\/pagar-receber/);''',
          )
          PY

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Test web workspace
        run: npm run test --workspace @solverfin/web

      - name: Typecheck web workspace
        run: npm run typecheck --workspace @solverfin/web

      - name: Validate monorepo
        run: npm run validate

      - name: Commit implementation
        shell: bash
        run: |
          rm .github/workflows/issue-467-apply.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/web/src/dev-server/transactions-statement.ts \
                  apps/web/src/dev-server/transactions-statement.test.ts \
                  apps/web/src/dev-server/transactions-page.ts \
                  apps/web/src/dev-server/transactions-page.test.ts \
                  .github/workflows/issue-467-apply.yml
          git commit -m "fix(web): improve account statement balances and status"
          git push origin HEAD:review/main-issue-467-extrato
