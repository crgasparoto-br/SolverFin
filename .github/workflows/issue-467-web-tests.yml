name: Issue 467 web tests diagnostics

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: issue-467-web-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web-tests:
    name: Web tests diagnostics
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build packages
        run: npm run build:packages

      - name: Run web tests
        id: web-tests
        shell: bash
        run: |
          set +e
          npm run test --workspace @solverfin/web > web-tests.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          cat web-tests.log
          exit 0

      - name: Upload web test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-467-web-tests
          path: web-tests.log
          if-no-files-found: error

      - name: Fail when tests fail
        if: steps.web-tests.outputs.status != '0'
        run: exit 1
