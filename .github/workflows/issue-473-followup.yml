name: Issue 473 follow-up

on:
  push:
    branches:
      - feat/473-edit-transaction-account

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: feat/473-edit-transaction-account
          fetch-depth: 0

      - name: Apply focused source changes
        run: node scripts/apply-issue-473-followup.mjs

      - name: Commit source changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/web/src/dev-server/transactions-page.ts
          git commit -m "fix(web): concluir resíduos da issue 473"
          git push origin HEAD:feat/473-edit-transaction-account
