name: Issue 473 format

on:
  push:
    branches:
      - feat/473-edit-transaction-account

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: feat/473-edit-transaction-account
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format transactions page
        run: pnpm exec prettier --write apps/web/src/dev-server/transactions-page.ts

      - name: Commit formatting
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/web/src/dev-server/transactions-page.ts
          git commit -m "style(web): formatar conclusão da issue 473"
          git push origin HEAD:feat/473-edit-transaction-account
