name: Issue 479 format

on:
  push:
    branches:
      - feat/479-account-cdi-modal

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/479-account-cdi-modal
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Format issue 479 files
        run: |
          npx prettier --write \
            apps/api/src/errors.ts \
            apps/api/src/account-remuneration-router.integration.test.ts \
            apps/web/src/dev-server/accounts-cards-page-dialog-only.ts \
            apps/web/src/dev-server/account-remuneration-dialog-runtime.test.ts \
            prisma/migrations/20260715225000_enforce_account_remuneration_integrity/migration.sql

      - name: Commit formatted files
        run: |
          rm .github/workflows/issue-479-format.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "style: formatar correções da issue 479"
          git push origin HEAD:feat/479-account-cdi-modal
