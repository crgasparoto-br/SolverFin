name: Issue 479 hardening

on:
  push:
    branches:
      - feat/479-account-cdi-modal

permissions:
  contents: write

jobs:
  harden:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/479-account-cdi-modal
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Apply audited fixes
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          function read(path) {
            return fs.readFileSync(path, 'utf8');
          }

          function write(path, content) {
            fs.mkdirSync(require('node:path').dirname(path), { recursive: true });
            fs.writeFileSync(path, content);
          }

          function replaceRequired(path, before, after) {
            const source = read(path);
            if (!source.includes(before)) {
              throw new Error(`Expected source not found in ${path}: ${before.slice(0, 120)}`);
            }
            write(path, source.replace(before, after));
          }

          write(
            'prisma/migrations/20260715225000_enforce_account_remuneration_integrity/migration.sql',
            `CREATE OR REPLACE FUNCTION "guardAccountRemunerationConfiguration"()
          RETURNS TRIGGER AS $$
          DECLARE
            account_status_value VARCHAR(32);
            account_currency_value VARCHAR(3);
          BEGIN
            SELECT a."status", a."currency"
              INTO account_status_value, account_currency_value
              FROM "Account" a
             WHERE a."id" = NEW."accountId"
               AND a."organizationId" = NEW."organizationId"
               AND a."financialProfileId" = NEW."financialProfileId"
             FOR UPDATE;

            IF NOT FOUND THEN
              RAISE EXCEPTION USING
                ERRCODE = '23514',
                CONSTRAINT = 'Account_remuneration_account_missing',
                MESSAGE = 'Conta não encontrada para este perfil.';
            END IF;

            IF TG_OP = 'UPDATE' AND NEW."enabled" = false THEN
              NEW."remunerationPercent" := COALESCE(NEW."remunerationPercent", OLD."remunerationPercent");
              NEW."startsOn" := COALESCE(NEW."startsOn", OLD."startsOn");
              NEW."categoryId" := COALESCE(NEW."categoryId", OLD."categoryId");
            END IF;

            IF NEW."enabled" = true AND account_status_value <> 'ACTIVE' THEN
              RAISE EXCEPTION USING
                ERRCODE = '23514',
                CONSTRAINT = 'Account_remuneration_account_inactive',
                MESSAGE = 'A remuneração pelo CDI exige uma conta ativa.';
            END IF;

            IF NEW."enabled" = true AND account_currency_value <> 'BRL' THEN
              RAISE EXCEPTION USING
                ERRCODE = '23514',
                CONSTRAINT = 'Account_remuneration_currency_unsupported',
                MESSAGE = 'A remuneração pelo CDI está disponível somente para contas em BRL.';
            END IF;

            RETURN NEW;
          END;
          $$ LANGUAGE plpgsql;

          DROP TRIGGER IF EXISTS "AccountRemunerationConfiguration_account_integrity_guard"
            ON "AccountRemunerationConfiguration";

          CREATE TRIGGER "AccountRemunerationConfiguration_account_integrity_guard"
          BEFORE INSERT OR UPDATE ON "AccountRemunerationConfiguration"
          FOR EACH ROW
          EXECUTE FUNCTION "guardAccountRemunerationConfiguration"();

          CREATE OR REPLACE FUNCTION "guardAccountEligibilityWithActiveRemuneration"()
          RETURNS TRIGGER AS $$
          BEGIN
            IF EXISTS (
              SELECT 1
                FROM "AccountRemunerationConfiguration" c
               WHERE c."organizationId" = NEW."organizationId"
                 AND c."financialProfileId" = NEW."financialProfileId"
                 AND c."accountId" = NEW."id"
                 AND c."enabled" = true
            ) THEN
              IF NEW."currency" IS DISTINCT FROM OLD."currency" AND NEW."currency" <> 'BRL' THEN
                RAISE EXCEPTION USING
                  ERRCODE = '23514',
                  CONSTRAINT = 'Account_remuneration_must_be_disabled',
                  MESSAGE = 'Desative a remuneração pelo CDI antes de alterar a moeda da conta.';
              END IF;

              IF NEW."status" IS DISTINCT FROM OLD."status" AND NEW."status" <> 'ACTIVE' THEN
                RAISE EXCEPTION USING
                  ERRCODE = '23514',
                  CONSTRAINT = 'Account_remuneration_must_be_disabled',
                  MESSAGE = 'Desative a remuneração pelo CDI antes de arquivar a conta.';
              END IF;
            END IF;

            RETURN NEW;
          END;
          $$ LANGUAGE plpgsql;

          DROP TRIGGER IF EXISTS "Account_active_remuneration_eligibility_guard" ON "Account";

          CREATE TRIGGER "Account_active_remuneration_eligibility_guard"
          BEFORE UPDATE OF "currency", "status" ON "Account"
          FOR EACH ROW
          EXECUTE FUNCTION "guardAccountEligibilityWithActiveRemuneration"();
          `,
          );

          replaceRequired(
            'apps/api/src/errors.ts',
            `export interface ApiErrorLike {
            code?: string;
            statusCode?: number;
            message?: string;
          }`,
            `export interface ApiErrorLike {
            code?: string;
            statusCode?: number;
            message?: string;
            constraint?: string;
          }`,
          );

          replaceRequired(
            'apps/api/src/errors.ts',
            `  if (isApiErrorLike(error)) {
              return {`,
            `  const databaseError = normalizeKnownDatabaseError(error);

            if (databaseError) {
              return databaseError;
            }

            if (isApiErrorLike(error)) {
              return {`,
          );

          replaceRequired(
            'apps/api/src/errors.ts',
            `function isApiErrorLike(error: unknown): error is ApiErrorLike {`,
            `function normalizeKnownDatabaseError(
            error: unknown,
          ): Required<Pick<ApiErrorLike, "code" | "statusCode" | "message">> | undefined {
            if (typeof error !== "object" || error === null) {
              return undefined;
            }

            const candidate = error as ApiErrorLike;
            const mappings: Record<
              string,
              { code: string; statusCode: number; fallbackMessage: string }
            > = {
              Account_remuneration_must_be_disabled: {
                code: "ACCOUNT_REMUNERATION_MUST_BE_DISABLED",
                statusCode: 409,
                fallbackMessage: "Desative a remuneração pelo CDI antes de alterar a conta.",
              },
              Account_remuneration_currency_unsupported: {
                code: "ACCOUNT_REMUNERATION_CURRENCY_UNSUPPORTED",
                statusCode: 400,
                fallbackMessage: "A remuneração pelo CDI está disponível somente para contas em BRL.",
              },
              Account_remuneration_account_inactive: {
                code: "ACCOUNT_REMUNERATION_ACCOUNT_INELIGIBLE",
                statusCode: 409,
                fallbackMessage: "A remuneração pelo CDI exige uma conta ativa.",
              },
              Account_remuneration_account_missing: {
                code: "ACCOUNT_NOT_FOUND",
                statusCode: 404,
                fallbackMessage: "Conta não encontrada para este perfil.",
              },
            };
            const mapping = candidate.constraint ? mappings[candidate.constraint] : undefined;

            if (!mapping) {
              return undefined;
            }

            return {
              code: mapping.code,
              statusCode: mapping.statusCode,
              message: sanitizeMessage(candidate.message ?? mapping.fallbackMessage),
            };
          }

          function isApiErrorLike(error: unknown): error is ApiErrorLike {`,
          );

          replaceRequired(
            'apps/web/src/dev-server/accounts-cards-enhancement.ts',
            `'<div class="dialog-heading"><p class="eyebrow">Remuneração pelo CDI</p><h2 id="' + escapeHtml(titleId) + '">' + escapeHtml(model.name) + '</h2></div>' +`,
            `'<div class="dialog-heading"><p class="eyebrow" aria-hidden="true">Remuneração pelo CDI</p><h2 id="' + escapeHtml(titleId) + '">Remuneração pelo CDI — ' + escapeHtml(model.name) + '</h2></div>' +`,
          );

          let integration = read('apps/api/src/account-remuneration-router.integration.test.ts');
          integration = integration.replace(
            `  const account = readBody<{ account: { id: string } }>(accountResponse).account;

            const configurationResponse = await apiRequest(`,
            `  const account = readBody<{ account: { id: string } }>(accountResponse).account;

            const categoryResponse = await apiRequest(token, "POST", "/api/categories", {
              name: \`Receita remuneração \${suffix}\`,
              kind: "income",
            });
            assert.equal(categoryResponse.statusCode, 201);
            const category = readBody<{ category: { id: string } }>(categoryResponse).category;

            const configurationResponse = await apiRequest(`,
          );
          integration = integration.replace(
            `{ enabled: true, remunerationPercent: 100, startsOn: COMPETENCE_ON },`,
            `{ enabled: true, remunerationPercent: 100, startsOn: COMPETENCE_ON, categoryId: category.id },`,
          );
          integration = integration.replace(
            `    { enabled: false, remunerationPercent: 100, startsOn: COMPETENCE_ON },
            );
            assert.equal(disableConfigurationResponse.statusCode, 200);
            const disabledConfiguration = readBody<{
              configuration: { enabled: boolean; remunerationPercent?: number; startsOn?: string };
            }>(disableConfigurationResponse).configuration;
            assert.equal(disabledConfiguration.enabled, false);
            assert.equal(disabledConfiguration.remunerationPercent, 100);
            assert.equal(disabledConfiguration.startsOn, COMPETENCE_ON);

            const allowedCurrencyChange = await apiRequest(token, "PATCH", \`/api/accounts/\${account.id}\`, {`,
            `    { enabled: false },
            );
            assert.equal(disableConfigurationResponse.statusCode, 200);
            const disabledConfiguration = readBody<{
              configuration: {
                enabled: boolean;
                remunerationPercent?: number;
                startsOn?: string;
                categoryId?: string;
              };
            }>(disableConfigurationResponse).configuration;
            assert.equal(disabledConfiguration.enabled, false);
            assert.equal(disabledConfiguration.remunerationPercent, 100);
            assert.equal(disabledConfiguration.startsOn, COMPETENCE_ON);
            assert.equal(disabledConfiguration.categoryId, category.id);

            const reenableConfigurationResponse = await apiRequest(
              token,
              "PUT",
              \`/api/account-remuneration/configurations/\${account.id}\`,
              {
                enabled: true,
                remunerationPercent: disabledConfiguration.remunerationPercent,
                startsOn: disabledConfiguration.startsOn,
                categoryId: disabledConfiguration.categoryId,
              },
            );
            assert.equal(reenableConfigurationResponse.statusCode, 200);

            const disableAgainResponse = await apiRequest(
              token,
              "PUT",
              \`/api/account-remuneration/configurations/\${account.id}\`,
              { enabled: false },
            );
            assert.equal(disableAgainResponse.statusCode, 200);

            const allowedCurrencyChange = await apiRequest(token, "PATCH", \`/api/accounts/\${account.id}\`, {`,
          );
          integration = integration.replace(
            `  assert.equal(allowedCurrencyChange.statusCode, 200);

            process.env.SOLVERFIN_MASTER_EMAILS = "";`,
            `  assert.equal(allowedCurrencyChange.statusCode, 200);

            await assertConcurrentAccountEligibility(token, suffix);

            process.env.SOLVERFIN_MASTER_EMAILS = "";`,
          );
          integration = integration.replace(
            `async function loginAndReadToken(): Promise<string> {`,
            `async function assertConcurrentAccountEligibility(token: string, suffix: string): Promise<void> {
            const accountResponse = await apiRequest(token, "POST", "/api/accounts", {
              name: \`Conta concorrente \${suffix}\`,
              kind: "checking",
              openingBalanceMinor: 500_000,
            });
            assert.equal(accountResponse.statusCode, 201);
            const account = readBody<{ account: { id: string } }>(accountResponse).account;

            const [enableResponse, currencyResponse] = await Promise.all([
              apiRequest(token, "PUT", \`/api/account-remuneration/configurations/\${account.id}\`, {
                enabled: true,
                remunerationPercent: 100,
                startsOn: COMPETENCE_ON,
              }),
              apiRequest(token, "PATCH", \`/api/accounts/\${account.id}\`, { currency: "USD" }),
            ]);

            const responses = [enableResponse, currencyResponse];
            assert.equal(
              responses.filter((response) => response.statusCode === 200).length,
              1,
              "somente uma operação concorrente pode tornar o estado elegível ou ativar o CDI",
            );
            const rejected = responses.find((response) => response.statusCode !== 200);
            assert.ok(rejected);
            assert.ok([400, 409].includes(rejected.statusCode));

            const configurationsResponse = await apiRequest(
              token,
              "GET",
              "/api/account-remuneration/configurations",
            );
            assert.equal(configurationsResponse.statusCode, 200);
            const configuration = readBody<{
              configurations: Array<{
                accountId: string;
                accountCurrency: string;
                enabled: boolean;
              }>;
            }>(configurationsResponse).configurations.find((item) => item.accountId === account.id);
            assert.ok(configuration);
            assert.equal(
              configuration.enabled && configuration.accountCurrency !== "BRL",
              false,
              "a concorrência não pode persistir CDI ativo em conta fora de BRL",
            );
          }

          async function loginAndReadToken(): Promise<string> {`,
          );
          if (!integration.includes('assertConcurrentAccountEligibility')) {
            throw new Error('Failed to patch integration test');
          }
          write('apps/api/src/account-remuneration-router.integration.test.ts', integration);

          write(
            'apps/web/src/dev-server/account-remuneration-dialog-runtime.test.ts',
            `import assert from "node:assert/strict";
          import vm from "node:vm";

          import { enhanceAccountsCardsTabs } from "./accounts-cards-enhancement.js";

          void main();

          async function main(): Promise<void> {
            const html = enhanceAccountsCardsTabs(
              '<!doctype html><html><head></head><body><section data-tab-panel="accounts"></section></body></html>',
            );
            const script = extractEnhancementScript(html);
            const harness = createHarness();
            const context: Record<string, unknown> = {
              document: harness.document,
              escapeHtml: (value: unknown) => String(value ?? ""),
              renderCategoryOptions: () => '<option value="income-1">Receitas</option>',
              today: () => "2026-07-15",
              remunerationEndpoint: "/api/account-remuneration/configurations",
              configurationsByAccount: new Map(),
              readResponse: async (response: FakeResponse) => ({
                body: await response.json(),
                message: (await response.json()).error?.message ?? "Falha",
              }),
              renderAccount: () => {
                harness.renderCount += 1;
              },
              fetch: async (input: unknown, init?: Record<string, unknown>) => {
                harness.requests.push({ input: String(input), init });
                return harness.responses.shift() ?? fakeResponse(false, { error: { message: "Sem resposta" } });
              },
              console,
            };

            vm.runInNewContext(
              [
                extractSegment(script, "function readRemunerationPayload", "async function saveConfiguration"),
                extractSegment(script, "async function saveConfiguration", "async function loadAccountRemuneration"),
                extractSegment(script, "function createDialog", "function openDialog"),
                extractSegment(script, "function openDialog", "function renderAccount"),
                "globalThis.runtime = { createDialog, openDialog };",
              ].join("\n"),
              context,
            );

            const runtime = context.runtime as {
              createDialog: (model: FakeModel, configuration?: Record<string, unknown>) => FakeDialog;
              openDialog: (model: FakeModel, dialog: FakeDialog) => void;
            };
            const model = createModel();
            const dialog = runtime.createDialog(model);

            assert.match(dialog.innerHTML, /Remuneração pelo CDI — Conta principal/);
            assert.equal(dialog.attributes.get("aria-labelledby"), "account-remuneration-dialog-account-1-title");

            runtime.openDialog(model, dialog);
            assert.equal(dialog.open, true);
            assert.equal(dialog.form.elements.enabled.focused, true);

            dialog.form.elements.enabled.value = "true";
            dialog.form.elements.remunerationPercent.value = "112.5";
            dialog.form.elements.startsOn.value = "2026-07-20";
            dialog.form.elements.categoryId.value = "income-1";
            harness.responses.push(fakeResponse(false, { error: { message: "Percentual recusado pela API." } }));
            dialog.form.submit();
            await flushAsyncWork();

            assert.equal(dialog.open, true);
            assert.equal(dialog.form.status.textContent, "Percentual recusado pela API.");
            assert.equal(dialog.form.elements.remunerationPercent.value, "112.5");
            assert.equal(dialog.form.elements.startsOn.value, "2026-07-20");
            assert.deepEqual(JSON.parse(String(harness.requests.at(-1)?.init?.body)), {
              enabled: true,
              remunerationPercent: 112.5,
              startsOn: "2026-07-20",
              categoryId: "income-1",
            });

            harness.responses.push(
              fakeResponse(true, {
                configuration: {
                  accountId: "account-1",
                  enabled: true,
                  remunerationPercent: 112.5,
                  startsOn: "2026-07-20",
                  categoryId: "income-1",
                },
              }),
            );
            dialog.form.submit();
            await flushAsyncWork();

            assert.equal(dialog.open, false);
            assert.equal(model.action.focused, true);
            assert.equal(harness.renderCount, 1);

            const cancelModel = createModel();
            const cancelDialog = runtime.createDialog(cancelModel);
            runtime.openDialog(cancelModel, cancelDialog);
            cancelDialog.cancel.click();
            assert.equal(cancelDialog.open, false);
            assert.equal(cancelModel.action.focused, true);

            const escapeModel = createModel();
            const escapeDialog = runtime.createDialog(escapeModel);
            runtime.openDialog(escapeModel, escapeDialog);
            escapeDialog.pressEscape();
            assert.equal(escapeDialog.open, false);
            assert.equal(escapeModel.action.focused, true);
          }

          interface FakeResponse {
            ok: boolean;
            json(): Promise<any>;
          }

          interface FakeControl {
            value: string;
            disabled?: boolean;
            focused?: boolean;
            focus(): void;
          }

          interface FakeModel {
            accountId: string;
            name: string;
            action: FakeControl;
            article: { appendChild(dialog: FakeDialog): void };
          }

          interface FakeDialog {
            id: string;
            className: string;
            innerHTML: string;
            open: boolean;
            attributes: Map<string, string>;
            form: FakeForm;
            cancel: { click(): void };
            setAttribute(name: string, value: string): void;
            querySelector(selector: string): any;
            addEventListener(type: string, listener: () => void): void;
            showModal(): void;
            close(): void;
            pressEscape(): void;
          }

          interface FakeForm {
            elements: Record<string, FakeControl>;
            status: { className: string; textContent: string };
            submitButton: { disabled: boolean };
            reportValidity(): boolean;
            querySelector(selector: string): any;
            addEventListener(type: string, listener: (event: { preventDefault(): void }) => void): void;
            submit(): void;
          }

          function createHarness(): {
            document: { createElement(tagName: string): FakeDialog };
            requests: Array<{ input: string; init?: Record<string, unknown> }>;
            responses: FakeResponse[];
            renderCount: number;
          } {
            const harness = {
              requests: [] as Array<{ input: string; init?: Record<string, unknown> }>,
              responses: [] as FakeResponse[],
              renderCount: 0,
              document: {
                createElement(tagName: string): FakeDialog {
                  assert.equal(tagName, "dialog");
                  return createDialogElement();
                },
              },
            };
            return harness;
          }

          function createDialogElement(): FakeDialog {
            const closeListeners: Array<() => void> = [];
            const form = createForm();
            const dialog: FakeDialog = {
              id: "",
              className: "",
              innerHTML: "",
              open: false,
              attributes: new Map(),
              form,
              cancel: {
                click(): void {
                  dialog.close();
                },
              },
              setAttribute(name: string, value: string): void {
                dialog.attributes.set(name, value);
              },
              querySelector(selector: string): any {
                if (selector === "[data-account-remuneration-form]") return form;
                if (selector === "[data-account-remuneration-cancel]") return dialog.cancel;
                if (selector === "select, input, button") return form.elements.enabled;
                return null;
              },
              addEventListener(type: string, listener: () => void): void {
                if (type === "close") closeListeners.push(listener);
              },
              showModal(): void {
                dialog.open = true;
              },
              close(): void {
                dialog.open = false;
                closeListeners.forEach((listener) => listener());
              },
              pressEscape(): void {
                dialog.close();
              },
            };
            return dialog;
          }

          function createForm(): FakeForm {
            let submitListener: ((event: { preventDefault(): void }) => void) | undefined;
            const control = (value: string): FakeControl => ({
              value,
              focus(): void {
                this.focused = true;
              },
            });
            const form: FakeForm = {
              elements: {
                enabled: control("false"),
                remunerationPercent: control("100"),
                startsOn: control("2026-07-15"),
                categoryId: control(""),
              },
              status: { className: "", textContent: "" },
              submitButton: { disabled: false },
              reportValidity: () => true,
              querySelector(selector: string): any {
                if (selector === 'button[type="submit"]') return form.submitButton;
                if (selector === "[data-account-remuneration-status]") return form.status;
                return null;
              },
              addEventListener(type: string, listener: (event: { preventDefault(): void }) => void): void {
                if (type === "submit") submitListener = listener;
              },
              submit(): void {
                submitListener?.({ preventDefault(): void {} });
              },
            };
            return form;
          }

          function createModel(): FakeModel {
            const action: FakeControl = {
              value: "",
              focused: false,
              focus(): void {
                this.focused = true;
              },
            };
            return {
              accountId: "account-1",
              name: "Conta principal",
              action,
              article: { appendChild(): void {} },
            };
          }

          function fakeResponse(ok: boolean, body: any): FakeResponse {
            return { ok, json: async () => body };
          }

          function extractEnhancementScript(html: string): string {
            const match = /<script data-accounts-cards-direct-enhancement>([\s\S]*?)<\/script>/.exec(html);
            assert.ok(match?.[1]);
            return match[1];
          }

          function extractSegment(source: string, startMarker: string, endMarker: string): string {
            const start = source.indexOf(startMarker);
            const end = source.indexOf(endMarker, start + startMarker.length);
            assert.ok(start >= 0 && end > start, \`segmento \${startMarker} não encontrado\`);
            return source.slice(start, end);
          }

          async function flushAsyncWork(): Promise<void> {
            await new Promise((resolve) => setImmediate(resolve));
            await new Promise((resolve) => setImmediate(resolve));
          }
          `,
          );
          NODE

      - name: Format changed files
        run: |
          npx prettier --write \
            apps/api/src/errors.ts \
            apps/api/src/account-remuneration-router.integration.test.ts \
            apps/web/src/dev-server/accounts-cards-enhancement.ts \
            apps/web/src/dev-server/account-remuneration-dialog-runtime.test.ts \
            prisma/migrations/20260715225000_enforce_account_remuneration_integrity/migration.sql

      - name: Validate TypeScript and web tests
        run: |
          npm run build:packages
          npm run typecheck --workspaces --if-present
          npm run test --workspace @solverfin/web

      - name: Commit hardening changes
        shell: bash
        run: |
          rm .github/workflows/issue-479-hardening.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: concluir pendências auditadas da issue 479"
          git push origin HEAD:feat/479-account-cdi-modal
