name: Apply issue 490 patch

on:
  push:
    branches:
      - feat/490-compact-cdi-remuneration

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Patch source
        run: |
          node <<'NODE'
          const fs = require("node:fs");

          const sourcePath = "apps/web/src/dev-server/list-sorting-enhancement.ts";
          let source = fs.readFileSync(sourcePath, "utf8");

          if (!source.includes('formatDateOnly, formatMinorCurrency')) {
            source = source.replace(
              "export type ListSort =",
              'import { formatDateOnly, formatMinorCurrency } from "@solverfin/shared";\n\nexport type ListSort =',
            );
          }

          source = source.replace(
            "  return injectAccountRemunerationStatementAssets(nextHtml);",
            "  return injectAccountRemunerationStatementAssets(compactAccountRemunerationRows(nextHtml));",
          );

          if (!source.includes("function compactAccountRemunerationRows")) {
            const helperMarker =
              "function injectAccountRemunerationStatementAssets(html: string): string {";
            const helpers = `interface AccountRemunerationStatementRecord {
  competenceOn: string;
  balanceBaseMinor: number;
  dailyRatePercent: number;
  remunerationPercent: number;
  originalAmountMinor: number;
  manuallyAdjusted: boolean;
}

function compactAccountRemunerationRows(html: string): string {
  const rows = collectElements(
    html,
    '<article class="statement-row statement-body',
    "article",
  );
  let nextHtml = html;

  for (const row of [...rows].reverse()) {
    const record = parseEmbeddedRecord(row.content);
    const remuneration = accountRemunerationRecord(record?.accountRemuneration);
    if (!remuneration) continue;

    const compactTitle =
      '<strong>Remuneração CDI<span class="account-remuneration-badge">CDI</span></strong>';
    let compactRow = row.content.replace(
      /(<div class="description col-description">\\s*)<strong>[\\s\\S]*?<\\/strong>/,
      \`$1\${compactTitle}\`,
    );
    compactRow = compactRow.replace(
      /<section class="account-remuneration-audit"[^>]*>[\\s\\S]*?<\\/section>/,
      renderCompactAccountRemuneration(remuneration),
    );

    nextHtml = nextHtml.slice(0, row.start) + compactRow + nextHtml.slice(row.end);
  }

  return nextHtml;
}

function accountRemunerationRecord(
  value: unknown,
): AccountRemunerationStatementRecord | undefined {
  if (!value || typeof value !== "object") return undefined;
  const record = value as Record<string, unknown>;
  if (
    typeof record.competenceOn !== "string" ||
    typeof record.balanceBaseMinor !== "number" ||
    typeof record.dailyRatePercent !== "number" ||
    typeof record.remunerationPercent !== "number" ||
    typeof record.originalAmountMinor !== "number" ||
    typeof record.manuallyAdjusted !== "boolean"
  ) {
    return undefined;
  }

  return {
    competenceOn: record.competenceOn,
    balanceBaseMinor: record.balanceBaseMinor,
    dailyRatePercent: record.dailyRatePercent,
    remunerationPercent: record.remunerationPercent,
    originalAmountMinor: record.originalAmountMinor,
    manuallyAdjusted: record.manuallyAdjusted,
  };
}

function renderCompactAccountRemuneration(
  remuneration: AccountRemunerationStatementRecord,
): string {
  const adjustment = remuneration.manuallyAdjusted
    ? '<span class="account-remuneration-adjustment adjusted">Ajustado manualmente</span>'
    : "";

  return \`<span class="account-remuneration-summary">Competência \${escapeHtml(formatDateOnly(remuneration.competenceOn))} · \${escapeHtml(formatPercentage(remuneration.remunerationPercent, 4))} do CDI</span>
        <details class="account-remuneration-audit">
          <summary>Ver memória do cálculo</summary>
          <div class="account-remuneration-audit-content">
            \${adjustment}
            <dl>
              <div><dt>Competência</dt><dd>\${escapeHtml(formatDateOnly(remuneration.competenceOn))}</dd></div>
              <div><dt>Saldo-base</dt><dd>\${escapeHtml(formatMinorCurrency(remuneration.balanceBaseMinor))}</dd></div>
              <div><dt>CDI diário</dt><dd>\${escapeHtml(formatPercentage(remuneration.dailyRatePercent, 8))}</dd></div>
              <div><dt>Percentual aplicado</dt><dd>\${escapeHtml(formatPercentage(remuneration.remunerationPercent, 4))}</dd></div>
              <div><dt>Valor original</dt><dd>\${escapeHtml(formatMinorCurrency(remuneration.originalAmountMinor))}</dd></div>
            </dl>
          </div>
        </details>\`;
}

function formatPercentage(value: number, maximumFractionDigits: number): string {
  return \`\${new Intl.NumberFormat("pt-BR", { maximumFractionDigits }).format(value)}%\`;
}

function escapeHtml(value: string): string {
  return value
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

`;
            if (!source.includes(helperMarker)) throw new Error("Helper marker not found");
            source = source.replace(helperMarker, helpers + helperMarker);
          }

          if (!source.includes(".account-remuneration-summary{")) {
            const styleMarker =
              '        @media(max-width:760px){.account-remuneration-audit dl{grid-template-columns:repeat(2,minmax(0,1fr))}}\n      </style>';
            const styleOverrides = `        .account-remuneration-summary{color:var(--muted);display:block;font-size:.75rem;line-height:1.35}
        .account-remuneration-audit{background:transparent;border:0;display:block;gap:0;margin-top:2px;padding:0}
        .account-remuneration-audit summary{align-items:center;color:var(--primary);cursor:pointer;display:inline-flex;font-size:.75rem;font-weight:700;gap:5px;list-style:none;padding:2px 0}
        .account-remuneration-audit summary::-webkit-details-marker{display:none}
        .account-remuneration-audit summary::after{content:"›";font-size:1rem;line-height:1;transform:rotate(90deg);transition:transform 120ms ease-out}
        .account-remuneration-audit[open] summary::after{transform:rotate(-90deg)}
        .account-remuneration-audit-content{background:var(--surface-soft);border:1px solid var(--line);border-radius:var(--radius);display:grid;gap:7px;margin-top:4px;padding:8px}
        .account-remuneration-audit-content .account-remuneration-adjustment{background:var(--warning-bg);color:var(--warning);justify-self:start}
        .account-remuneration-audit-content dl{display:grid;gap:8px;grid-template-columns:repeat(auto-fit,minmax(7.5rem,1fr));margin:0}
        .account-remuneration-audit-content dd{font-size:.75rem}
        @media(max-width:760px){.account-remuneration-audit-content dl{grid-template-columns:repeat(2,minmax(0,1fr))}}
      </style>`;
            if (!source.includes(styleMarker)) throw new Error("Style marker not found");
            source = source.replace(styleMarker, styleOverrides);
          }

          fs.writeFileSync(sourcePath, source);

          const testPath = "apps/web/src/dev-server/list-sorting-enhancement.test.ts";
          let test = fs.readFileSync(testPath, "utf8");

          if (!test.includes("statementCompactRemuneration")) {
            const testMarker = "const cardHtml = documentHtml(`";
            const compactTest = `const statementCompactRemuneration = enhanceStatementListSorting(
  documentHtml(\`
    <form class="filter-form" method="get" action="/lancamentos"><input name="month" value="2026-07" /></form>
    <div class="statement-table" role="table" aria-label="Extrato bancário">
      <div class="statement-row statement-head"></div>
      \${remunerationStatementRow()}
    </div>
  \`),
  new URL("http://solverfin.test/lancamentos"),
);
assert.match(
  statementCompactRemuneration,
  /<strong>Remuneração CDI<span class="account-remuneration-badge">CDI<\\/span><\\/strong>/,
);
assert.match(statementCompactRemuneration, /Competência 15\\/07\\/2026 · 100% do CDI/);
assert.match(
  statementCompactRemuneration,
  /<details class="account-remuneration-audit">\\s*<summary>Ver memória do cálculo<\\/summary>/,
);
assert.doesNotMatch(
  statementCompactRemuneration,
  /<details class="account-remuneration-audit"[^>]* open/,
);
assert.match(statementCompactRemuneration, /Saldo-base/);
assert.match(statementCompactRemuneration, /R\\$\\s*9\\.933,48/);
assert.match(statementCompactRemuneration, /CDI diário/);
assert.match(statementCompactRemuneration, /0,052531%/);
assert.doesNotMatch(statementCompactRemuneration, /<strong>Rendimento previsto/);
assert.doesNotMatch(
  statementCompactRemuneration,
  /<section class="account-remuneration-audit"/,
);
assert.match(
  statementCompactRemuneration,
  /grid-template-columns:repeat\\(auto-fit,minmax\\(7\\.5rem,1fr\\)\\)/,
);

`;
            if (!test.includes(testMarker)) throw new Error("Test marker not found");
            test = test.replace(testMarker, compactTest + testMarker);
          }

          if (!test.includes("function remunerationStatementRow")) {
            const helperMarker = "function purchaseRow(";
            const helper = `function remunerationStatementRow(): string {
  const accountRemuneration = {
    competenceOn: "2026-07-15",
    processedOn: "2026-07-16",
    balanceBaseMinor: 993348,
    dailyRatePercent: 0.052531,
    remunerationPercent: 100,
    appliedDailyRatePercent: 0.052531,
    originalAmountMinor: 522,
    manuallyAdjusted: false,
  };
  const transaction = {
    id: "remuneracao-compacta",
    effectiveOn: "2026-07-16",
    plannedOn: "2026-07-16",
    occurredOn: "2026-07-16",
    description:
      "Rendimento previsto — 100% do CDI · competência 2026-07-15 · saldo-base R$ 9.933,48 · CDI 0,052531% · valor original R$ 5,22",
    amountMinor: 522,
    source: "account_remuneration",
    accountRemuneration,
  };

  return \`<article class="statement-row statement-body account-remuneration-row" role="row">
    <div class="description col-description">
      <strong>\${transaction.description}<span class="account-remuneration-badge">Remuneração CDI</span></strong>
      <section class="account-remuneration-audit" aria-label="Memória do cálculo da remuneração">
        <div class="account-remuneration-audit-heading"><strong>Memória do cálculo</strong><span class="account-remuneration-adjustment original">Valor original</span></div>
        <dl><div><dt>Competência</dt><dd>15/07/2026</dd></div></dl>
      </section>
    </div>
    <script type="application/json" data-transaction="remuneracao-compacta">\${escapedJson(transaction)}</script>
  </article>\`;
}

`;
            if (!test.includes(helperMarker)) throw new Error("Test helper marker not found");
            test = test.replace(helperMarker, helper + helperMarker);
          }

          fs.writeFileSync(testPath, test);
          NODE
