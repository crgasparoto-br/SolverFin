name: Apply issue 490 compact height fix

on:
  push:
    branches:
      - feat/490-compact-cdi-remuneration

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Apply compact height fix
        run: |
          node <<'NODE'
          const fs = require("node:fs");

          const sourcePath = "apps/web/src/dev-server/list-sorting-enhancement.ts";
          let source = fs.readFileSync(sourcePath, "utf8");
          const titleBefore =
            '<strong>Remuneração CDI<span class="account-remuneration-badge">CDI</span></strong>';
          const titleAfter = '<strong>Remuneração CDI</strong>';
          if (!source.includes(titleBefore)) throw new Error("Compact title marker was not found");
          source = source.replace(titleBefore, titleAfter);

          const guardBefore =
            '            if (description && !description.querySelector(".account-remuneration-badge")) {';
          const guardAfter =
            '            if (description && !description.querySelector(".account-remuneration-badge") && !row.querySelector(".account-remuneration-summary")) {';
          if (!source.includes(guardBefore)) throw new Error("Legacy badge guard was not found");
          source = source.replace(guardBefore, guardAfter);
          fs.writeFileSync(sourcePath, source);

          const testPaths = [
            "apps/web/src/dev-server/list-sorting-enhancement.test.ts",
            "apps/web/src/dev-server/account-remuneration-compact-row.test.ts",
          ];
          const expectationBefore =
            '/<strong>Remuneração CDI<span class="account-remuneration-badge">CDI<\\/span><\\/strong>/';
          const expectationAfter = '/<strong>Remuneração CDI<\\/strong>/';
          for (const testPath of testPaths) {
            let test = fs.readFileSync(testPath, "utf8");
            if (!test.includes(expectationBefore)) {
              throw new Error(`Compact title expectation was not found in ${testPath}`);
            }
            test = test.replace(expectationBefore, expectationAfter);
            fs.writeFileSync(testPath, test);
          }
          NODE

      - name: Format issue files
        run: |
          npx prettier --write \
            apps/web/src/dev-server/list-sorting-enhancement.ts \
            apps/web/src/dev-server/list-sorting-enhancement.test.ts \
            apps/web/src/dev-server/account-remuneration-compact-row.test.ts \
            scripts/statement-visual/account-remuneration.mjs \
            .github/workflows/statement-visual-validation.yml

      - name: Run focused web tests
        run: |
          npm run build:packages
          npm run test --workspace @solverfin/web

      - name: Commit fix and remove temporary workflow
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm .github/workflows/issue-490-fix-compact-height.yml
          git add \
            apps/web/src/dev-server/list-sorting-enhancement.ts \
            apps/web/src/dev-server/list-sorting-enhancement.test.ts \
            apps/web/src/dev-server/account-remuneration-compact-row.test.ts \
            scripts/statement-visual/account-remuneration.mjs \
            .github/workflows/statement-visual-validation.yml
          git commit -m "fix: reduce collapsed CDI remuneration height"
          git push origin HEAD:feat/490-compact-cdi-remuneration
