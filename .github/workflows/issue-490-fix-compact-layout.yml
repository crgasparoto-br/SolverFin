name: Apply compact CDI two-line layout

on:
  push:
    branches:
      - feat/490-compact-cdi-remuneration

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Apply two-line collapsed layout
        run: |
          node <<'NODE'
          const fs = require("node:fs");
          const sourcePath = "apps/web/src/dev-server/list-sorting-enhancement.ts";
          let source = fs.readFileSync(sourcePath, "utf8");

          const renderBefore = `  return \`<span class="account-remuneration-summary">Competência \${escapeHtml(formatDateOnly(remuneration.competenceOn))} · \${escapeHtml(formatPercentage(remuneration.remunerationPercent, 4))} do CDI</span>
        <details class="account-remuneration-audit">
<summary>Ver memória do cálculo</summary>
<div class="account-remuneration-audit-content">
  \${adjustment}
  <dl>
    <div><dt>Competência</dt><dd>\${escapeHtml(formatDateOnly(remuneration.competenceOn))}</dd></div>
    <div><dt>Saldo-base</dt><dd>\${escapeHtml(formatMinorCurrency(remuneration.balanceBaseMinor))}</dd></div>
    <div><dt>CDI diário</dt><dd>\${escapeHtml(formatPercentage(remuneration.dailyRatePercent, 8))}</dd></div>
    <div><dt>Percentual aplicado</dt><dd>\${escapeHtml(formatPercentage(remuneration.remunerationPercent, 4))}</dd></div>
    <div><dt>Valor original</dt><dd>\${escapeHtml(formatMinorCurrency(remuneration.originalAmountMinor))}</dd></div>
  </dl>
</div>
        </details>\`;`;
          const renderAfter = `  return \`<details class="account-remuneration-audit">
<summary>Ver memória do cálculo</summary>
<div class="account-remuneration-audit-content">
  \${adjustment}
  <dl>
    <div><dt>Competência</dt><dd>\${escapeHtml(formatDateOnly(remuneration.competenceOn))}</dd></div>
    <div><dt>Saldo-base</dt><dd>\${escapeHtml(formatMinorCurrency(remuneration.balanceBaseMinor))}</dd></div>
    <div><dt>CDI diário</dt><dd>\${escapeHtml(formatPercentage(remuneration.dailyRatePercent, 8))}</dd></div>
    <div><dt>Percentual aplicado</dt><dd>\${escapeHtml(formatPercentage(remuneration.remunerationPercent, 4))}</dd></div>
    <div><dt>Valor original</dt><dd>\${escapeHtml(formatMinorCurrency(remuneration.originalAmountMinor))}</dd></div>
  </dl>
</div>
        </details>
        <span class="account-remuneration-summary">Competência \${escapeHtml(formatDateOnly(remuneration.competenceOn))} · \${escapeHtml(formatPercentage(remuneration.remunerationPercent, 4))} do CDI</span>\`;`;
          if (!source.includes(renderBefore)) throw new Error("Compact remuneration renderer marker was not found");
          source = source.replace(renderBefore, renderAfter);

          const styleBefore = `        .account-remuneration-summary{color:var(--muted);display:block;font-size:.75rem;line-height:1.35}
        .account-remuneration-audit{background:transparent;border:0;display:block;gap:0;margin-top:2px;padding:0}`;
          const styleAfter = `        .statement-row.account-remuneration-row .col-description{min-width:15rem}
        .statement-row.account-remuneration-row .description{display:block}
        .statement-row.account-remuneration-row .description>strong{display:inline}
        .account-remuneration-summary{color:var(--muted);display:block;font-size:.75rem;line-height:1.35}
        .account-remuneration-audit{background:transparent;border:0;display:inline-block;gap:0;margin:0 0 0 6px;padding:0;vertical-align:baseline}
        .account-remuneration-audit[open]{display:block;margin-left:0}`;
          if (!source.includes(styleBefore)) throw new Error("Compact remuneration style marker was not found");
          source = source.replace(styleBefore, styleAfter);
          fs.writeFileSync(sourcePath, source);
          NODE

      - name: Format source
        run: npx prettier --write apps/web/src/dev-server/list-sorting-enhancement.ts

      - name: Run focused web tests
        run: |
          npm run build:packages
          npm run test --workspace @solverfin/web

      - name: Commit fix and remove temporary workflow
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm .github/workflows/issue-490-fix-compact-layout.yml
          git add apps/web/src/dev-server/list-sorting-enhancement.ts
          git commit -m "fix: render collapsed CDI remuneration in two lines"
          git push origin HEAD:feat/490-compact-cdi-remuneration
