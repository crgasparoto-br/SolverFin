name: Format issue 490 changes

on:
  pull_request:
    branches:
      - main
    types:
      - reopened
      - synchronize

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Format issue files
        run: |
          npx prettier --write \
            apps/web/src/dev-server/list-sorting-enhancement.ts \
            apps/web/src/dev-server/list-sorting-enhancement.test.ts \
            apps/web/src/dev-server/account-remuneration-compact-row.test.ts
          npm run format:check

      - name: Commit formatted files and remove workflow
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm .github/workflows/issue-490-format.yml
          git add apps/web/src/dev-server/list-sorting-enhancement.ts apps/web/src/dev-server/list-sorting-enhancement.test.ts apps/web/src/dev-server/account-remuneration-compact-row.test.ts
          git commit -m "style: format compact CDI remuneration changes"
          git push origin HEAD:${{ github.head_ref }}
