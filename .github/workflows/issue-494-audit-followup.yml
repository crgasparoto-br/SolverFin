name: Apply issue 494 audit follow-up

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'feat/494-csv-import-review' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/494-csv-import-review
          fetch-depth: 0

      - name: Apply audited corrections
        run: |
          python3 .github/issue-494-audit-followup.py
          npx prettier --write \
            apps/api/src/repositories/imports.ts \
            apps/api/src/csv-import-review.integration.test.ts \
            apps/web/src/dev-server/inbox-page.ts \
            apps/web/src/dev-server/inbox-csv-import.test.ts \
            scripts/statement-visual/inbox-csv-review.mjs \
            .github/workflows/statement-visual-validation.yml
          git diff --check

      - name: Commit corrections and remove transport files
        run: |
          set -euxo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f .github/issue-494-audit-followup.py .github/workflows/issue-494-audit-followup.yml
          git add -A
          git status --short
          git diff --cached --check
          git commit -m "fix: concluir pendências finais da auditoria da issue 494"
          git push origin HEAD:feat/494-csv-import-review
