name: Issue 494 diagnostics

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  diagnose:
    if: github.head_ref == 'feat/494-csv-import-review' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://solverfin:solverfin_diag_password@localhost:5432/solverfin_diag_test?schema=public

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: solverfin_diag_test
          POSTGRES_USER: solverfin
          POSTGRES_PASSWORD: solverfin_diag_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U solverfin -d solverfin_diag_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/494-csv-import-review
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Apply exact optional payload correction
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('apps/api/src/repositories/imports.ts')
          text = path.read_text()
          old = '''  const payload = parseTransactionExtractionPayload(suggestion.payload);
            return {
              ...suggestion,
              ...(payload === undefined ? {} : { payload }),'''
          new = '''  const payload = parseTransactionExtractionPayload(suggestion.payload);
            const { payload: _discardedPayload, ...suggestionWithoutPayload } = suggestion;
            return {
              ...suggestionWithoutPayload,
              ...(payload === undefined ? {} : { payload }),'''
          if old not in text:
              raise SystemExit('Expected toImportReviewSuggestion block was not found')
          path.write_text(text.replace(old, new, 1))
          PY
          npx prettier --write apps/api/src/repositories/imports.ts
          git diff --check

      - name: Prepare project
        run: |
          npm ci --no-audit --no-fund
          npm run prisma:generate
          npm run build:packages
          npm run db:deploy
          npm run db:seed

      - name: Capture typecheck
        id: typecheck
        continue-on-error: true
        run: |
          set -o pipefail
          npm run typecheck 2>&1 | tee /tmp/issue-494-typecheck.log

      - name: Capture integration tests
        id: integration
        continue-on-error: true
        run: |
          set -o pipefail
          npm run test:integration --workspace @solverfin/api 2>&1 | tee /tmp/issue-494-integration.log

      - name: Write diagnostic summary
        if: always()
        run: |
          mkdir -p artifacts/issue-494-diagnostics
          cp /tmp/issue-494-typecheck.log artifacts/issue-494-diagnostics/typecheck.log || true
          cp /tmp/issue-494-integration.log artifacts/issue-494-diagnostics/integration.log || true
          cat > artifacts/issue-494-diagnostics/summary.txt <<EOF
          typecheck=${{ steps.typecheck.outcome }}
          integration=${{ steps.integration.outcome }}
          commit=${{ github.sha }}
          EOF

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-494-diagnostics-${{ github.sha }}
          path: artifacts/issue-494-diagnostics
          if-no-files-found: error
          retention-days: 2

      - name: Publish verified correction
        if: steps.typecheck.outcome == 'success' && steps.integration.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/api/src/repositories/imports.ts
          git diff --cached --check
          git commit -m "fix: restringir payload das linhas revisáveis de importação"
          git push origin HEAD:feat/494-csv-import-review

      - name: Fail when a diagnostic command failed
        if: always()
        run: |
          test "${{ steps.typecheck.outcome }}" = "success"
          test "${{ steps.integration.outcome }}" = "success"
