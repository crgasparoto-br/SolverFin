name: Issue 494 apply audited fixes

on:
  push:
    branches:
      - feat/494-csv-import-review

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: feat/494-csv-import-review
      - name: Apply audited implementation patch
        shell: bash
        run: |
          if [ ! -f .github/issue-494.patch ]; then
            echo "No implementation patch to apply."
            exit 0
          fi
          git apply --index .github/issue-494.patch
          git rm .github/issue-494.patch
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "fix: concluir ajustes da auditoria da issue 494"
          git push origin HEAD:feat/494-csv-import-review
