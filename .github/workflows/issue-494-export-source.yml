name: Issue 494 CI fix workspace export

on:
  push:
    branches:
      - feat/494-csv-import-review

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: feat/494-csv-import-review
          fetch-depth: 0
      - name: Archive current workspace
        run: tar --exclude=.git -czf /tmp/solverfin-issue-494-ci-fix.tar.gz .
      - name: Upload workspace
        uses: actions/upload-artifact@v4
        with:
          name: solverfin-issue-494-ci-fix-workspace
          path: /tmp/solverfin-issue-494-ci-fix.tar.gz
          retention-days: 1
          if-no-files-found: error
