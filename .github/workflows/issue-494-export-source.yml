name: Issue 494 export source

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - feat/494-csv-import-review

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Archive source
        run: tar --exclude=.git -czf /tmp/solverfin-source.tar.gz .
      - name: Upload source
        uses: actions/upload-artifact@v4
        with:
          name: solverfin-issue-494-source
          path: /tmp/solverfin-source.tar.gz
          if-no-files-found: error
          retention-days: 1
