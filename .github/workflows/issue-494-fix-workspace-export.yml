name: Apply issue 494 audit fixes

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-audit-fixes:
    name: Apply audited fixes
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout implementation branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Rebuild patch package
        shell: bash
        run: |
          set -euo pipefail
          cat .github/issue-494-audit-fixes/part-* > /tmp/issue-494-audit-fixes.patch.xz
          sha256sum /tmp/issue-494-audit-fixes.patch.xz

      - name: Upload rebuilt patch for verification
        uses: actions/upload-artifact@v4
        with:
          name: issue-494-audit-fixes-rebuilt
          path: /tmp/issue-494-audit-fixes.patch.xz
          retention-days: 1
          if-no-files-found: error

      - name: Verify and apply patch
        shell: bash
        run: |
          set -euo pipefail
          printf '%s  %s\n' '2c92fc1f366f0b1aeca72899b6ddc017c529f3153b68f7fb752f1f0508bb8652' '/tmp/issue-494-audit-fixes.patch.xz' \
            | sha256sum --check
          xz --test /tmp/issue-494-audit-fixes.patch.xz
          xz --decompress --stdout /tmp/issue-494-audit-fixes.patch.xz > /tmp/issue-494-audit-fixes.patch
          git apply --check /tmp/issue-494-audit-fixes.patch
          git apply --index /tmp/issue-494-audit-fixes.patch

      - name: Commit fixes and remove transport files
        shell: bash
        run: |
          set -euo pipefail
          git rm -r .github/issue-494-audit-fixes
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'fix: resolver ressalvas da auditoria da issue 494'
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
