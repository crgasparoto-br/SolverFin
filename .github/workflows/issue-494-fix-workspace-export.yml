name: Issue 494 fix workspace export

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  export-workspace:
    name: Export audited workspace
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Package workspace with Git metadata
        run: tar -czf /tmp/solverfin-issue-494-fix.tar.gz --exclude=node_modules .

      - name: Upload workspace artifact
        uses: actions/upload-artifact@v4
        with:
          name: solverfin-issue-494-fix-workspace
          path: /tmp/solverfin-issue-494-fix.tar.gz
          retention-days: 1
          if-no-files-found: error
