name: Format issue 494 visual test

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  format:
    if: github.head_ref == 'feat/494-csv-import-review' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/494-csv-import-review
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci --no-audit --no-fund

      - name: Apply repository formatting
        run: |
          npx prettier --write scripts/statement-visual/inbox-csv-review.mjs
          npx prettier --check scripts/statement-visual/inbox-csv-review.mjs
          git diff --check

      - name: Publish formatted test
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/statement-visual/inbox-csv-review.mjs
          git diff --cached --check
          git commit -m "style: formatar validação visual da Inbox CSV"
          git push origin HEAD:feat/494-csv-import-review
