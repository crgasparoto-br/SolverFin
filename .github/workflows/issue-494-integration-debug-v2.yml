name: Apply issue 494 idempotency fix

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-idempotency-fix:
    name: Apply idempotency fix
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout implementation branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Apply verified fix
        shell: bash
        run: |
          set -euo pipefail
          git apply --check .github/issue-494-idempotency-fix.patch
          git apply --index .github/issue-494-idempotency-fix.patch
          git rm .github/issue-494-idempotency-fix.patch
          git rm .github/workflows/issue-494-integration-debug-v2.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'fix: preservar idempotencia em aprovacoes concorrentes'
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
