name: Fix issue 494 mobile and keyboard validation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  fix:
    if: github.head_ref == 'feat/494-csv-import-review' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/494-csv-import-review
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci --no-audit --no-fund

      - name: Fix mobile layout and native key dispatch
        run: |
          python3 - <<'PY'
          from pathlib import Path

          page = Path('apps/web/src/dev-server/inbox-page.ts')
          lines = page.read_text().splitlines()
          mobile_matches = 0
          for index, line in enumerate(lines):
              if '@media (max-width: 520px)' in line:
                  lines[index] = '    @media (max-width: 520px) { .import-summary, .row-fields, .row-summary { grid-template-columns: 1fr; } .line-filter-bar { justify-content: stretch; } .line-filter-bar label { min-width: 0; width: 100%; } .line-filter-bar select { min-width: 0; width: 100%; } .row-fields .description-field { grid-column: auto; } .import-row { grid-template-columns: 1fr; } .candidate-list { grid-column: 1; } }'
                  mobile_matches += 1
          if mobile_matches != 1:
              raise SystemExit(f'Unexpected mobile media query matches: {mobile_matches}')
          page.write_text('\n'.join(lines) + '\n')

          test = Path('scripts/statement-visual/inbox-csv-review.mjs')
          lines = test.read_text().splitlines()
          function_start = next(
              (index for index, line in enumerate(lines) if line.startswith('async function pressKey(')),
              None,
          )
          if function_start is None:
              raise SystemExit('pressKey function was not found')
          function_end = next(
              (index for index in range(function_start + 1, len(lines)) if lines[index] == '}'),
              None,
          )
          if function_end is None:
              raise SystemExit('pressKey function end was not found')
          keydown_matches = 0
          windows_matches = 0
          index = function_start
          while index <= function_end:
              if 'type: "keyDown"' in lines[index]:
                  lines[index] = lines[index].replace('type: "keyDown"', 'type: "rawKeyDown"')
                  keydown_matches += 1
              if 'windowsVirtualKeyCode: keyCode,' in lines[index]:
                  indent = lines[index][: len(lines[index]) - len(lines[index].lstrip())]
                  lines.insert(index + 1, f'{indent}nativeVirtualKeyCode: keyCode,')
                  windows_matches += 1
                  function_end += 1
                  index += 1
              index += 1
          if keydown_matches != 1 or windows_matches != 2:
              raise SystemExit(
                  f'Unexpected key dispatch matches: keydown={keydown_matches}, windows={windows_matches}'
              )
          test.write_text('\n'.join(lines) + '\n')
          PY
          npx prettier --write apps/web/src/dev-server/inbox-page.ts scripts/statement-visual/inbox-csv-review.mjs
          npx prettier --check apps/web/src/dev-server/inbox-page.ts scripts/statement-visual/inbox-csv-review.mjs
          git diff --check

      - name: Publish mobile and keyboard corrections
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/web/src/dev-server/inbox-page.ts scripts/statement-visual/inbox-csv-review.mjs
          git diff --cached --check
          git commit -m "fix: ajustar revisão CSV no mobile e teclado"
          git push origin HEAD:feat/494-csv-import-review
