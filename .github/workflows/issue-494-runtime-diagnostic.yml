name: Instrument issue 494 runtime errors

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  instrument:
    if: github.head_ref == 'feat/494-csv-import-review' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/494-csv-import-review
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci --no-audit --no-fund

      - name: Capture browser runtime errors
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('scripts/statement-visual/inbox-csv-review.mjs')
          text = path.read_text()
          old = '''  const batchId = fixture.body.importBatch.id;

          await navigate(cdp, `${baseUrl}/inbox?importBatchId=${encodeURIComponent(batchId)}`);'''
          new = '''  const batchId = fixture.body.importBatch.id;

          await cdp.send("Page.addScriptToEvaluateOnNewDocument", {
            source: `
              window.__solverfinRuntimeErrors = [];
              window.addEventListener("error", (event) => {
                window.__solverfinRuntimeErrors.push({
                  type: "error",
                  message: event.message,
                  filename: event.filename,
                  line: event.lineno,
                  column: event.colno,
                  stack: event.error?.stack
                });
              });
              window.addEventListener("unhandledrejection", (event) => {
                window.__solverfinRuntimeErrors.push({
                  type: "unhandledrejection",
                  message: event.reason?.message || String(event.reason),
                  stack: event.reason?.stack
                });
              });
            `,
          });
          await navigate(cdp, `${baseUrl}/inbox?importBatchId=${encodeURIComponent(batchId)}`);'''
          if old not in text:
              raise SystemExit('Expected batch navigation block was not found')
          text = text.replace(old, new, 1)
          old = '''          href: window.location.href,
                    workspaceStatus: document.getElementById('import-workspace-status')?.textContent || '', '''
          new = '''          href: window.location.href,
                    runtimeErrors: window.__solverfinRuntimeErrors || [],
                    workspaceStatus: document.getElementById('import-workspace-status')?.textContent || '', '''
          if old not in text:
              raise SystemExit('Expected page diagnostic block was not found')
          path.write_text(text.replace(old, new, 1))
          PY
          npx prettier --write scripts/statement-visual/inbox-csv-review.mjs
          npx prettier --check scripts/statement-visual/inbox-csv-review.mjs
          git diff --check

      - name: Publish runtime diagnostics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/statement-visual/inbox-csv-review.mjs
          git diff --cached --check
          git commit -m "test: capturar erros de runtime da Inbox CSV"
          git push origin HEAD:feat/494-csv-import-review
