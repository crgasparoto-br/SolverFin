name: Fix issue 494 inline runtime script

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  fix:
    if: github.head_ref == 'feat/494-csv-import-review' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/494-csv-import-review
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci --no-audit --no-fund

      - name: Escape confirmation newlines in generated script
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('apps/web/src/dev-server/inbox-page.ts')
          text = path.read_text()
          replacements = [
              (r'" linha(s)?\nReceitas: "', r'" linha(s)?\\nReceitas: "'),
              (r'"\nDespesas: "', r'"\\nDespesas: "'),
              (r'"\nCada linha será validada e processada separadamente."', r'"\\nCada linha será validada e processada separadamente."'),
          ]
          for old, new in replacements:
              if old not in text:
                  raise SystemExit(f'Expected inline-script fragment was not found: {old}')
              text = text.replace(old, new, 1)
          path.write_text(text)
          PY
          npx prettier --write apps/web/src/dev-server/inbox-page.ts
          npx prettier --check apps/web/src/dev-server/inbox-page.ts
          git diff --check

      - name: Publish runtime correction
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/web/src/dev-server/inbox-page.ts
          git diff --cached --check
          git commit -m "fix: escapar quebras no script inline da Inbox CSV"
          git push origin HEAD:feat/494-csv-import-review
