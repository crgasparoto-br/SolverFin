name: Enhance issue 494 visual diagnostics

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  enhance:
    if: github.head_ref == 'feat/494-csv-import-review' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/494-csv-import-review
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci --no-audit --no-fund

      - name: Capture page and API state on timeout
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('scripts/statement-visual/inbox-csv-review.mjs')
          text = path.read_text()
          old = '''  await navigate(cdp, `${baseUrl}/inbox?importBatchId=${encodeURIComponent(batchId)}`);
            await waitFor(cdp, `Boolean(document.querySelector('[data-line-action="edit"]'))`);'''
          new = '''  await navigate(cdp, `${baseUrl}/inbox?importBatchId=${encodeURIComponent(batchId)}`);
            try {
              await waitFor(cdp, `Boolean(document.querySelector('[data-line-action="edit"]'))`);
            } catch (error) {
              const pageDiagnostic = await evaluate(
                cdp,
                `(async () => {
                  const readJson = async (path) => {
                    const response = await fetch(path);
                    return { status: response.status, body: await response.json().catch(() => ({})) };
                  };
                  const list = await readJson('/api/import-batches?sourceKind=csv&status=all');
                  const detailResponse = await readJson('/api/import-batches/${batchId}');
                  return {
                    href: window.location.href,
                    workspaceStatus: document.getElementById('import-workspace-status')?.textContent || '',
                    workspaceClass: document.getElementById('import-workspace-status')?.className || '',
                    batchListText: document.getElementById('import-batch-list')?.textContent || '',
                    detailText: document.getElementById('import-batch-detail')?.textContent || '',
                    detailHtml: (document.getElementById('import-batch-detail')?.innerHTML || '').slice(0, 4000),
                    bodyText: (document.body?.innerText || '').slice(0, 4000),
                    editActions: document.querySelectorAll('[data-line-action="edit"]').length,
                    list,
                    detailResponse
                  };
                })()`,
              );
              await screenshot(cdp, join(outputDir, 'issue-494-inbox-csv-timeout.png'));
              throw new Error(
                `${error instanceof Error ? error.message : String(error)}; page=${JSON.stringify(pageDiagnostic)}`,
              );
            }'''
          if old not in text:
              raise SystemExit('Expected Inbox wait block was not found')
          path.write_text(text.replace(old, new, 1))
          PY
          npx prettier --write scripts/statement-visual/inbox-csv-review.mjs
          npx prettier --check scripts/statement-visual/inbox-csv-review.mjs
          git diff --check

      - name: Publish diagnostic enhancement
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/statement-visual/inbox-csv-review.mjs
          git diff --cached --check
          git commit -m "test: detalhar falha visual da Inbox CSV"
          git push origin HEAD:feat/494-csv-import-review
