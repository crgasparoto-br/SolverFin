name: Apply issue 494 implementation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-implementation:
    name: Apply implementation patch
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout implementation branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Rebuild patch package
        shell: bash
        run: |
          set -euo pipefail
          cat .github/issue-494-patch/part-00 .github/issue-494-patch/part-01 .github/issue-494-patch/part-02 \
            | base64 --decode > /tmp/issue-494.patch.xz
          cat .github/issue-494-patch/part-03a0 .github/issue-494-patch/part-03a1 .github/issue-494-patch/part-03a2 \
            .github/issue-494-patch/part-03b .github/issue-494-patch/part-03c \
            .github/issue-494-patch/part-04 .github/issue-494-patch/part-05 \
            >> /tmp/issue-494.patch.xz
          sha256sum /tmp/issue-494.patch.xz

      - name: Upload rebuilt package
        uses: actions/upload-artifact@v4
        with:
          name: issue-494-patch-rebuilt-v3
          path: /tmp/issue-494.patch.xz
          retention-days: 1
          if-no-files-found: error

      - name: Verify and apply patch
        shell: bash
        run: |
          set -euo pipefail
          printf '%s  %s\n' '40c2f9f16bb7c306c057e00bdafba9ec7e0d0003da39d051eee0b05d6092fa1b' '/tmp/issue-494.patch.xz' \
            | sha256sum --check
          xz --test /tmp/issue-494.patch.xz
          xz --decompress --stdout /tmp/issue-494.patch.xz > /tmp/issue-494.patch
          git apply --check /tmp/issue-494.patch
          git apply --index /tmp/issue-494.patch

      - name: Commit implementation and remove transport files
        shell: bash
        run: |
          set -euo pipefail
          git rm -r .github/issue-494-patch
          git rm .github/workflows/issue-494-workspace-export.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'feat: concluir importacao CSV com revisao humana (#494)'
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
