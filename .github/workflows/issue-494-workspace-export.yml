name: Apply issue 494 implementation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-implementation:
    name: Apply implementation patch
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout implementation branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Rebuild and verify patch
        shell: bash
        run: |
          set -euo pipefail
          cat .github/issue-494-patch/part-00 .github/issue-494-patch/part-01 .github/issue-494-patch/part-02 \
            | base64 --decode > /tmp/issue-494.patch.xz
          cat .github/issue-494-patch/part-03 .github/issue-494-patch/part-04 .github/issue-494-patch/part-05 \
            >> /tmp/issue-494.patch.xz
          printf '%s  %s\n' '1b5a8515f5fba2a8a1b44f24db24e9a112c30b39552e2486261e6c54cf7f8f85' '/tmp/issue-494.patch.xz' \
            | sha256sum --check
          xz --decompress --stdout /tmp/issue-494.patch.xz > /tmp/issue-494.patch
          git apply --check /tmp/issue-494.patch
          git apply --index /tmp/issue-494.patch

      - name: Commit implementation and remove transport files
        shell: bash
        run: |
          set -euo pipefail
          git rm -r .github/issue-494-patch
          git rm .github/workflows/issue-494-workspace-export.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'feat: concluir importacao CSV com revisao humana (#494)'
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
