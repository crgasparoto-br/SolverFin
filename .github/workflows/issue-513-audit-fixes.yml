name: Issue 513 audit fixes

on:
  push:
    branches:
      - feat/513-csv-value-inference
    paths:
      - .github/issue-513-audit-fixes.trigger

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: feat/513-csv-value-inference
          fetch-depth: 0

      - name: Apply audit fixes
        run: node .github/scripts/issue-513-audit-fixes.mjs

      - name: Commit functional changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/domain/src/imports.ts packages/domain/src/imports.test.ts apps/api/src/csv-import-review.integration.test.ts scripts/statement-visual/inbox-csv-review.mjs
          git diff --cached --quiet && { echo "No functional changes to commit"; exit 1; }
          git commit -m "fix: concluir requisitos da issue 513"
          git push origin HEAD:feat/513-csv-value-inference
