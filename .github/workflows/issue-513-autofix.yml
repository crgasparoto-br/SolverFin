name: Issue 513 autofix

on:
  push:
    branches:
      - feat/513-csv-value-inference
    paths:
      - .github/issue-513-trigger.txt

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: feat/513-csv-value-inference
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply issue 513 correction
        run: node scripts/issue-513-autofix.mjs

      - name: Format changed files
        run: npx prettier --write packages/domain/src/imports.ts packages/domain/src/imports.test.ts apps/api/src/csv-import-review.integration.test.ts scripts/statement-visual/inbox-csv-review.mjs

      - name: Run focused domain tests
        run: npm run test --workspace @solverfin/domain

      - name: Run focused typecheck
        run: npm run typecheck --workspace @solverfin/domain

      - name: Check diff
        run: git diff --check

      - name: Commit correction
        run: |
          git config user.name "solverfin-automation"
          git config user.email "actions@users.noreply.github.com"
          git add packages/domain/src/imports.ts packages/domain/src/imports.test.ts apps/api/src/csv-import-review.integration.test.ts scripts/statement-visual/inbox-csv-review.mjs
          git commit -m "fix: detectar estrategia CSV somente quando necessaria"
          git push origin HEAD:feat/513-csv-value-inference
