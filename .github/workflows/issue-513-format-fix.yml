name: Issue 513 format fix

on:
  push:
    branches:
      - feat/513-csv-value-inference
    paths:
      - .github/issue-513-format-fix.trigger

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: feat/513-csv-value-inference
          fetch-depth: 0

      - name: Apply formatting fix
        run: node .github/scripts/issue-513-format-fix.mjs

      - name: Commit formatting fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/api/src/csv-import-review.integration.test.ts
          git diff --cached --quiet && { echo "No formatting changes to commit"; exit 1; }
          git commit -m "style: formatar teste da issue 513"
          git push origin HEAD:feat/513-csv-value-inference
