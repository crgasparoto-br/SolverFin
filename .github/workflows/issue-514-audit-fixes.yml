name: Issue 514 audit fixer

on:
  push:
    branches:
      - feat/514-inbox-category-hierarchy
    paths:
      - .github/issue-514-audit.trigger

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: feat/514-inbox-category-hierarchy
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Apply audit fixes
        run: |
          sed -i 's/selectable: category.status === "active",/selectable: category.status === "active" \&\& (category.kind === "income" || category.kind === "expense"),/' apps/web/src/dev-server/inbox-category-hierarchy-enhancement.ts
          npm exec prettier -- --write \
            apps/web/src/dev-server/inbox-category-hierarchy-enhancement.ts \
            apps/web/src/dev-server/inbox-category-hierarchy-enhancement.test.ts \
            apps/api/src/csv-import-category-hierarchy.integration.test.ts
      - name: Validate lint and types
        run: |
          npm run lint
          npm run typecheck
          npm run test --workspace @solverfin/web
      - name: Commit fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            apps/web/src/dev-server/inbox-category-hierarchy-enhancement.ts \
            apps/web/src/dev-server/inbox-category-hierarchy-enhancement.test.ts \
            apps/api/src/csv-import-category-hierarchy.integration.test.ts
          git diff --cached --quiet && exit 0
          git commit -m "test: close issue 514 audit gaps"
          git push origin HEAD:feat/514-inbox-category-hierarchy
