name: Issue 514 fix visual keyboard

on:
  push:
    branches:
      - feat/514-inbox-category-hierarchy
    paths:
      - .github/workflows/issue-514-fix-visual-keyboard.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/514-inbox-category-hierarchy
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Align keyboard helper with established visual tests
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('scripts/statement-visual/inbox-category-hierarchy.mjs')
          text = path.read_text()
          old = '''async function waitFor(cdp, expression, timeoutMs = 10000) {
            const started = Date.now();
            while (Date.now() - started < timeoutMs) {
              if (await evaluate(cdp, expression)) return;
              await sleep(100);
            }
            throw new Error(`Timed out waiting for: ${expression}`);
          }

          async function pressKey(cdp, key, code, keyCode) {
            await cdp.send("Input.dispatchKeyEvent", {
              type: "rawKeyDown",
              key,
              code,
              windowsVirtualKeyCode: keyCode,
              nativeVirtualKeyCode: keyCode,
            });
            await cdp.send("Input.dispatchKeyEvent", {
              type: "keyUp",
              key,
              code,
              windowsVirtualKeyCode: keyCode,
              nativeVirtualKeyCode: keyCode,
            });
          }
          '''
          new = '''async function waitFor(cdp, expression, timeoutMs = 20_000) {
            const started = Date.now();
            while (Date.now() - started < timeoutMs) {
              try {
                if (await evaluate(cdp, expression)) return;
              } catch {
                // The execution context can be replaced while navigation settles.
              }
              await sleep(100);
            }
            throw new Error(`Timed out waiting for: ${expression}`);
          }

          async function pressKey(cdp, key, code, keyCode) {
            await cdp.send("Input.dispatchKeyEvent", {
              type: "keyDown",
              key,
              code,
              windowsVirtualKeyCode: keyCode,
              nativeVirtualKeyCode: keyCode,
              text: key === "Enter" ? "\\r" : key.length === 1 ? key : "",
              unmodifiedText: key === "Enter" ? "\\r" : key.length === 1 ? key : "",
            });
            await cdp.send("Input.dispatchKeyEvent", {
              type: "keyUp",
              key,
              code,
              windowsVirtualKeyCode: keyCode,
              nativeVirtualKeyCode: keyCode,
            });
            await sleep(100);
          }
          '''
          if old not in text:
              raise SystemExit('keyboard helper anchor not found')
          path.write_text(text.replace(old, new))
          PY
          npx prettier --write scripts/statement-visual/inbox-category-hierarchy.mjs
          rm .github/workflows/issue-514-fix-visual-keyboard.yml
      - name: Commit fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "test: align issue 514 keyboard simulation"
          git push origin HEAD:feat/514-inbox-category-hierarchy
