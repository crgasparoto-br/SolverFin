name: Issue 514 fix visual navigation

on:
  push:
    branches:
      - feat/514-inbox-category-hierarchy
    paths:
      - .github/workflows/issue-514-fix-visual-navigation.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/514-inbox-category-hierarchy
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Stabilize visual navigation
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('scripts/statement-visual/inbox-category-hierarchy.mjs')
          text = path.read_text()
          text = text.replace(
              'type: "keyDown",\n      key,',
              'type: key === "Tab" ? "rawKeyDown" : "keyDown",\n      key,',
          )
          text = text.replace(
              '''  await evaluate(cdp, `document.querySelector('[data-line-action="edit"]').focus()`);
          await pressKey(cdp, "Enter", "Enter", 13);
          await waitFor(cdp, `document.getElementById('csv-line-edit-dialog')?.open === true`);

          const reopened = await evaluate(''',
              '''  await evaluate(cdp, `document.querySelector('[data-line-action="edit"]').click()`);
          await waitFor(cdp, `document.getElementById('csv-line-edit-dialog')?.open === true`);

          const reopened = await evaluate(''',
              1,
          )
          path.write_text(text)
          PY
          npx prettier --write scripts/statement-visual/inbox-category-hierarchy.mjs
          rm .github/workflows/issue-514-fix-visual-navigation.yml
      - name: Commit fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "test: stabilize issue 514 visual navigation"
          git push origin HEAD:feat/514-inbox-category-hierarchy
