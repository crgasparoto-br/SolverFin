name: Issue 514 format

on:
  push:
    branches:
      - feat/514-inbox-category-hierarchy
    paths:
      - .github/workflows/issue-514-format.yml

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/514-inbox-category-hierarchy
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Format affected files
        run: |
          npx prettier --write \
            apps/web/src/dev-server.ts \
            apps/web/src/dev-server/inbox-page.ts \
            apps/web/src/dev-server/inbox-category-hierarchy-enhancement.test.ts \
            apps/web/src/dev-server/inbox-category-hierarchy-first-render.test.ts \
            scripts/run-statement-visual-validation.mjs \
            scripts/statement-visual/inbox-category-hierarchy.mjs
          rm .github/workflows/issue-514-format.yml
      - name: Commit formatting
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "style: format issue 514 changes"
          git push origin HEAD:feat/514-inbox-category-hierarchy
