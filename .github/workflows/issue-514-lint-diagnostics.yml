name: Issue 514 lint fixer

on:
  push:
    branches:
      - feat/514-inbox-category-hierarchy
    paths:
      - .github/issue-514-lint.trigger

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: feat/514-inbox-category-hierarchy
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Apply focused lint fixes
        run: |
          sed -i '/import { renderInboxPage } from "\.\/dev-server\/inbox-page\.js";/d' apps/web/src/dev-server.ts
          npm exec eslint -- --fix apps/web/src/dev-server/inbox-category-hierarchy-enhancement.ts
          npm exec prettier -- --write apps/web/src/dev-server.ts apps/web/src/dev-server/inbox-category-hierarchy-enhancement.ts
      - name: Verify web lint
        run: npm run lint --workspace @solverfin/web
      - name: Commit fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/web/src/dev-server.ts apps/web/src/dev-server/inbox-category-hierarchy-enhancement.ts
          git diff --cached --quiet && exit 0
          git commit -m "fix(web): satisfy lint for issue 514"
          git push origin HEAD:feat/514-inbox-category-hierarchy
