name: Issue 514 maintenance

on:
  push:
    branches:
      - feat/514-inbox-category-hierarchy
    paths:
      - .github/workflows/issue-514-maintenance.yml

permissions:
  contents: write

jobs:
  apply-fixes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/514-inbox-category-hierarchy
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Apply audited fixes
        shell: bash
        run: |
          echo '' | base64 -d > /tmp/issue514-maintenance.mjs
          node /tmp/issue514-maintenance.mjs
      - name: Commit fixes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "fix: harden issue 514 category hierarchy"
          git push origin HEAD:feat/514-inbox-category-hierarchy
