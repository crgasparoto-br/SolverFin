name: Apply issue 515 audit fixes v2

on:
  push:
    branches:
      - fix/515-import-transactions-statement

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[issue-515-applied]')
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/515-import-transactions-statement
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Apply corrections
        run: python3 scripts/apply-issue-515-audit-fixes.py

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Format changed files
        run: >-
          npx prettier --write
          apps/web/src/dev-server/inbox-page.ts
          apps/web/src/dev-server/import-statement-navigation.ts
          apps/web/src/dev-server/import-statement-navigation.test.ts
          apps/api/src/csv-import-timeout-recovery.integration.test.ts
          apps/api/src/zz-csv-import-pending-migration-recovery.integration.test.ts
          scripts/diagnose-import-statement-consistency.mjs
          package.json
          .github/workflows/ci.yml
          docs/IMPORT_STATEMENT_VISIBILITY.md

      - name: Commit corrections
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/api apps/web scripts/diagnose-import-statement-consistency.mjs package.json .github/workflows/ci.yml docs/IMPORT_STATEMENT_VISIBILITY.md
          git commit -m "[issue-515-applied] fix: corrigir lacunas finais da issue 515"
          git push origin HEAD:fix/515-import-transactions-statement
