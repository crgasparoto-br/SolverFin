name: Diagnose issue 515 consistency test

on:
  push:
    branches:
      - fix/515-import-transactions-statement

permissions:
  contents: write

jobs:
  diagnostic-test:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://solverfin:solverfin_ci_password@localhost:5432/solverfin_ci?schema=public

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: solverfin_ci
          POSTGRES_USER: solverfin
          POSTGRES_PASSWORD: solverfin_ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U solverfin -d solverfin_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/515-import-transactions-statement
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Prepare database and packages
        run: |
          npm run prisma:generate
          npm run build:packages
          npm run db:deploy
          npm run db:seed

      - name: Compile integration tests
        run: >-
          npx tsc -p apps/api/tsconfig.test.json
          --outDir .tmp-tests/issue-515-diagnostic

      - name: Run focused diagnostic test
        id: diagnostic
        shell: bash
        run: |
          set +e
          node .tmp-tests/issue-515-diagnostic/csv-import-consistency-diagnostic.integration.test.js > issue-515-diagnostic.log 2>&1
          status=$?
          cat issue-515-diagnostic.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Commit temporary diagnostic log
        shell: bash
        run: |
          mkdir -p artifacts
          cp issue-515-diagnostic.log artifacts/issue-515-diagnostic.log
          printf '\nexit_status=%s\n' "${{ steps.diagnostic.outputs.status }}" >> artifacts/issue-515-diagnostic.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add artifacts/issue-515-diagnostic.log
          git commit -m "chore: publicar log temporario da regressao 515"
          git push origin HEAD:fix/515-import-transactions-statement
