name: Fix issue 515 diagnostic parser

on:
  push:
    branches:
      - fix/515-import-transactions-statement

permissions:
  contents: write

jobs:
  fix-parser:
    if: github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[fix-parser-515]')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/515-import-transactions-statement
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Apply compatible parser
        run: |
          python3 <<'PY'
          from pathlib import Path

          path = Path("apps/api/src/csv-import-consistency-diagnostic.integration.test.ts")
          text = path.read_text()
          old = '''  const jsonLine = result.stdout
            .split(/\\r?\\n/u)
            .map((line) => line.trim())
            .findLast((line) => line.startsWith("{"));
          assert.ok(jsonLine, `Diagnostic command must return JSON\\n${result.stdout}`);
          const body = JSON.parse(jsonLine) as {
            approvedImportSuggestionsWithoutTransaction?: number;
          };
          assert.equal(typeof body.approvedImportSuggestionsWithoutTransaction, "number");
          return body.approvedImportSuggestionsWithoutTransaction;'''
          new = '''  const jsonLine = result.stdout
            .split(/\\r?\\n/u)
            .map((line) => line.trim())
            .reverse()
            .find((line) => line.startsWith("{"));
          assert.ok(jsonLine, `Diagnostic command must return JSON\\n${result.stdout}`);
          const body = JSON.parse(jsonLine) as {
            approvedImportSuggestionsWithoutTransaction?: number;
          };
          const count = body.approvedImportSuggestionsWithoutTransaction;
          assert.ok(typeof count === "number");
          return count;'''
          if old not in text:
              raise SystemExit("diagnostic parser block not found")
          path.write_text(text.replace(old, new, 1))
          PY

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Format test
        run: npx prettier --write apps/api/src/csv-import-consistency-diagnostic.integration.test.ts

      - name: Commit fix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/api/src/csv-import-consistency-diagnostic.integration.test.ts
          git commit -m "[fix-parser-515] test: manter parser compativel com lib atual"
          git push origin HEAD:fix/515-import-transactions-statement
