name: Format issue 515 files

on:
  push:
    branches:
      - fix/515-import-transactions-statement

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[format-515]')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/515-import-transactions-statement
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Format audited files
        run: >-
          npx prettier --write
          apps/api/src/csv-import-consistency-diagnostic.integration.test.ts
          scripts/diagnose-import-statement-consistency.mjs
          docs/IMPORT_STATEMENT_VISIBILITY.md

      - name: Commit canonical formatting
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No formatting changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            apps/api/src/csv-import-consistency-diagnostic.integration.test.ts \
            scripts/diagnose-import-statement-consistency.mjs \
            docs/IMPORT_STATEMENT_VISIBILITY.md
          git commit -m "[format-515] style: aplicar formatter canonico"
          git push origin HEAD:fix/515-import-transactions-statement
