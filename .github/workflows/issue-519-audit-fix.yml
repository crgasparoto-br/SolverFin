name: Issue 519 patch diagnostic

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Inspect corrupted patch section
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh api -H "Accept: application/vnd.github.raw+json" \
            "repos/${GITHUB_REPOSITORY}/git/blobs/6c196ba096de78bd1cddb716a6ef3ff7e2a78204" \
            > /tmp/issue519.patch
          echo "lines=$(wc -l < /tmp/issue519.patch) bytes=$(wc -c < /tmp/issue519.patch)"
          nl -ba /tmp/issue519.patch | sed -n '185,245p'
