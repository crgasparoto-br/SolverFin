name: Issue 519 patch diagnostic

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Normalize binary patch and validate
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git clone --quiet --depth 1 --branch feat/519-csv-transfer-review \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" repo
          cd repo
          gh api -H "Accept: application/vnd.github.raw+json" \
            "repos/${GITHUB_REPOSITORY}/git/blobs/6c196ba096de78bd1cddb716a6ef3ff7e2a78204" \
            > /tmp/issue519.patch
          python3 - <<'PY'
          from pathlib import Path
          path = Path('/tmp/issue519.patch')
          lines = path.read_bytes().splitlines(keepends=True)
          normalized = []
          in_hunk = False
          fixed = []
          for number, line in enumerate(lines, 1):
              if line.startswith(b'diff --git '):
                  in_hunk = False
              elif line.startswith(b'@@ '):
                  in_hunk = True
              if in_hunk and not line.startswith((b'+', b'-', b' ', b'\\', b'@@')):
                  line = b'+' + line
                  fixed.append(number)
              normalized.append(line)
          path.write_bytes(b''.join(normalized))
          print('normalized_lines=' + ','.join(map(str, fixed)))
          PY
          git apply --check --verbose --exclude=.github/workflows/issue-519-audit-fix.yml /tmp/issue519.patch
