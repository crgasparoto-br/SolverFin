name: Issue 519 patch diagnostic

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Inspect patch segments
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh api -H "Accept: application/vnd.github.raw+json" \
            "repos/${GITHUB_REPOSITORY}/git/blobs/6c196ba096de78bd1cddb716a6ef3ff7e2a78204" \
            > /tmp/issue519.patch
          python3 - <<'PY'
          from pathlib import Path
          data = Path('/tmp/issue519.patch').read_bytes()
          prefix, sep, trailing = data.rpartition(b'\n')
          print('total_bytes=', len(data))
          print('prefix_bytes=', len(prefix) + len(sep))
          print('trailing_bytes=', len(trailing))
          print('trailing_head_hex=', trailing[:48].hex())
          print('trailing_tail_hex=', trailing[-48:].hex())
          print('prefix_tail=', repr(prefix[-500:]))
          PY
          file /tmp/issue519.patch
