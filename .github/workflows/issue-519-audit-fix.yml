name: Issue 519 patch diagnostic

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/519-csv-transfer-review
          fetch-depth: 0
      - name: Inspect correction patch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -u
          gh api -H "Accept: application/vnd.github.raw+json" \
            "repos/${GITHUB_REPOSITORY}/git/blobs/6c196ba096de78bd1cddb716a6ef3ff7e2a78204" \
            > /tmp/issue519.patch.gz
          file /tmp/issue519.patch.gz
          gzip -t /tmp/issue519.patch.gz
          gzip -dc /tmp/issue519.patch.gz > /tmp/issue519.patch
          echo "--- PATCH STAT ---"
          git apply --stat /tmp/issue519.patch
          echo "--- PATCH CHECK ---"
          git apply --check --verbose /tmp/issue519.patch
