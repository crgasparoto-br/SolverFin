name: Issue 519 reconstructed correction cycle

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: issue-519-reconstructed-correction
  cancel-in-progress: false

jobs:
  correct-validate-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://solverfin:solverfin_ci_password@localhost:5432/solverfin_ci?schema=public
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: solverfin_ci
          POSTGRES_USER: solverfin
          POSTGRES_PASSWORD: solverfin_ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U solverfin -d solverfin_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/519-csv-transfer-review
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Reconstruct integration coverage and apply audit fixes
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          prefix_path = Path('.github/issue519-patch-prefix.txt')
          prefix = prefix_path.read_text()
          prefix = prefix.replace('/decision`', '/approve`')
          prefix = prefix.replace('    { decision: "approve"},\n', '')

          tail = r'''

          async function assertConcurrentEndpointsConverge(
            token: string,
            fixtures: { suffix: string; reference: string; third: string },
          ): Promise<void> {
            const outgoing = await createBatch(token, {
              fileName: `transfer-concurrent-out-${fixtures.suffix}.csv`,
              content: `date,description,amount\n2026-07-25,Concurrent out ${fixtures.suffix},-71.23`,
              accountId: fixtures.reference,
            });
            const incoming = await createBatch(token, {
              fileName: `transfer-concurrent-in-${fixtures.suffix}.csv`,
              content: `date,description,amount\n2026-07-26,Concurrent in ${fixtures.suffix},71.23`,
              accountId: fixtures.third,
            });
            const outgoingSuggestion = requireSuggestion(outgoing);
            const incomingSuggestion = requireSuggestion(incoming);
            assert.equal(
              (await patchSuggestion(token, outgoing.importBatch.id, outgoingSuggestion.id, {
                kind: "transfer",
                otherAccountId: fixtures.third,
              })).statusCode,
              200,
            );
            assert.equal(
              (await patchSuggestion(token, incoming.importBatch.id, incomingSuggestion.id, {
                kind: "transfer",
                otherAccountId: fixtures.reference,
              })).statusCode,
              200,
            );

            const responses = await Promise.all([
              approveSuggestion(token, outgoing.importBatch.id, outgoingSuggestion.id),
              approveSuggestion(token, incoming.importBatch.id, incomingSuggestion.id),
            ]);
            assert.deepEqual(
              responses.map((response) => response.statusCode),
              [200, 200],
            );
            const results = responses.map((response) => readBody<ApprovalResult>(response));
            assert.equal(new Set(results.map((result) => result.transaction.id)).size, 1);
            assert.equal(results.filter((result) => result.outcome === "created").length, 1);
            assert.equal(
              results.filter(
                (result) => result.outcome === "reconciled" || result.outcome === "idempotent",
              ).length,
              1,
            );

            const rows = await query<{ count: number }>(
              `select count(*)::int as "count" from "Transaction"
               where "kind" = 'TRANSFER' and "accountId" = $1 and "destinationAccountId" = $2
                 and "amountMinor" = 7123 and "occurredOn" between '2026-07-25' and '2026-07-26'`,
              [fixtures.reference, fixtures.third],
            );
            assert.equal(rows[0]?.count, 1, "Concurrent endpoints must persist one transfer");
          }

          async function assertMixedBulkSummary(
            token: string,
            fixtures: { suffix: string; reference: string; other: string },
          ): Promise<void> {
            const detail = await createBatch(token, {
              fileName: `transfer-mixed-bulk-${fixtures.suffix}.csv`,
              content: [
                "date,description,amount",
                `2026-07-27,Mixed income ${fixtures.suffix},101.00`,
                `2026-07-28,Mixed expense ${fixtures.suffix},-51.00`,
                `2026-07-29,Mixed transfer ${fixtures.suffix},-26.00`,
              ].join("\n"),
              accountId: fixtures.reference,
            });
            assert.equal(detail.suggestions.length, 3);
            const transferSuggestion = requireSuggestion(detail, 2);
            const patched = await patchSuggestion(
              token,
              detail.importBatch.id,
              transferSuggestion.id,
              { kind: "transfer", otherAccountId: fixtures.other },
            );
            assert.equal(patched.statusCode, 200);

            const response = await apiRequest(
              token,
              "POST",
              `/api/import-batches/${detail.importBatch.id}/approve-selected`,
              { suggestionIds: detail.suggestions.map((suggestion) => suggestion.id) },
            );
            assert.equal(response.statusCode, 200);
            const result = readBody<BulkApprovalResult>(response);
            assert.deepEqual(result.summary, {
              requested: 3,
              approved: 3,
              failed: 0,
              created: 3,
              reconciled: 0,
              idempotent: 0,
              blocked: 0,
              transferCount: 1,
              transferTotalMinor: 2600,
            });
            assert.equal(result.results.every((item) => item.status === "approved"), true);
            assert.equal(result.results.every((item) => item.outcome === "created"), true);

            const rows = await query<{ kind: string; count: number }>(
              `select "kind"::text as "kind", count(*)::int as "count"
                 from "Transaction" where "importBatchId" = $1 group by "kind" order by "kind"`,
              [detail.importBatch.id],
            );
            assert.deepEqual(
              rows.map((row) => [row.kind.toLowerCase(), row.count]).sort(),
              [
                ["expense", 1],
                ["income", 1],
                ["transfer", 1],
              ],
            );
          }

          async function createAccount(
            token: string,
            name: string,
            currency: string,
            profileId?: string,
          ): Promise<string> {
            const path = profileId ? `/api/accounts?profileId=${profileId}` : "/api/accounts";
            const response = await apiRequest(token, "POST", path, {
              name,
              kind: "checking",
              openingBalanceMinor: 0,
              currency,
            });
            assert.equal(response.statusCode, 201);
            return readBody<{ account: { id: string } }>(response).account.id;
          }

          async function archiveAccount(token: string, accountId: string): Promise<void> {
            const response = await apiRequest(token, "POST", `/api/accounts/${accountId}/archive`);
            assert.equal(response.statusCode, 200);
          }

          async function createCategory(token: string, name: string, kind: string): Promise<string> {
            const response = await apiRequest(token, "POST", "/api/categories", { name, kind });
            assert.equal(response.statusCode, 201);
            return readBody<{ category: { id: string } }>(response).category.id;
          }

          async function createBatch(
            token: string,
            input: { fileName: string; content: string; accountId: string },
          ): Promise<ImportDetail> {
            const response = await apiRequest(token, "POST", "/api/import-batches/csv", {
              originalFileName: input.fileName,
              content: input.content,
              accountId: input.accountId,
              consentAccepted: true,
            });
            assert.equal(response.statusCode, 201);
            return readBody<ImportDetail>(response);
          }

          function patchSuggestion(
            token: string,
            importBatchId: string,
            suggestionId: string,
            body: Record<string, unknown>,
          ): Promise<ApiResponse> {
            return apiRequest(
              token,
              "PATCH",
              `/api/import-batches/${importBatchId}/suggestions/${suggestionId}`,
              body,
            );
          }

          function approveSuggestion(
            token: string,
            importBatchId: string,
            suggestionId: string,
          ): Promise<ApiResponse> {
            return apiRequest(
              token,
              "POST",
              `/api/import-batches/${importBatchId}/suggestions/${suggestionId}/approve`,
            );
          }

          async function loginAndReadToken(): Promise<string> {
            const response = await handleMvpApiRequest({
              method: "POST",
              path: "/api/session",
              body: { email: "demo@solverfin.example.invalid", password: "SolverFinDemo!2026" },
            });
            assert.equal(response.statusCode, 201);
            return readBody<{ session: { token: string } }>(response).session.token;
          }

          async function apiRequest(
            token: string,
            method: string,
            path: string,
            body?: unknown,
          ): Promise<ApiResponse> {
            const url = new URL(path, "http://solverfin.integration.test");
            const request: ApiRequest = {
              method,
              pathname: url.pathname,
              query: url.searchParams,
              headers: { authorization: `Bearer ${token}` },
              body,
            };
            const response =
              (await handleImportBatchesApiRequest(request)) ??
              (await handleDeduplicationReconciliationApiRequest(request)) ??
              (await handleApiRequest(request));
            assert.ok(response, `${method} ${path} should be handled`);
            return response;
          }

          function readBody<T>(response: Pick<ApiResponse, "body">): T {
            assert.equal(typeof response.body, "object");
            assert.notEqual(response.body, null);
            return response.body as T;
          }

          function readErrorCode(response: ApiResponse): string | undefined {
            return readBody<{ error?: { code?: string } }>(response).error?.code;
          }

          function requireSuggestion(detail: ImportDetail, index = 0): ImportSuggestion {
            const suggestion = detail.suggestions[index];
            assert.ok(suggestion, `Expected suggestion at index ${index}`);
            return suggestion;
          }

          interface ExtractionPayload {
            payloadVersion: 1 | 2;
            sourceRowNumber: number;
            sourceHash?: string;
            occurredOn?: string;
            description: string;
            kind: string;
            direction?: "inflow" | "outflow";
            amountMinor: number;
            currency: string;
            accountId?: string;
            otherAccountId?: string;
            categoryId?: string;
            externalId?: string;
          }

          interface ImportSuggestion {
            id: string;
            status: string;
            targetEntityId?: string;
            payload: ExtractionPayload;
            candidates: Array<{
              id: string;
              status: string;
              kind: string;
              targetTransactionId?: string;
            }>;
            transaction?: TransactionRecord;
          }

          interface ImportDetail {
            importBatch: {
              id: string;
              organizationId: string;
              financialProfileId: string;
              status: string;
            };
            suggestions: ImportSuggestion[];
            problems: unknown[];
          }

          interface TransactionRecord {
            id: string;
            organizationId: string;
            financialProfileId: string;
            kind: string;
            status: string;
            source: string;
            amountMinor: number;
            currency: string;
            occurredOn: string;
            plannedOn: string;
            effectiveOn?: string;
            description: string;
            accountId?: string;
            destinationAccountId?: string;
            transferGroupId?: string;
            importBatchId?: string;
            aiSuggestionId?: string;
            categoryId?: string;
          }

          interface ApprovalResult {
            outcome: string;
            idempotent: boolean;
            transaction: TransactionRecord;
          }

          interface BulkApprovalResult {
            summary: {
              requested: number;
              approved: number;
              failed: number;
              created: number;
              reconciled: number;
              idempotent: number;
              blocked: number;
              transferCount: number;
              transferTotalMinor: number;
            };
            results: Array<{ suggestionId: string; status: string; outcome: string }>;
          }
          '''

          Path('apps/api/src/csv-import-transfer-review.integration.test.ts').write_text(prefix + tail)

          imports = Path('packages/domain/src/imports.ts')
          text = imports.read_text()
          start = text.index('export function buildImportPayloadFingerprint(')
          end = text.index('\nfunction parseTransactionExtractionPayloadCommon', start)
          replacement = '''export function buildImportPayloadFingerprint(payload: TransactionExtractionPayload): string {
            const parts: Array<string | number> = [
              payload.payloadVersion,
              payload.sourceRowNumber,
              payload.sourceHash,
              payload.occurredOn,
              payload.kind,
            ];
            if (payload.payloadVersion === 2) parts.push(payload.direction);
            parts.push(payload.amountMinor, payload.currency, payload.description, payload.accountId ?? "");
            if (payload.payloadVersion === 2) parts.push(payload.otherAccountId ?? "");
            parts.push(payload.categoryId ?? "", payload.externalId ?? "");
            return buildStableImportHash(parts.join(":"));
          }
          '''
          imports.write_text(text[:start] + replacement + text[end:])

          dedup = Path('packages/domain/src/deduplication.ts')
          text = dedup.read_text()
          anchor = '''  if (candidate.kind === "transfer" && !hasSameTransferAccounts(candidate, possibleDuplicate)) {
            return [];
          }
          '''
          guard = '''  if (
            candidate.kind === "transfer" &&
            dateDistanceInDays(candidate.occurredOn, possibleDuplicate.occurredOn) > 2
          ) {
            return [];
          }
          '''
          if guard not in text:
            if anchor not in text:
              raise SystemExit('transfer account guard not found')
            text = text.replace(anchor, anchor + guard, 1)
          dedup.write_text(text)

          inbox = Path('apps/web/src/dev-server/inbox-page.ts')
          text = inbox.read_text()
          text = text.replace('formatMoney(totals.income, "BRL")', 'formatMoney(totals.income, totals.currency)')
          text = text.replace('formatMoney(totals.expense, "BRL")', 'formatMoney(totals.expense, totals.currency)')
          text = text.replace('formatMoney(totals.transfer, "BRL")', 'formatMoney(totals.transfer, totals.currency)')
          inbox.write_text(text)

          old_integration = Path('apps/api/src/csv-import-review.integration.test.ts')
          text = old_integration.read_text()
          text = text.replace('''        kind: string;
                amountMinor: number;''', '''        kind: string;
                direction: "inflow" | "outflow";
                amountMinor: number;''', 1)
          text = text.replace('''      kind: "expense",
                amountMinor: 1234,''', '''      kind: "expense",
                direction: "outflow",
                amountMinor: 1234,''', 1)
          text = text.replace('item.payload.payloadVersion === 1', 'item.payload.payloadVersion === 2', 1)
          text = text.replace(
            'summary: { requested: number; approved: number; failed: number; idempotent: number };',
            'summary: { requested: number; approved: number; failed: number; created: number; reconciled: number; idempotent: number; blocked: number; transferCount: number; transferTotalMinor: number };',
            1,
          )
          text = text.replace(
            'assert.deepEqual(bulkBody.summary, { requested: 2, approved: 1, failed: 1, idempotent: 0 });',
            'assert.deepEqual(bulkBody.summary, { requested: 2, approved: 1, failed: 1, created: 1, reconciled: 0, idempotent: 0, blocked: 0, transferCount: 0, transferTotalMinor: 0 });',
            1,
          )
          old_integration.write_text(text)

          imports_test = Path('packages/domain/src/imports.test.ts')
          text = imports_test.read_text()
          old = '''  assertEqual(
            buildImportPayloadFingerprint(rebuiltLegacy),
            buildImportPayloadFingerprint(parseTransactionExtractionPayload(rebuiltLegacy)!),
            "V1 candidate keeps the persisted payload fingerprint",
          );'''
          new = '''  assertEqual(
            buildImportPayloadFingerprint(legacyIncome),
            "fnv1a-57f1c333",
            "V1 candidate keeps the historical payload fingerprint",
          );'''
          if old not in text:
            raise SystemExit('V1 fingerprint test block not found')
          imports_test.write_text(text.replace(old, new, 1))

          dedup_test = Path('packages/domain/src/deduplication.test.ts')
          text = dedup_test.read_text()
          if 'testTransferDuplicateRejectsDistantDate();' not in text:
            text = text.replace(
              'testTransferDuplicateUsesAccountPair();',
              'testTransferDuplicateUsesAccountPair();\ntestTransferDuplicateRejectsDistantDate();',
              1,
            )
            marker = 'function testImportTransferDirectionCanonicalization(): void {'
            function = '''function testTransferDuplicateRejectsDistantDate(): void {
            const candidate = buildTransactionDeduplicationCandidate(
              buildTransaction("tx-transfer-date-candidate", tenantA, {
                kind: "transfer",
                source: "import",
                amountMinor: 25000,
                occurredOn: "2026-06-12",
                description: "Transferência recorrente",
                accountId: "account-a",
                destinationAccountId: "account-b",
              }),
            );
            const distant = buildTransactionDeduplicationCandidate(
              buildTransaction("tx-transfer-date-distant", tenantA, {
                kind: "transfer",
                source: "manual",
                amountMinor: 25000,
                occurredOn: "2026-07-12",
                description: "Transferência recorrente",
                accountId: "account-a",
                destinationAccountId: "account-b",
              }),
            );
            const reviews = detectDuplicateTransactions({
              context: tenantA,
              now,
              candidate,
              existingCandidates: [distant],
            });
            assertEqual(reviews.length, 0, "transfer candidates outside the date window are ignored");
          }

          '''
            if marker not in text:
              raise SystemExit('dedup insertion marker not found')
            text = text.replace(marker, function + marker, 1)
          dedup_test.write_text(text)

          web_test = Path('apps/web/src/dev-server/inbox-csv-import.test.ts')
          text = web_test.read_text()
          if 'uses the selected currency in bulk confirmation' not in text:
            marker = '  it("does not retain raw CSV in browser storage", () => {'
            test = '''  it("uses the selected currency in bulk confirmation and revalidates transfer fields", () => {
            assert.match(source, /formatMoney\\(totals\\.income, totals\\.currency\\)/);
            assert.match(source, /formatMoney\\(totals\\.expense, totals\\.currency\\)/);
            assert.match(source, /formatMoney\\(totals\\.transfer, totals\\.currency\\)/);
            assert.match(source, /otherField\\.hidden = !isTransfer/);
            assert.match(source, /otherAccountId\\.required = isTransfer|elements\\.otherAccountId\\.required = isTransfer/);
            assert.match(source, /accountId\\.addEventListener\\("change"/);
          });

          '''
            if marker not in text:
              raise SystemExit('web test insertion marker not found')
            text = text.replace(marker, test + marker, 1)
          web_test.write_text(text)

          prefix_path.unlink()
          Path('.github/workflows/issue-519-audit-fix.yml').unlink()
          PY
          git diff --check

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Format
        run: npm run format

      - name: Prepare database
        run: |
          npm run prisma:generate
          npm run db:deploy
          npm run db:seed

      - name: Validate monorepo
        run: npm run validate

      - name: Run PostgreSQL integration suite
        run: npm run test:integration --workspace @solverfin/api

      - name: Verify statement consistency
        run: npm run diagnose:import-statement-consistency -- --expect-zero

      - name: Publish corrections
        run: |
          set -euo pipefail
          git diff --check
          git status --short
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: complete CSV transfer review safeguards"
          git push origin HEAD:feat/519-csv-transfer-review
