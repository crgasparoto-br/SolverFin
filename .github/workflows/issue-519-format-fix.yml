name: Issue 519 format fix

on:
  push:
    branches:
      - feat/519-csv-transfer-review

permissions:
  contents: write

concurrency:
  group: issue-519-format-fix
  cancel-in-progress: false

jobs:
  format-and-publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/519-csv-transfer-review
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Format repository
        run: npm run format

      - name: Publish formatting corrections
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "No formatting changes required."
            exit 0
          fi
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "style: apply repository formatting"
          git push origin HEAD:feat/519-csv-transfer-review
