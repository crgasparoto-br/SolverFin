name: Issue 519 lint fix

on:
  push:
    branches:
      - feat/519-csv-transfer-review

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply lint fix
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh api "repos/${GITHUB_REPOSITORY}/git/blobs/f74ec5366a084f9b8ee7eef364529bf65c9a8d30" --jq .content \
            | tr -d '\n' | base64 -d > /tmp/issue519-lint-fix.patch
          if git apply --check /tmp/issue519-lint-fix.patch; then
            git apply --index /tmp/issue519-lint-fix.patch
            git diff --cached --check
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "fix: remove unused import from CSV transfer contract"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          else
            echo "Lint fix already applied."
          fi
