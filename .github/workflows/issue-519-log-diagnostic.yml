name: Issue 519 correction workflow hardening

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: issue-519-workflow-hardening
  cancel-in-progress: false

jobs:
  harden:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/519-csv-transfer-review
          fetch-depth: 0
      - name: Make fingerprint test update idempotent
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path('.github/workflows/issue-519-audit-fix.yml')
          text = path.read_text()
          start_marker = "          imports_test = Path('packages/domain/src/imports.test.ts')"
          end_marker = "\n\n          dedup_test = Path('packages/domain/src/deduplication.test.ts')"
          start = text.index(start_marker)
          end = text.index(end_marker, start)
          replacement = '''          imports_test = Path('packages/domain/src/imports.test.ts')
          text = imports_test.read_text()
          historical_message = '"V1 candidate keeps the historical payload fingerprint"'
          if historical_message not in text:
            block_start = text.index(
              '  assertEqual(\\n    buildImportPayloadFingerprint(rebuiltLegacy),'
            )
            block_end = text.index('\\n  const fingerprint =', block_start)
            new_block = '''  assertEqual(
            buildImportPayloadFingerprint(legacyIncome),
            "fnv1a-57f1c333",
            "V1 candidate keeps the historical payload fingerprint",
          );'''
            text = text[:block_start] + new_block + text[block_end:]
          imports_test.write_text(text)'''
          path.write_text(text[:start] + replacement + text[end:])
          PY
          git diff --check
          if git diff --quiet; then
            echo "Correction workflow already hardened."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/issue-519-audit-fix.yml
          git commit -m "chore: harden CSV transfer compatibility correction"
          git push origin HEAD:feat/519-csv-transfer-review
