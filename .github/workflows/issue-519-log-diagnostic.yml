name: Issue 519 V1 fingerprint bootstrap

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: issue-519-v1-fingerprint-bootstrap
  cancel-in-progress: false

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/519-csv-transfer-review
          fetch-depth: 0
      - name: Normalize legacy fingerprint test block
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import re
          from pathlib import Path

          path = Path('packages/domain/src/imports.test.ts')
          text = path.read_text()
          expected = "\n".join([
              "  assertEqual(",
              "  buildImportPayloadFingerprint(rebuiltLegacy),",
              "  buildImportPayloadFingerprint(parseTransactionExtractionPayload(rebuiltLegacy)!),",
              '  "V1 candidate keeps the persisted payload fingerprint",',
              ");",
          ])
          if expected not in text:
              pattern = re.compile(
                  r'  assertEqual\(\s*'
                  r'buildImportPayloadFingerprint\(rebuiltLegacy\),\s*'
                  r'buildImportPayloadFingerprint\(parseTransactionExtractionPayload\(rebuiltLegacy\)!\),\s*'
                  r'"V1 candidate keeps the persisted payload fingerprint",\s*'
                  r'\);'
              )
              text, count = pattern.subn(expected, text, count=1)
              if count != 1:
                  raise SystemExit('legacy fingerprint test block not found')
              path.write_text(text)
          PY
          if git diff --quiet; then
            echo "Legacy fingerprint matcher already normalized."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/domain/src/imports.test.ts
          git commit -m "chore: prepare V1 fingerprint compatibility correction"
          git push origin HEAD:feat/519-csv-transfer-review
