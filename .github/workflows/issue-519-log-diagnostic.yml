name: Issue 519 correction failure diagnostic

on:
  pull_request:
    branches:
      - main

permissions:
  actions: read
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Isolate previous correction error
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh api -H "Accept: application/vnd.github+json" \
            "repos/${GITHUB_REPOSITORY}/actions/jobs/88745012820/logs" \
            > /tmp/job.log
          sed -r 's/\x1B\[[0-9;]*[mK]//g' /tmp/job.log > /tmp/clean.log
          grep -n -E -C 8 'Traceback|SystemExit|not found|Error:|error:|##\[error\]|Process completed' /tmp/clean.log | tail -n 100 || true
