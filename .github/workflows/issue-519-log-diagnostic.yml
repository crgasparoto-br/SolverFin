name: Issue 519 hardening failure diagnostic

on:
  pull_request:
    branches:
      - main

permissions:
  actions: read
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Locate hardening error
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh api -H "Accept: application/vnd.github+json" \
            "repos/${GITHUB_REPOSITORY}/actions/jobs/88747409636/logs" \
            > /tmp/job.log
          sed -r 's/\x1B\[[0-9;]*[mK]//g' /tmp/job.log > /tmp/clean.log
          line=$(grep -n '##\[error\]' /tmp/clean.log | tail -n 1 | cut -d: -f1)
          start=$((line > 24 ? line - 24 : 1))
          end=$((line + 3))
          sed -n "${start},${end}p" /tmp/clean.log
