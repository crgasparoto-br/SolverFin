name: Issue 519 legacy bulk summary bootstrap

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: issue-519-legacy-bulk-summaries
  cancel-in-progress: false

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/519-csv-transfer-review
          fetch-depth: 0
      - name: Expand remaining legacy bulk summary assertions
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import re
          from pathlib import Path

          pattern = re.compile(
              r'(?P<indent>\s*)requested: (?P<requested>\d+),\s*'
              r'approved: (?P<approved>\d+),\s*'
              r'failed: (?P<failed>\d+),\s*'
              r'idempotent: (?P<idempotent>\d+),'
          )
          changed = []
          for path in sorted(Path('apps/api/src').glob('csv-import-*.integration.test.ts')):
              text = path.read_text()
              def expand(match: re.Match[str]) -> str:
                  indent = match.group('indent')
                  approved = int(match.group('approved'))
                  idempotent = int(match.group('idempotent'))
                  created = max(0, approved - idempotent)
                  return (
                      f"{indent}requested: {match.group('requested')},\n"
                      f"{indent}approved: {approved},\n"
                      f"{indent}failed: {match.group('failed')},\n"
                      f"{indent}created: {created},\n"
                      f"{indent}reconciled: 0,\n"
                      f"{indent}idempotent: {idempotent},\n"
                      f"{indent}blocked: 0,\n"
                      f"{indent}transferCount: 0,\n"
                      f"{indent}transferTotalMinor: 0,"
                  )
              updated, count = pattern.subn(expand, text)
              if count:
                  path.write_text(updated)
                  changed.append(f"{path}:{count}")
          print('updated=' + ','.join(changed))
          PY
          if git diff --quiet; then
            echo "No legacy bulk summary assertions remain."
            exit 0
          fi
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/api/src/csv-import-*.integration.test.ts
          git commit -m "test: expand legacy CSV bulk summaries"
          git push origin HEAD:feat/519-csv-transfer-review
