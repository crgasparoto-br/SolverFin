name: Issue 519 date-window bootstrap

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: issue-519-date-window-bootstrap
  cancel-in-progress: false

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/519-csv-transfer-review
          fetch-depth: 0
      - name: Confirm mandatory transfer date window
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          path = Path('packages/domain/src/deduplication.ts')
          text = path.read_text()
          guard = '''  if (
            candidate.kind === "transfer" &&
            dateDistanceInDays(candidate.occurredOn, possibleDuplicate.occurredOn) > 2
          ) {
            return [];
          }

          '''
          if guard not in text:
              marker = '  const reasons: DeduplicationReason[] = [];'
              if marker not in text:
                  raise SystemExit('deduplication reasons marker not found')
              text = text.replace(marker, guard + marker, 1)
              path.write_text(text)
          PY
          if git diff --quiet; then
            echo "Date-window correction already present."
            exit 0
          fi
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/domain/src/deduplication.ts
          git commit -m "fix: require transfer deduplication date window"
          git push origin HEAD:feat/519-csv-transfer-review
