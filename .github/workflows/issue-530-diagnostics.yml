name: Issue 530 corrections

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-corrections:
    name: Apply formatting and type correction
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout issue branch
        uses: actions/checkout@v4
        with:
          ref: feat/530-group-bulk-selection

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Correct exact optional property type
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path("apps/api/src/repositories/transaction-bulk-actions.ts")
          content = path.read_text()
          content = content.replace(
              "  selectedGroupId?: string;",
              "  selectedGroupId?: string | undefined;",
          )
          path.write_text(content)
          PY

      - name: Format issue files
        run: >-
          npx prettier --write
          apps/api/src/repositories/transaction-bulk-actions.ts
          apps/api/src/transaction-bulk-actions-router.ts
          apps/api/src/transaction-group-actions-router.ts
          apps/api/src/transaction-bulk-actions.integration.test.ts
          apps/web/src/dev-server/transaction-bulk-selection-enhancement.ts
          apps/web/src/dev-server/transaction-bulk-selection-enhancement.test.ts
          apps/web/src/dev-server/account-remuneration-disclosure-enhancement.ts
          docs/API_TRANSACTION_BULK_ACTIONS.md

      - name: Commit corrections
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            apps/api/src/repositories/transaction-bulk-actions.ts \
            apps/api/src/transaction-bulk-actions-router.ts \
            apps/api/src/transaction-group-actions-router.ts \
            apps/api/src/transaction-bulk-actions.integration.test.ts \
            apps/web/src/dev-server/transaction-bulk-selection-enhancement.ts \
            apps/web/src/dev-server/transaction-bulk-selection-enhancement.test.ts \
            apps/web/src/dev-server/account-remuneration-disclosure-enhancement.ts \
            docs/API_TRANSACTION_BULK_ACTIONS.md
          if git diff --cached --quiet; then
            echo "No corrections required."
            exit 0
          fi
          git commit -m "fix(issue-530): corrigir tipagem e formatação"
          git push origin HEAD:feat/530-group-bulk-selection
