name: Statement diagnostics

on:
  pull_request:
    branches:
      - main

jobs:
  lint-tail:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci --silent
      - name: Build shared packages
        run: npm run build:packages --silent
      - id: lint
        name: Run web lint and capture tail
        run: |
          set +e
          npm run lint --workspace @solverfin/web > lint.log 2>&1
          status=$?
          tail -n 200 lint.log > lint-tail.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload diagnostic tail
        uses: actions/upload-artifact@v4
        with:
          name: lint-tail
          path: lint-tail.log
      - name: Preserve lint result
        run: exit "${{ steps.lint.outputs.status }}"
