name: Statement diagnostics

on:
  pull_request:
    branches:
      - main

jobs:
  workspace-test:
    name: Test ${{ matrix.workspace }}
    strategy:
      fail-fast: false
      matrix:
        workspace:
          - "@solverfin/api"
          - "@solverfin/web"
          - "@solverfin/ai"
          - "@solverfin/config"
          - "@solverfin/domain"
          - "@solverfin/shared"
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://solverfin:solverfin_dev_password@localhost:5432/solverfin?schema=public
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: solverfin
          POSTGRES_USER: solverfin
          POSTGRES_PASSWORD: solverfin_dev_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U solverfin -d solverfin"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci --silent
      - name: Prepare test database
        run: |
          npm run prisma:generate --silent
          npm run build:packages --silent
          npm run db:deploy --silent
          npm run db:seed --silent
      - name: Test workspace
        run: npm run test --workspace "${{ matrix.workspace }}" --if-present
