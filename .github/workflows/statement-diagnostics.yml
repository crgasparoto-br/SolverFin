name: Statement diagnostics

on:
  pull_request:
    branches:
      - main

jobs:
  web-test-tail:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci --silent
      - name: Build shared packages
        run: npm run build:packages --silent
      - name: Compile web tests
        run: |
          rm -rf .tmp-tests/web
          npx tsc -p apps/web/tsconfig.test.json --pretty false
      - id: tests
        name: Run web tests and capture tail
        run: |
          set +e
          node scripts/run-compiled-tests.mjs .tmp-tests/web --include .test.js > web-test.log 2>&1
          status=$?
          tail -n 250 web-test.log > web-test-tail.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload diagnostic tail
        uses: actions/upload-artifact@v4
        with:
          name: web-test-tail
          path: web-test-tail.log
      - name: Preserve test result
        run: exit "${{ steps.tests.outputs.status }}"
