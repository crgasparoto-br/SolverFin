name: Temporary categories formatting

on:
  push:
    branches:
      - feat/categories-design-interface
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: feat/categories-design-interface

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Format categories files
        run: |
          npx prettier --write \
            .github/workflows/statement-visual-validation.yml \
            apps/web/src/dev-server/categories-icons-enhancement.ts \
            apps/web/src/dev-server/categories-icons-enhancement.test.ts \
            scripts/statement-visual/categories-interface.mjs

      - name: Commit formatting
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            .github/workflows/statement-visual-validation.yml \
            apps/web/src/dev-server/categories-icons-enhancement.ts \
            apps/web/src/dev-server/categories-icons-enhancement.test.ts \
            scripts/statement-visual/categories-interface.mjs
          git diff --cached --quiet && exit 0
          git commit -m "style(web): formatar revisao visual de categorias"
          git push origin HEAD:feat/categories-design-interface
