name: Temporary categories navigation fix

on:
  push:
    branches:
      - feat/categories-design-interface

permissions:
  contents: write

jobs:
  fix-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: feat/categories-design-interface

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Make categories navigation resilient
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("scripts/statement-visual/categories-interface.mjs")
          source = path.read_text()

          login_old = '''  await setViewport(cdp, width, height);
            await navigate(cdp, `${baseUrl}/login`);
            const login = await evaluate(cdp, loginExpression());
            assert.equal(login.ok, true, `Demo login failed: ${login.status} ${login.body}`);
            await navigate(cdp, `${baseUrl}/categorias`);
            await waitForCategories(cdp);'''
          login_new = '''  await setViewport(cdp, width, height);
            await navigateWithRetry(cdp, `${baseUrl}/login`, "login");
            const login = await evaluate(cdp, loginExpression());
            assert.equal(login.ok, true, `Demo login failed: ${login.status} ${login.body}`);
            await navigateWithRetry(cdp, `${baseUrl}/categorias`, "categories");
            await waitForCategories(cdp);'''
          if login_old not in source:
              raise SystemExit("Expected login navigation block was not found")
          source = source.replace(login_old, login_new, 1)

          desktop_old = '''  await setViewport(cdp, 1440, 1000);
            await navigate(cdp, `${baseUrl}/categorias`);
            await waitForCategories(cdp);'''
          desktop_new = '''  await setViewport(cdp, 1440, 1000);
            await waitForCategories(cdp);'''
          if desktop_old not in source:
              raise SystemExit("Expected desktop navigation block was not found")
          source = source.replace(desktop_old, desktop_new, 1)

          mobile_old = '''  await setViewport(cdp, 390, 844);
            await navigate(cdp, `${baseUrl}/categorias`);
            await waitForCategories(cdp);'''
          mobile_new = '''  await setViewport(cdp, 390, 844);
            await waitForCategories(cdp);'''
          if mobile_old not in source:
              raise SystemExit("Expected mobile navigation block was not found")
          source = source.replace(mobile_old, mobile_new, 1)

          marker = '''async function waitForCategories(cdp) {'''
          helper = '''async function navigateWithRetry(cdp, url, label) {
            const attempts = 3;
            for (let attempt = 1; attempt <= attempts; attempt += 1) {
              try {
                await navigate(cdp, url);
                return;
              } catch (error) {
                let pageState = { href: "", readyState: "" };
                try {
                  pageState = await evaluate(
                    cdp,
                    `({ href: window.location.href, readyState: document.readyState })`,
                  );
                } catch {
                  // The renderer may still be restarting; retry below.
                }

                if (pageState.href.startsWith(url) && pageState.readyState !== "loading") {
                  console.warn(
                    `Navigation to ${label} reached the page despite a missing load event.`,
                  );
                  return;
                }

                if (attempt === attempts) throw error;
                console.warn(
                  `Navigation to ${label} failed on attempt ${attempt}; retrying.`,
                );
                await sleep(400 * attempt);
              }
            }
          }

          async function waitForCategories(cdp) {'''
          if marker not in source:
              raise SystemExit("Expected waitForCategories marker was not found")
          source = source.replace(marker, helper, 1)

          path.write_text(source)
          PY
          npx prettier --write scripts/statement-visual/categories-interface.mjs

      - name: Validate script syntax
        run: node --check scripts/statement-visual/categories-interface.mjs

      - name: Validate formatting
        run: npx prettier --check scripts/statement-visual/categories-interface.mjs

      - name: Validate root typecheck
        run: npm run typecheck

      - name: Validate web tests
        run: npm run test --workspace @solverfin/web

      - name: Commit validated navigation correction
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/statement-visual/categories-interface.mjs
          git diff --cached --quiet && exit 0
          git commit -m "fix(ci): tornar navegacao visual de categorias resiliente"
          git push origin HEAD:feat/categories-design-interface
