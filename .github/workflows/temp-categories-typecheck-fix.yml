name: Temporary categories typecheck fix

on:
  push:
    branches:
      - feat/categories-design-interface
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  fix-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: feat/categories-design-interface

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Correct category validation contracts
        run: |
          python - <<'PY'
          from pathlib import Path

          source_path = Path("apps/web/src/dev-server/categories-icons-enhancement.ts")
          source = source_path.read_text()
          source_old = 'const [, classNames, kind, status] = record;'
          source_new = 'const [, classNames = "", kind = "", status = ""] = record;'
          if source_old not in source:
              raise SystemExit("Expected category summary destructuring was not found")
          source_path.write_text(source.replace(source_old, source_new, 1))

          test_path = Path("apps/web/src/dev-server/categories-icons-enhancement.test.ts")
          test = test_path.read_text()
          test_old = 'assert.match(html, /category-path">[\\s\\S]*?chevron-right[\\s\\S]*?Moradia &gt; Aluguel/);'
          test_new = 'assert.match(html, /category-path"><svg[^>]*>[\\s\\S]*?<span>Moradia &gt; Aluguel<\\/span>/);'
          if test_old not in test:
              raise SystemExit("Expected category path assertion was not found")
          test_path.write_text(test.replace(test_old, test_new, 1))
          PY
          npx prettier --write \
            apps/web/src/dev-server/categories-icons-enhancement.ts \
            apps/web/src/dev-server/categories-icons-enhancement.test.ts

      - name: Validate root typecheck
        run: npm run typecheck

      - name: Validate web tests
        run: npm run test --workspace @solverfin/web

      - name: Commit validated correction
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            apps/web/src/dev-server/categories-icons-enhancement.ts \
            apps/web/src/dev-server/categories-icons-enhancement.test.ts
          git diff --cached --quiet && exit 0
          git commit -m "fix(web): validar resumo e caminho de categorias"
          git push origin HEAD:feat/categories-design-interface
