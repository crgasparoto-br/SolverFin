name: Temporary categories typecheck fix

on:
  push:
    branches:
      - feat/categories-design-interface
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  fix-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: feat/categories-design-interface

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Make regex captures type-safe
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("apps/web/src/dev-server/categories-icons-enhancement.ts")
          source = path.read_text()
          old = 'const [, classNames, kind, status] = record;'
          new = 'const [, classNames = "", kind = "", status = ""] = record;'
          if old not in source:
              raise SystemExit("Expected category summary destructuring was not found")
          path.write_text(source.replace(old, new, 1))
          PY
          npx prettier --write apps/web/src/dev-server/categories-icons-enhancement.ts

      - name: Validate web typecheck
        run: npm run typecheck --workspace @solverfin/web

      - name: Validate web tests
        run: npm run test --workspace @solverfin/web

      - name: Commit correction
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/web/src/dev-server/categories-icons-enhancement.ts
          git diff --cached --quiet && exit 0
          git commit -m "fix(web): tornar resumo de categorias type-safe"
          git push origin HEAD:feat/categories-design-interface
