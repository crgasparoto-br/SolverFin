name: Temporary categories visual validator fix

on:
  push:
    branches:
      - feat/categories-design-interface

permissions:
  contents: write

jobs:
  fix-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: feat/categories-design-interface

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Make categories visual validation deterministic
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path("scripts/statement-visual/categories-interface.mjs")
          source = path.read_text()

          pattern = re.compile(
              r'const browser = await launchChrome\(\{ baseUrl, chromePath \}\);[\s\S]*?async function loginAndOpenCategories\(cdp\) \{'
          )
          replacement = '''let desktop;
          let desktopModal;
          let mobile;
          let mobileModal;
          let browserVersion = "unknown";
          const completedScreenshots = [];

          await runViewportSession("desktop", 1440, 1000, async (cdp) => {
            desktop = await validateDesktop(cdp);
            completedScreenshots.push("categories-desktop.png");
            desktopModal = await validateDesktopModal(cdp);
            completedScreenshots.push("categories-modal-desktop.png");
          });

          await runViewportSession("mobile", 390, 844, async (cdp) => {
            mobile = await validateMobile(cdp);
            completedScreenshots.push("categories-mobile.png");
            mobileModal = await validateMobileModal(cdp);
            completedScreenshots.push("categories-modal-mobile.png");
          });

          const report = {
            generatedAt: new Date().toISOString(),
            commit: process.env.GITHUB_SHA ?? "local",
            browser: browserVersion,
            failures,
            desktop,
            desktopModal,
            mobile,
            mobileModal,
            screenshots: completedScreenshots,
          };

          await writeFile(
            join(outputDir, "categories-interface.json"),
            `${JSON.stringify(report, null, 2)}\\n`,
          );
          await writeFile(join(outputDir, "CATEGORIES-INTERFACE.md"), renderReport(report));

          if (failures.length > 0) {
            for (const failure of failures) console.error(`- ${failure.message}`);
            process.exitCode = 1;
          } else {
            console.log("Categories desktop, modal and mobile visual validation passed.");
          }

          async function runViewportSession(label, width, height, validate) {
            let browser;
            try {
              browser = await launchChrome({ baseUrl, chromePath });
              browserVersion = browser.version;
              console.log(`Starting categories ${label} validation.`);
              await loginAndOpenCategories(browser.cdp, width, height);
              await validate(browser.cdp);
            } catch (error) {
              const details = serializeError(error);
              failures.push({ message: `Categories ${label} validation crashed`, details });
              console.error(`Categories ${label} validation crashed:`, details);
            } finally {
              if (browser) await browser.close(outputDir);
              await sleep(250);
            }
          }

          function serializeError(error) {
            if (error instanceof Error) {
              return { name: error.name, message: error.message, stack: error.stack ?? "" };
            }
            return { name: "UnknownError", message: String(error), stack: "" };
          }

          async function loginAndOpenCategories(cdp, width, height) {'''

          updated, count = pattern.subn(replacement, source, count=1)
          if count != 1:
              raise SystemExit(f"Expected top-level visual validation block once, found {count}")

          updated = updated.replace(
              '  await setViewport(cdp, 1440, 1000);\n  await navigate(cdp, `${baseUrl}/login`);',
              '  await setViewport(cdp, width, height);\n  await navigate(cdp, `${baseUrl}/login`);',
              1,
          )

          old_report = '''  return `# Evidência visual — Categorias\\n\\n- Status: **${status}**\\n- Commit: \\`${report.commit}\\`\\n- Navegador: ${report.browser}\\n- Desktop: \\`${report.desktop.screenshot}\\`\\n- Modal desktop: \\`${report.desktopModal.screenshot}\\`\\n- Mobile: \\`${report.mobile.screenshot}\\`\\n- Modal mobile: \\`${report.mobileModal.screenshot}\\`\\n\\n## Falhas\\n\\n${report.failures.length === 0 ? "Nenhuma falha encontrada.\\n" : report.failures.map((failure) => `- ${failure.message}`).join("\\n") + "\\n"}`;'''
          new_report = '''  const screenshot = (result) => result?.screenshot ?? "não gerada";
            return `# Evidência visual — Categorias\\n\\n- Status: **${status}**\\n- Commit: \\`${report.commit}\\`\\n- Navegador: ${report.browser}\\n- Desktop: \\`${screenshot(report.desktop)}\\`\\n- Modal desktop: \\`${screenshot(report.desktopModal)}\\`\\n- Mobile: \\`${screenshot(report.mobile)}\\`\\n- Modal mobile: \\`${screenshot(report.mobileModal)}\\`\\n\\n## Falhas\\n\\n${report.failures.length === 0 ? "Nenhuma falha encontrada.\\n" : report.failures.map((failure) => `- ${failure.message}`).join("\\n") + "\\n"}`;'''
          if old_report not in updated:
              raise SystemExit("Expected report renderer was not found")
          updated = updated.replace(old_report, new_report, 1)

          path.write_text(updated)
          PY
          npx prettier --write scripts/statement-visual/categories-interface.mjs

      - name: Validate script syntax
        run: node --check scripts/statement-visual/categories-interface.mjs

      - name: Validate formatting
        run: npx prettier --check scripts/statement-visual/categories-interface.mjs

      - name: Validate root typecheck
        run: npm run typecheck

      - name: Validate web tests
        run: npm run test --workspace @solverfin/web

      - name: Commit validated validator correction
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/statement-visual/categories-interface.mjs
          git diff --cached --quiet && exit 0
          git commit -m "fix(ci): estabilizar validacao visual de categorias"
          git push origin HEAD:feat/categories-design-interface
