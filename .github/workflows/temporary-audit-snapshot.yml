name: Temporary audit snapshot

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build repository snapshot
        run: |
          tar \
            --exclude='./node_modules' \
            --exclude='./artifacts' \
            -czf /tmp/solverfin-audit-snapshot.tar.gz .

      - name: Upload repository snapshot
        uses: actions/upload-artifact@v4
        with:
          name: solverfin-audit-snapshot-${{ github.sha }}
          path: /tmp/solverfin-audit-snapshot.tar.gz
          if-no-files-found: error
          retention-days: 1
