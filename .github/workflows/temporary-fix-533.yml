name: Temporary fix issue 533

on:
  push:
    branches:
      - feat/533-cards-design-interface

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: feat/533-cards-design-interface
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Apply visual fixes
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const path = 'apps/web/src/dev-server/cards-interface-enhancement.ts';
          let source = fs.readFileSync(path, 'utf8');

          const mobileBefore = 'main[data-cards-interface-enhanced] .purchase-search input{min-height:44px}';
          const mobileAfter = 'main[data-cards-interface-enhanced] .purchase-search input{height:44px;min-height:44px}';
          if (!source.includes(mobileBefore)) throw new Error('Mobile search rule not found');
          source = source.replace(mobileBefore, mobileAfter);

          const focusBefore = `        root.querySelectorAll("[data-open-modal]").forEach((button) => {
          button.addEventListener("click", () =>
            requestAnimationFrame(() => {
              const dialog = root.querySelector(
                'dialog[data-modal="' + button.dataset.openModal + '"]',
              );
              dialog
                ?.querySelector(
                  "input:not([type=hidden]):not([disabled]), select:not([disabled]), button:not([disabled])",
                )
                ?.focus();
            }),
          );
        });`;
          const focusAfter = `        root.querySelectorAll("[data-open-modal]").forEach((button) => {
          button.addEventListener("click", () => {
            const dialog = root.querySelector(
              'dialog[data-modal="' + button.dataset.openModal + '"]',
            );
            dialog
              ?.querySelector(
                "input:not([type=hidden]):not([disabled]), select:not([disabled]), button:not([disabled])",
              )
              ?.focus();
          });
        });`;
          if (!source.includes(focusBefore)) throw new Error('Modal focus controller not found');
          source = source.replace(focusBefore, focusAfter);
          fs.writeFileSync(path, source);
          NODE
          npx prettier --write apps/web/src/dev-server/cards-interface-enhancement.ts

      - name: Commit fixes
        shell: bash
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/web/src/dev-server/cards-interface-enhancement.ts
          git commit -m "fix(cartoes): ajustar foco do modal e busca mobile"
          git push origin HEAD:feat/533-cards-design-interface
