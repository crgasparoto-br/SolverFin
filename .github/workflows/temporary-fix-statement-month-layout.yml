name: Temporary fix statement month layout

on:
  push:
    branches:
      - review/main-issue-467-extrato
    paths:
      - ".github/workflows/temporary-fix-statement-month-layout.yml"

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: review/main-issue-467-extrato
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Apply effective tablet layout rule
        run: |
          python3 - <<'PY'
          from pathlib import Path

          source_path = Path("apps/web/src/dev-server/list-sorting-enhancement.ts")
          source = source_path.read_text()
          old_rule = '@media(max-width:900px){form.filter-form[action="/lancamentos"],form.filter-form[action="/cartoes"]{grid-template-columns:1fr 1fr}.sort-field{min-width:0}}'
          new_rule = '@media(max-width:900px){form.filter-form[action="/lancamentos"]{grid-template-columns:1fr}form.filter-form[action="/lancamentos"] .month-nav input[type="month"]{min-width:10rem}form.filter-form[action="/cartoes"]{grid-template-columns:1fr 1fr}.sort-field{min-width:0}}'
          if old_rule not in source:
              raise SystemExit("Expected sorting tablet rule was not found")
          source_path.write_text(source.replace(old_rule, new_rule))

          test_path = Path("apps/web/src/dev-server/list-sorting-enhancement.test.ts")
          test = test_path.read_text()
          marker = '\n\nconst cardHtml = documentHtml(`'
          assertion = '''
          assert.match(
            statementSorted,
            /@media\\(max-width:900px\\)\\{form\\.filter-form\\[action="\\/lancamentos"\\]\\{grid-template-columns:1fr\\}form\\.filter-form\\[action="\\/lancamentos"\\] \\.month-nav input\\[type="month"\\]\\{min-width:10rem\\}/,
          );
          '''
          if marker not in test:
              raise SystemExit("Expected card test marker was not found")
          if "month-nav input" not in test:
              test_path.write_text(test.replace(marker, "\n" + assertion.strip() + marker))
          PY
          npx prettier --write \
            apps/web/src/dev-server/list-sorting-enhancement.ts \
            apps/web/src/dev-server/list-sorting-enhancement.test.ts

      - name: Validate web workspace
        run: |
          npm run build:packages
          npm run test --workspace @solverfin/web

      - name: Commit effective rule
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            apps/web/src/dev-server/list-sorting-enhancement.ts \
            apps/web/src/dev-server/list-sorting-enhancement.test.ts
          git commit -m "fix(web): evitar truncamento do mês em tablet"
          git push origin HEAD:review/main-issue-467-extrato
