name: Temporary format issue 533

on:
  push:
    branches:
      - feat/533-cards-design-interface

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: feat/533-cards-design-interface
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Format issue files
        run: |
          npx prettier --write \
            .github/workflows/statement-visual-validation.yml \
            apps/web/src/dev-server.ts \
            apps/web/src/dev-server/cards-interface-enhancement.ts \
            apps/web/src/dev-server/cards-interface-enhancement.test.ts \
            docs/CARDS.md \
            scripts/statement-visual/cards-interface.mjs

      - name: Commit formatted files
        shell: bash
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            .github/workflows/statement-visual-validation.yml \
            apps/web/src/dev-server.ts \
            apps/web/src/dev-server/cards-interface-enhancement.ts \
            apps/web/src/dev-server/cards-interface-enhancement.test.ts \
            docs/CARDS.md \
            scripts/statement-visual/cards-interface.mjs
          git commit -m "style: format cards interface"
          git push origin HEAD:feat/533-cards-design-interface
