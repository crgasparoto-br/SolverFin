name: Temporary formatting artifact

on:
  pull_request:
    paths:
      - ".github/workflows/temporary-format-artifact.yml"
      - "apps/web/src/dev-server/inbox-list-layout-enhancement.ts"
      - "apps/web/src/dev-server/inbox-list-layout-enhancement.test.ts"

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format Inbox files
        run: >-
          npx prettier
          apps/web/src/dev-server/inbox-list-layout-enhancement.ts
          apps/web/src/dev-server/inbox-list-layout-enhancement.test.ts
          --write

      - name: Commit formatter output
        run: |
          if git diff --quiet; then
            echo "Files already formatted."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/web/src/dev-server/inbox-list-layout-enhancement.ts apps/web/src/dev-server/inbox-list-layout-enhancement.test.ts
          git commit -m "style(web): format Inbox list enhancement"
          git push origin "HEAD:${{ github.head_ref }}"
