name: Temporary format cards files

on:
  push:
    branches:
      - feat/533-cards-design-interface

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Format cards files
        run: |
          npx prettier --write \
            apps/web/src/dev-server/cards-interface-finalizer.ts \
            apps/web/src/dev-server/cards-interface-finalizer.test.ts \
            scripts/statement-visual/cards-interface-adversarial.mjs

      - name: Upload formatted files
        uses: actions/upload-artifact@v4
        with:
          name: formatted-cards-files-${{ github.sha }}
          path: |
            apps/web/src/dev-server/cards-interface-finalizer.ts
            apps/web/src/dev-server/cards-interface-finalizer.test.ts
            scripts/statement-visual/cards-interface-adversarial.mjs
          if-no-files-found: error
          retention-days: 1
