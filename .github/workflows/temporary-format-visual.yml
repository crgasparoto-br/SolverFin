name: Temporary format visual validation

on:
  push:
    branches:
      - review/main-issue-467-extrato
    paths:
      - ".github/workflows/temporary-format-visual.yml"

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: review/main-issue-467-extrato
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Format changed implementation files
        run: |
          npx prettier --write \
            package.json \
            .github/workflows/statement-visual-validation.yml \
            .github/workflows/temporary-format-visual.yml \
            apps/web/src/dev-server/routes.ts \
            apps/web/src/dev-server/routes.test.ts \
            apps/web/src/dev-server/cards-page-month-navigation.ts \
            scripts/run-statement-visual-validation.mjs \
            scripts/statement-visual/cdp.mjs \
            scripts/statement-visual/fixtures.mjs \
            scripts/statement-visual/main.mjs \
            scripts/statement-visual/measurements.mjs

      - name: Commit formatted files
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json .github/workflows/statement-visual-validation.yml .github/workflows/temporary-format-visual.yml apps/web/src/dev-server/routes.ts apps/web/src/dev-server/routes.test.ts apps/web/src/dev-server/cards-page-month-navigation.ts scripts/run-statement-visual-validation.mjs scripts/statement-visual/cdp.mjs scripts/statement-visual/fixtures.mjs scripts/statement-visual/main.mjs scripts/statement-visual/measurements.mjs
          git commit -m "style: formatar validacao visual"
          git push origin HEAD:review/main-issue-467-extrato
