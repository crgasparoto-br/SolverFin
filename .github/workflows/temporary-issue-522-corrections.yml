name: Temporary issue 522 corrections

on:
  push:
    branches:
      - feat/522-inbox-list-layout
    paths:
      - "scripts/temporary-fix-522.py"

permissions:
  contents: write

jobs:
  correct:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: feat/522-inbox-list-layout

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Apply audited corrections
        run: python scripts/temporary-fix-522.py

      - name: Format and validate focused changes
        run: |
          npx prettier --write apps/web/src/dev-server/inbox-list-layout-enhancement.ts apps/web/src/dev-server/inbox-list-layout-enhancement.test.ts
          npm run test --workspace @solverfin/web
          npm run typecheck --workspace @solverfin/web

      - name: Commit corrections
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/web/src/dev-server/inbox-list-layout-enhancement.ts apps/web/src/dev-server/inbox-list-layout-enhancement.test.ts
          git diff --cached --quiet && exit 0
          git commit -m "fix: corrigir pendências da auditoria da issue 522"
          git push origin HEAD:feat/522-inbox-list-layout