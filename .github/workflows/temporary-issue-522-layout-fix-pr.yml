name: Temporary issue 522 layout fix PR

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - ".github/workflows/temporary-issue-522-layout-fix-pr.yml"
      - "apps/web/src/dev-server/inbox-list-layout-enhancement.ts"
      - "apps/web/src/dev-server/inbox-list-layout-enhancement.test.ts"
      - "scripts/statement-visual/inbox-list-layout.mjs"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply audited corrections
        run: |
          python - <<'PY'
          from pathlib import Path

          source_path = Path("apps/web/src/dev-server/inbox-list-layout-enhancement.ts")
          source = source_path.read_text()
          replacements = {
              '      .row-summary { display: grid !important; gap: 3px 10px !important; grid-template-columns: 92px 90px 118px minmax(190px, 1.7fr) minmax(150px, 1fr); margin: 0 !important; }':
              '      .row-summary { display: grid !important; gap: 4px 10px !important; grid-template-columns: 100px 90px 118px minmax(220px, 1.6fr) minmax(180px, 1fr); margin: 0 !important; }',
              '      .row-summary > div { align-items: baseline; display: flex !important; gap: 5px; min-width: 0; }':
              '      .row-summary > div { align-content: start; display: grid !important; gap: 2px; min-width: 0; }',
              '      .row-summary dt { color: var(--muted); flex: 0 0 auto; font-size: .62rem !important; font-weight: 700; letter-spacing: .02em; text-transform: uppercase; }':
              '      .row-summary dt { color: var(--muted); font-size: .62rem !important; font-weight: 700; letter-spacing: .02em; line-height: 1.15; text-transform: uppercase; }',
              '      .row-summary dd { font-size: .75rem !important; line-height: 1.25; margin: 0 !important; min-width: 0; overflow-wrap: anywhere; }':
              '      .row-summary dd { font-size: .75rem !important; line-height: 1.25; margin: 0 !important; min-width: 0; overflow-wrap: anywhere; word-break: normal; }',
          }
          for old, new in replacements.items():
              if source.count(old) != 1:
                  raise SystemExit(f"Expected one CSS match, found {source.count(old)}: {old}")
              source = source.replace(old, new)
          source_path.write_text(source)

          test_path = Path("apps/web/src/dev-server/inbox-list-layout-enhancement.test.ts")
          test = test_path.read_text()
          marker = '    assert.match(enhanced, /overflow-wrap: anywhere/);\n'
          additions = (
              '    assert.match(enhanced, /overflow-wrap: anywhere/);\n'
              '    assert.match(enhanced, /word-break: normal/);\n'
              '    assert.match(enhanced, /row-summary > div \\{ align-content: start; display: grid/);\n'
              '    assert.match(\n'
              '      enhanced,\n'
              '      /grid-template-columns: 100px 90px 118px minmax\\(220px, 1\\.6fr\\) minmax\\(180px, 1fr\\)/,\n'
              '    );\n'
          )
          if marker not in test:
              raise SystemExit("Unit test marker not found")
          if "word-break: normal" not in test:
              test = test.replace(marker, additions, 1)
          test_path.write_text(test)

          visual_path = Path("scripts/statement-visual/inbox-list-layout.mjs")
          visual = visual_path.read_text()
          old_block = '''  const longText = await evaluate(
            cdp,
            `(() => {
              const row = [...document.querySelectorAll('#import-batch-detail .import-row')].find((item) => item.textContent.includes('${fixture.suffix}'));
              const description = [...row.querySelectorAll('.row-summary > div')].find((entry) => entry.querySelector('dt')?.textContent?.trim() === 'Descrição')?.querySelector('dd');
              const style = getComputedStyle(description);
              return { text: description?.textContent || '', overflow: style.overflow, overflowWrap: style.overflowWrap };
            })()`,
          );
          check(longText.text.includes(fixture.suffix), "The full description is not available", longText);
          check(longText.overflow !== "hidden", "The description remains truncated", longText);
          check(longText.overflowWrap === "anywhere", "The description does not wrap", longText);

          await screenshot(cdp, join(outputDir, "issue-522-inbox-list-layout.png"));
          return {
            fixture: { batchId: fixture.batchId },
            initial,
            filtered,
            bulk,
            ascending,
            combined,
            longText,
          };'''
          new_block = '''  const longText = await evaluate(
            cdp,
            `(() => {
              const expectedDescription = 'Descrição longa preservada integralmente ${fixture.suffix}';
              const row = [...document.querySelectorAll('#import-batch-detail .import-row')].find((item) => item.textContent.includes(expectedDescription));
              if (!row) return { found: false, expectedDescription };
              const fields = [...row.querySelectorAll('.row-summary > div')];
              const descriptionEntry = fields.find((entry) => entry.querySelector('dt')?.textContent?.trim() === 'Descrição');
              const accountEntry = fields.find((entry) => entry.querySelector('dt')?.textContent?.trim() === 'Conta de referência');
              const description = descriptionEntry?.querySelector('dd');
              const account = accountEntry?.querySelector('dd');
              if (!description || !account || !accountEntry) return { found: false, expectedDescription };
              const descriptionStyle = getComputedStyle(description);
              const accountStyle = getComputedStyle(account);
              const accountEntryStyle = getComputedStyle(accountEntry);
              const accountRect = account.getBoundingClientRect();
              const accountEntryRect = accountEntry.getBoundingClientRect();
              return {
                found: true,
                expectedDescription,
                text: description.textContent || '',
                overflow: descriptionStyle.overflow,
                overflowWrap: descriptionStyle.overflowWrap,
                descriptionWidth: description.getBoundingClientRect().width,
                accountText: account.textContent || '',
                accountFieldDisplay: accountEntryStyle.display,
                accountValueWidth: accountRect.width,
                accountFieldWidth: accountEntryRect.width,
                accountValueHeight: accountRect.height,
                accountLineHeight: Number.parseFloat(accountStyle.lineHeight) || 0
              };
            })()`,
          );
          check(longText.found, "The exact long-description row was not found", longText);
          check(longText.text === longText.expectedDescription, "The exact long description is not available", longText);
          check(longText.overflow !== "hidden", "The description remains truncated", longText);
          check(longText.overflowWrap === "anywhere", "The description does not wrap", longText);
          check(longText.descriptionWidth >= 180, "The description has insufficient readable width", longText);
          check(longText.accountText.length > 0, "The reference account is not available", longText);
          check(longText.accountFieldDisplay === "grid", "The reference account field is not vertically organized", longText);
          check(longText.accountValueWidth >= 120, "The reference account value is too narrow", longText);
          check(
            longText.accountValueWidth >= longText.accountFieldWidth * 0.8,
            "The reference account value does not use the field width",
            longText,
          );
          check(
            !longText.accountLineHeight || longText.accountValueHeight <= longText.accountLineHeight * 3.5,
            "The reference account breaks into too many lines",
            longText,
          );

          const responsive = {};
          for (const [label, width] of [["tablet", 900], ["mobile", 390]]) {
            await setViewport(cdp, width, 900);
            await sleep(100);
            responsive[label] = await evaluate(
              cdp,
              `(() => {
                const row = document.querySelector('#import-batch-detail .import-row:not([hidden])');
                const accountEntry = [...row.querySelectorAll('.row-summary > div')].find((entry) => entry.querySelector('dt')?.textContent?.trim() === 'Conta de referência');
                const account = accountEntry?.querySelector('dd');
                const accountRect = account?.getBoundingClientRect();
                const accountEntryRect = accountEntry?.getBoundingClientRect();
                return {
                  bodyFitsViewport: document.documentElement.scrollWidth <= document.documentElement.clientWidth,
                  accountFieldDisplay: accountEntry ? getComputedStyle(accountEntry).display : '',
                  accountValueWidth: accountRect?.width || 0,
                  accountFieldWidth: accountEntryRect?.width || 0
                };
              })()`,
            );
            check(responsive[label].bodyFitsViewport, `Inbox overflows the ${label} viewport`, responsive[label]);
            check(responsive[label].accountFieldDisplay === "grid", `Reference account layout is inconsistent on ${label}`, responsive[label]);
            check(
              responsive[label].accountValueWidth >= responsive[label].accountFieldWidth * 0.8,
              `Reference account value is cramped on ${label}`,
              responsive[label],
            );
          }

          await setViewport(cdp, 1280, 900);
          await sleep(100);
          await screenshot(cdp, join(outputDir, "issue-522-inbox-list-layout.png"));
          return {
            fixture: { batchId: fixture.batchId },
            initial,
            filtered,
            bulk,
            ascending,
            combined,
            longText,
            responsive,
          };'''
          if old_block not in visual:
              raise SystemExit("Visual validation block not found")
          visual_path.write_text(visual.replace(old_block, new_block))
          PY

      - name: Format changed files
        run: >-
          npx prettier
          apps/web/src/dev-server/inbox-list-layout-enhancement.ts
          apps/web/src/dev-server/inbox-list-layout-enhancement.test.ts
          scripts/statement-visual/inbox-list-layout.mjs
          --write

      - name: Remove temporary workflow and commit
        run: |
          rm .github/workflows/temporary-issue-522-layout-fix-pr.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/web/src/dev-server/inbox-list-layout-enhancement.ts \
            apps/web/src/dev-server/inbox-list-layout-enhancement.test.ts \
            scripts/statement-visual/inbox-list-layout.mjs \
            .github/workflows/temporary-issue-522-layout-fix-pr.yml
          git commit -m "fix: melhorar legibilidade das linhas da Inbox"
          git push origin "HEAD:${{ github.head_ref }}"
