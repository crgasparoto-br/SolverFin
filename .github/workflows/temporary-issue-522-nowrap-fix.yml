name: Temporary issue 522 nowrap fix

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - ".github/workflows/temporary-issue-522-nowrap-fix.yml"
      - "scripts/temporary-issue-522-nowrap-fix.py"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply corrections
        run: python scripts/temporary-issue-522-nowrap-fix.py

      - name: Format changed files
        run: >-
          npx prettier
          apps/web/src/dev-server/inbox-list-layout-enhancement.ts
          apps/web/src/dev-server/inbox-list-layout-enhancement.test.ts
          scripts/statement-visual/inbox-list-layout.mjs
          --write

      - name: Commit corrections
        run: |
          rm scripts/temporary-issue-522-nowrap-fix.py
          rm .github/workflows/temporary-issue-522-nowrap-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/web/src/dev-server/inbox-list-layout-enhancement.ts \
            apps/web/src/dev-server/inbox-list-layout-enhancement.test.ts \
            scripts/statement-visual/inbox-list-layout.mjs \
            scripts/temporary-issue-522-nowrap-fix.py \
            .github/workflows/temporary-issue-522-nowrap-fix.yml
          git commit -m "fix: manter data e valor compactos na Inbox"
          git push origin "HEAD:${{ github.head_ref }}"
