name: Temporary issue 522 overflow fix

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - ".github/workflows/temporary-issue-522-overflow-fix.yml"
      - "apps/web/src/dev-server/inbox-list-layout-enhancement.ts"
      - "apps/web/src/dev-server/inbox-list-layout-enhancement.test.ts"
      - "scripts/statement-visual/inbox-list-layout.mjs"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply overflow corrections
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(text: str, old: str, new: str, label: str) -> str:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"Expected one {label} match, found {count}")
              return text.replace(old, new, 1)

          source_path = Path("apps/web/src/dev-server/inbox-list-layout-enhancement.ts")
          source = source_path.read_text()
          source = replace_once(
              source,
              '      .row-summary { display: grid !important; gap: 4px 10px !important; grid-template-columns: 100px 90px 118px minmax(220px, 1.6fr) minmax(180px, 1fr); margin: 0 !important; }',
              '      .row-summary { display: grid !important; gap: 4px 10px !important; grid-template-columns: minmax(82px, .6fr) minmax(72px, .55fr) minmax(100px, .7fr) minmax(170px, 1.6fr) minmax(140px, 1fr); margin: 0 !important; }',
              "desktop row columns",
          )
          source = replace_once(
              source,
              '''      @media (max-width: 1120px) {
                .line-filter-bar.inbox-list-toolbar { grid-template-columns: repeat(3, minmax(150px, 1fr)); }
                .inbox-visible-lines { text-align: left; }
                .row-summary { grid-template-columns: repeat(3, minmax(120px, 1fr)); }
              }''',
              '''      @media (max-width: 1120px) {
                .line-filter-bar.inbox-list-toolbar { grid-template-columns: repeat(3, minmax(150px, 1fr)); }
                .inbox-visible-lines { text-align: left; }
                .import-layout { grid-template-columns: 1fr !important; }
                .row-summary { grid-template-columns: repeat(3, minmax(140px, 1fr)); }
              }''',
              "tablet layout",
          )
          source_path.write_text(source)

          test_path = Path("apps/web/src/dev-server/inbox-list-layout-enhancement.test.ts")
          test = test_path.read_text()
          test = replace_once(
              test,
              '      /grid-template-columns: 100px 90px 118px minmax\\(220px, 1\\.6fr\\) minmax\\(180px, 1fr\\)/,',
              '      /grid-template-columns: minmax\\(82px, \\.6fr\\) minmax\\(72px, \\.55fr\\) minmax\\(100px, \\.7fr\\) minmax\\(170px, 1\\.6fr\\) minmax\\(140px, 1fr\\)/,',
              "unit grid assertion",
          )
          if "@media (max-width: 1120px)" in test and "import-layout { grid-template-columns: 1fr" not in test:
              raise SystemExit("Unexpected pre-existing tablet test state")
          marker = '    assert.doesNotMatch(enhanced, /text-overflow: ellipsis/);\n'
          if "import-layout \\{ grid-template-columns: 1fr" not in test:
              if marker not in test:
                  raise SystemExit("Tablet assertion insertion marker not found")
              test = test.replace(
                  marker,
                  '    assert.match(enhanced, /import-layout \\{ grid-template-columns: 1fr !important/);\n' + marker,
                  1,
              )
          test_path.write_text(test)

          visual_path = Path("scripts/statement-visual/inbox-list-layout.mjs")
          visual = visual_path.read_text()
          visual = replace_once(
              visual,
              '    longText.descriptionWidth >= 180,',
              '    longText.descriptionWidth >= 150,',
              "description width threshold",
          )
          visual_path.write_text(visual)
          PY

      - name: Format changed files
        run: >-
          npx prettier
          apps/web/src/dev-server/inbox-list-layout-enhancement.ts
          apps/web/src/dev-server/inbox-list-layout-enhancement.test.ts
          scripts/statement-visual/inbox-list-layout.mjs
          --write

      - name: Remove temporary workflow and commit
        run: |
          rm .github/workflows/temporary-issue-522-overflow-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/web/src/dev-server/inbox-list-layout-enhancement.ts \
            apps/web/src/dev-server/inbox-list-layout-enhancement.test.ts \
            scripts/statement-visual/inbox-list-layout.mjs \
            .github/workflows/temporary-issue-522-overflow-fix.yml
          git commit -m "fix: eliminar overflow responsivo da Inbox"
          git push origin "HEAD:${{ github.head_ref }}"
