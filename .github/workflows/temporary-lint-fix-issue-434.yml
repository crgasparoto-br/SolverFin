name: Temporary lint fix issue 434

on:
  push:
    branches:
      - feat/434-account-remuneration-cdi

permissions:
  contents: write

jobs:
  lint-fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: feat/434-account-remuneration-cdi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Remove stale type import
        run: sed -i 's/, type TenantContext//' apps/api/src/repositories/account-remuneration-v2.ts

      - name: Validate lint
        run: npm run lint

      - name: Commit lint correction
        run: |
          if git diff --quiet; then
            echo "No lint correction required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/api/src/repositories/account-remuneration-v2.ts
          git commit -m "fix: remove stale remuneration type import"
          git push origin HEAD:feat/434-account-remuneration-cdi
