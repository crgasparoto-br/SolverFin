name: Temporary test diagnostic issue 434

on:
  push:
    branches:
      - feat/434-account-remuneration-cdi

permissions:
  contents: write

jobs:
  diagnose-tests:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: feat/434-account-remuneration-cdi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Capture test output
        run: |
          set +e
          npm test > issue434-test-output.txt 2>&1
          echo "exit_code=$?" >> issue434-test-output.txt
          exit 0

      - name: Commit diagnostic output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f issue434-test-output.txt
          git commit -m "test: capture issue 434 failure output"
          git push origin HEAD:feat/434-account-remuneration-cdi
