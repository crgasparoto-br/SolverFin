name: Temporary update accounts route test

on:
  push:
    branches:
      - review/main-issue-467-extrato
    paths:
      - ".github/workflows/temporary-update-accounts-route-test.yml"

permissions:
  contents: write

jobs:
  update-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: review/main-issue-467-extrato
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Update legacy route expectation
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("apps/web/src/dev-server.test.ts")
          content = path.read_text()
          content = content.replace(
              "legacyAccountsRouteDoesNotAppearAsPrivateRoute();",
              "legacyAccountsRouteRedirectsToCanonicalPage();",
          )
          old = '''function legacyAccountsRouteDoesNotAppearAsPrivateRoute(): void {
            const authenticatedRoute = resolveRoute("/contas", true);

            assert.equal(authenticatedRoute.statusCode, 404);
            assert.equal(privateRoutes.has("/contas"), false);
          }'''
          new = '''function legacyAccountsRouteRedirectsToCanonicalPage(): void {
            const authenticatedRoute = resolveRoute("/contas", true);

            assert.equal(authenticatedRoute.statusCode, 302);
            assert.equal(authenticatedRoute.location, "/contas-cartoes");
            assert.equal(privateRoutes.has("/contas"), false);
          }'''
          if old not in content:
              raise SystemExit("Expected legacy route test block was not found")
          path.write_text(content.replace(old, new))
          PY
          npx prettier --write apps/web/src/dev-server.test.ts

      - name: Validate web workspace
        run: |
          npm run build:packages
          npm run test --workspace @solverfin/web

      - name: Commit test correction
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/web/src/dev-server.test.ts
          git commit -m "test(web): atualizar contrato do alias de contas"
          git push origin HEAD:review/main-issue-467-extrato
