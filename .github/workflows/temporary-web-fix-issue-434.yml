name: Temporary web fix issue 434

on:
  push:
    branches:
      - feat/434-account-remuneration-cdi

permissions:
  contents: write

jobs:
  fix-web-regression:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: feat/434-account-remuneration-cdi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Make status filter removal indentation independent
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('apps/web/src/dev-server/accounts-cards-enhancement.ts')
          lines = path.read_text().splitlines()
          start = next(
              index
              for index, line in enumerate(lines)
              if 'const htmlWithoutStatusFilter = html.replace(' in line
          )
          end = next(
              index
              for index in range(start + 1, len(lines))
              if lines[index].strip() == ');'
          )
          replacement = [
              '  const htmlWithoutStatusFilter = html.replace(',
              r'    /<label>\s*Status\s*<select data-master-status>[\s\S]*?<\/select>\s*<\/label>/',
              '    "",',
              '  );',
          ]
          path.write_text('\n'.join(lines[:start] + replacement + lines[end + 1:]) + '\n')
          PY
          npx prettier apps/web/src/dev-server/accounts-cards-enhancement.ts --write

      - name: Validate web tests
        run: npm run test --workspace @solverfin/web

      - name: Commit web correction
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/web/src/dev-server/accounts-cards-enhancement.ts
          git commit -m "fix: make account filter enhancement robust"
          git push origin HEAD:feat/434-account-remuneration-cdi
