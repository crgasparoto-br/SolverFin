name: Temporary web fix issue 434

on:
  push:
    branches:
      - feat/434-account-remuneration-cdi

permissions:
  contents: write

jobs:
  fix-web-regression:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: feat/434-account-remuneration-cdi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Make status filter removal indentation independent
        run: |
          python - <<'PY'
          import re
          from pathlib import Path

          path = Path('apps/web/src/dev-server/accounts-cards-enhancement.ts')
          source = path.read_text()
          pattern = re.compile(
              r'  const htmlWithoutStatusFilter = html\.replace\(\n'
              r'\s*`[\s\S]*?<select data-master-status>[\s\S]*?</label>`,\n'
              r'\s*"",\n'
              r'\s*\);'
          )
          replacement = '''  const htmlWithoutStatusFilter = html.replace(
            /<label>\\s*Status\\s*<select data-master-status>[\\s\\S]*?<\\/select>\\s*<\\/label>/,
            "",
          );'''
          updated, count = pattern.subn(replacement, source, count=1)
          if count != 1:
              raise SystemExit(f'expected one active filter block, found {count}')
          path.write_text(updated)
          PY
          npx prettier apps/web/src/dev-server/accounts-cards-enhancement.ts --write

      - name: Validate web tests
        run: npm run test --workspace @solverfin/web

      - name: Commit web correction
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/web/src/dev-server/accounts-cards-enhancement.ts
          git commit -m "fix: make account filter enhancement robust"
          git push origin HEAD:feat/434-account-remuneration-cdi
