name: Test issue 479

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: postgresql://solverfin:solverfin_dev_password@localhost:5432/solverfin?schema=public
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: solverfin
          POSTGRES_USER: solverfin
          POSTGRES_PASSWORD: solverfin_dev_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U solverfin -d solverfin"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Prepare database
        run: |
          npm run prisma:generate
          npm run db:deploy
          npm run db:seed

      - name: Capture test diagnostics
        run: npm run test > test-479.log 2>&1 || true

      - name: Upload diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: test-479
          path: test-479.log
          retention-days: 1
