name: solverfin

services:
  postgres:
    image: postgres:16-alpine
    container_name: solverfin-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-solverfin}
      POSTGRES_USER: ${POSTGRES_USER:-solverfin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-solverfin_dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - solverfin-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  solverfin-postgres-data:
