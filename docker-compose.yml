name: solverfin

services:
  postgres:
    image: postgres:16-alpine
    container_name: solverfin-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-solverfin}
      POSTGRES_USER: ${POSTGRES_USER:-solverfin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-solverfin_dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - solverfin-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  adminer:
    image: adminer:latest
    container_name: solverfin-adminer
    restart: unless-stopped
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    ports:
      - "${ADMINER_PORT:-8082}:8080"
    depends_on:
      - postgres

volumes:
  solverfin-postgres-data:
